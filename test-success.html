<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>測試 - 提交成功頁面</title>

    <!-- 字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;600&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        * {
            font-family: 'Noto Serif TC', serif !important;
        }
        body {
            font-weight: 200 !important;
            background-color: #FAF8F5;
            color: #203B2A;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .animate-fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(100%); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        @keyframes ping {
            75%, 100% {
                transform: scale(2);
                opacity: 0;
            }
        }
        .animate-ping {
            animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom, 1rem);
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script>
        // 註冊 Babel preset
        Babel.registerPreset("react-classic", {
            presets: [
                [Babel.availablePresets["react"], { "runtime": "classic" }]
            ]
        });
    </script>

    <script type="text/babel" data-presets="react-classic">
const { useState, useEffect, useRef } = React;

const Icon = ({ name, size = 20, className = "" }) => {
    const ref = useRef(null);
    useEffect(() => {
        if (ref.current && window.lucide) {
            ref.current.innerHTML = '';
            const i = document.createElement('i');
            i.setAttribute('data-lucide', name);
            i.style.width = '100%';
            i.style.height = '100%';
            ref.current.appendChild(i);
            window.lucide.createIcons({ root: ref.current });
        }
    }, [name]);
    return <span ref={ref} style={{ width: size, height: size, display: 'inline-flex' }} className={className} />;
};

// ===== 模擬資料（直接在這邊改，不用填表單） =====
const MOCK_DATA = {
    email: 'test@example.com',
    owner_name: '王小明',
    pet_name: '小黑',
    service_type: 'grooming', // 'grooming' | 'boarding' | 'daycare'
    htmlContent: '<h1>測試契約內容</h1><p>這是一份測試用的契約副本</p>'
};
// ================================================

const SuccessView = ({ data, onReset }) => {
    const hasEmail = data.email && data.email.trim() !== '';
    const hasAutoRedirected = useRef(false);
    const [lineOpened, setLineOpened] = useState(false);
    const [showManualButton, setShowManualButton] = useState(false);
    const fallbackTimerRef = useRef(null);
    const autoTimerRef = useRef(null);
    
    const openContract = () => {
        const w = window.open('', '_blank');
        if (w) { w.document.write(data.htmlContent);
            w.document.close(); } else alert('請允許彈出視窗以查看完整契約。');
    };

    // 手動開啟 LINE 並更新狀態
    const handleManualOpen = () => {
        // 清除自動跳轉計時器
        if (autoTimerRef.current) {
            clearTimeout(autoTimerRef.current);
            autoTimerRef.current = null;
        }
        setLineOpened(true);
    };

    useEffect(() => {
        if (hasAutoRedirected.current) return;
        hasAutoRedirected.current = true;

        const serviceMap = {
            grooming: '美容',
            boarding: '住宿',
            daycare: '安親'
        };
        const serviceLabel = serviceMap[data.service_type] || '美容';
        
        const message = `🐾 尾尾道來預約完成通知%0A%0A👤 飼主：${encodeURIComponent(data.owner_name || '')}%0A🐶 寵物：${encodeURIComponent(data.pet_name || '')}%0A📋 服務：${serviceLabel}%0A📅 日期：${new Date().toLocaleDateString('zh-TW')}%0A%0A感謝您選擇尾尾道來寵物俱樂部 ❤️`;
        const lineUrl = `https://line.me/R/oaMessage/@060zwrxi/?${message}`;
        
        // 1.5 秒後嘗試開啟 LINE
        autoTimerRef.current = setTimeout(() => {
            const newWindow = window.open(lineUrl, '_blank');
            // 如果視窗成功開啟，視為成功；否則顯示手動按鈕
            if (newWindow) {
                setLineOpened(true);
            } else {
                setShowManualButton(true);
            }
        }, 1500);
        
        return () => {
            if (autoTimerRef.current) {
                clearTimeout(autoTimerRef.current);
                autoTimerRef.current = null;
            }
        };
    }, [data]);

    return (
        <div className="fixed inset-0 z-[200] bg-[#203B2A]/40 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in overflow-y-auto">
            <div className="bg-white/90 backdrop-blur-md rounded-[2.5rem] w-full max-w-lg shadow-2xl relative overflow-hidden my-auto border border-[#DDD6CE]/40">
                <div className="p-8 text-center relative overflow-hidden bg-gradient-to-b from-[#FAF8F5] to-white">
                    <div className="absolute top-[-50px] left-[-50px] w-32 h-32 bg-[#D4C9BE]/20 rounded-full blur-2xl"></div>
                    <div className="absolute bottom-[-30px] right-[-30px] w-24 h-24 bg-[#C4B8AA]/20 rounded-full blur-2xl"></div>
                    <div className="w-24 h-24 bg-[#203B2A]/10 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg relative">
                        <div className="absolute inset-0 rounded-full border-2 border-[#203B2A]/10 animate-ping" style={{ animationDuration: '2s' }}></div>
                        <Icon name={hasEmail ? "check" : "camera"} size={48} className="relative z-10 text-[#203B2A]" />
                    </div>
                    <h2 className="text-2xl font-serif font-bold text-[#203B2A] mb-2 tracking-wide">提交成功！</h2>
                    {hasEmail ? (
                        <p className="text-sm font-bold text-[#4A6B55]">
                            契約副本已寄至 <span className="text-[#203B2A] font-bold underline decoration-[#B8A088] decoration-2 underline-offset-4">{data.email}</span>
                        </p>
                    ) : (
                        <p className="text-sm font-bold text-[#DBA58B]">未填寫信箱，請務必保存下方副本</p>
                    )}
                    <div className="mt-3 flex justify-center gap-2">
                        <span className="w-1.5 h-1.5 rounded-full bg-[#203B2A]/30"></span>
                        <span className="w-1.5 h-1.5 rounded-full bg-[#203B2A]/50"></span>
                        <span className="w-1.5 h-1.5 rounded-full bg-[#203B2A]/30"></span>
                    </div>
                </div>
                <div className="p-6 md:p-8 space-y-6 bg-white/50">
                    {/* LINE 智慧型按鈕 - 移到最上方 */}
                    <div className={`flex items-center justify-between p-3 rounded-xl border transition-all ${lineOpened ? 'bg-[#4A6B55]/5 border-[#4A6B55]/30' : 'bg-[#06C755]/5 border-[#06C755]/20'}`}>
                        <div className="flex items-center gap-2">
                            <svg viewBox="0 0 256 256" className="w-5 h-5 text-[#06C755] flex-shrink-0" fill="currentColor">
                                <g transform="translate(1.4 1.4) scale(2.81)">
                                    <path d="M 42.685 88.018 c -0.944 0 -1.935 -0.233 -2.809 -0.929 c -2.075 -1.653 -1.61 -4.302 -1.435 -5.299 l 0.015 -0.085 c 0.097 -0.573 0.523 -3.138 0.589 -3.532 c 0.143 -1.106 0.122 -1.725 0.087 -2.032 c -0.248 -0.131 -0.736 -0.332 -1.527 -0.51 C 15.806 72.699 0 57.334 0 39.057 C 0 18.615 20.187 1.984 45 1.984 c 24.813 0 45 16.631 45 37.073 c 0 6.388 -1.921 12.34 -5.848 18.055 h 0.347 l -2.727 3.14 c -0.471 0.568 -0.964 1.135 -1.476 1.7 l -0.03 0.034 c -9.005 10.364 -29.164 23.109 -34.124 25.199 C 45.535 87.442 44.169 88.018 42.685 88.018 z M 45 7.872 c -21.566 0 -39.112 13.99 -39.112 31.185 c 0 15.321 13.716 28.255 32.614 30.754 l 0.234 0.04 c 3.099 0.668 5.056 1.964 5.817 3.853 c 0.524 1.311 0.625 2.988 0.324 5.285 l -0.015 0.099 c 0 0 -0.221 1.327 -0.399 2.397 c 5.106 -2.446 21.464 -12.945 29.972 -21.843 l 1.432 -1.571 c 5.626 -6.17 8.246 -12.212 8.246 -19.015 C 84.112 21.862 66.566 7.872 45 7.872 z"/>
                                    <path d="M 37.309 31.467 h -2.655 c -0.407 0 -0.737 0.33 -0.737 0.736 v 16.492 c 0 0.406 0.33 0.735 0.737 0.735 h 2.655 c 0.407 0 0.737 -0.329 0.737 -0.735 V 32.203 C 38.047 31.797 37.716 31.467 37.309 31.467"/>
                                    <path d="M 55.584 31.467 h -2.655 c -0.407 0 -0.737 0.33 -0.737 0.736 v 9.798 l -7.558 -10.207 c -0.017 -0.026 -0.037 -0.051 -0.057 -0.075 h -2.655 c -0.407 0 -0.737 0.33 -0.737 0.736 v 16.492 c 0 0.406 0.33 0.735 0.737 0.735 h 2.655 v -10.59 l 7.567 10.22 c 0.052 0.073 0.117 0.134 0.187 0.182 h 2.655 c 0.407 0 0.737 -0.329 0.737 -0.735 V 32.203 C 56.321 31.797 55.991 31.467 55.584 31.467"/>
                                    <path d="M 30.91 45.302 h -7.214 V 32.204 c 0 -0.407 -0.33 -0.737 -0.737 -0.737 h -2.655 c -0.407 0 -0.737 0.33 -0.737 0.737 v 16.491 c 0 0.407 0.33 0.737 0.737 0.737 H 30.91 c 0.407 0 0.736 -0.33 0.736 -0.737 v -2.655 C 31.646 45.632 31.316 45.302 30.91 45.302"/>
                                    <path d="M 70.245 35.597 c 0.407 0 0.736 -0.33 0.736 -0.737 v -2.655 c 0 -0.407 -0.329 -0.738 -0.736 -0.738 H 59.639 v 16.489 c 0 0.407 0.33 0.737 0.737 0.737 h 10.606 c 0.407 0 0.736 -0.33 0.736 -0.737 v -2.655 c 0 -0.407 -0.329 -0.737 -0.736 -0.737 h -7.213 v -2.788 h 7.213 c 0.407 0 0.736 -0.33 0.736 -0.737 v -2.655 c 0 -0.407 -0.329 -0.738 -0.736 -0.738 h -7.213 v -2.787 H 70.245 z"/>
                                </g>
                            </svg>
                            <span className="text-xs font-bold text-[#203B2A]">
                                {lineOpened ? '✅ 已開啟 LINE 通知' : '⏳ 自動開啟 LINE 中⋯'}
                            </span>
                        </div>
                        {!lineOpened && !showManualButton && (
                            <span className="px-3 py-1 bg-[#06C755]/20 text-[#06C755] rounded-lg text-[10px] font-bold animate-pulse">準備中</span>
                        )}
                        {!lineOpened && showManualButton && (
                            <a 
                                href={`https://line.me/R/oaMessage/@060zwrxi/?🐾%20尾尾道來預約完成通知%0A%0A👤%20飼主：${encodeURIComponent(data.owner_name || '')}%0A🐶%20寵物：${encodeURIComponent(data.pet_name || '')}%0A📋%20服務：${data.service_type === 'grooming' ? '美容' : data.service_type === 'boarding' ? '住宿' : '安親'}%0A📅%20日期：${new Date().toLocaleDateString('zh-TW')}%0A%0A感謝您選擇尾尾道來寵物俱樂部%20❤️`}
                                target="_blank"
                                className="px-4 py-1.5 bg-[#06C755] text-white rounded-lg text-xs font-bold hover:scale-105 transition-all shrink-0"
                                onClick={handleManualOpen}
                            >
                                手動發送
                            </a>
                        )}
                        {lineOpened && (
                            <span className="px-3 py-1 bg-[#4A6B55] text-white rounded-lg text-[10px] font-bold">已完成</span>
                        )}
                    </div>

                    <div className={`border rounded-2xl p-5 flex gap-4 items-start shadow-sm ${hasEmail ? 'bg-[#FAF8F5] border-[#DDD6CE]' : 'bg-[#FDF6F3] border-[#DBA58B]'}`}>
                        <div className={`shrink-0 mt-1 ${hasEmail ? 'text-[#4A6B55]' : 'text-[#DBA58B]'}`}><Icon name={hasEmail ? "mail" : "alert-triangle"} size={20} /></div>
                        <div className="text-sm">
                            <p className={`font-bold mb-1 text-base ${hasEmail ? 'text-[#203B2A]' : 'text-[#DBA58B]'}`}>{hasEmail ? '💡 溫馨提醒' : '⚠️ 重要提醒'}</p>
                            <p className="leading-relaxed text-[#4A6B55]">{hasEmail ? '若沒收到信件，可能是被歸類到垃圾郵件。您也可以點擊下方按鈕直接查看契約副本。' : '因未填寫 Email，系統無法發送副本。請點擊下方按鈕開啟完整契約，並進行全螢幕截圖保存。'}</p>
                        </div>
                    </div>
                    <div className="space-y-3">
                        <button onClick={openContract} className="w-full py-4 rounded-2xl bg-[#203B2A] text-white font-bold shadow-lg shadow-[#203B2A]/20 hover:bg-[#162B1F] active:scale-95 transition-all flex items-center justify-center gap-2"><Icon name="file-text" size={20} /> 開啟完整契約頁面 (截圖用)</button>
                        <button 
                            onClick={(e) => {
                                const btn = e.currentTarget;
                                btn.style.transform = 'scale(0.95)';
                                setTimeout(() => btn.style.transform = 'scale(1)', 150);
                                onReset();
                            }} 
                            className="w-full py-4 rounded-2xl bg-white text-[#203B2A] border-2 border-[#DDD6CE] font-bold shadow-sm hover:bg-[#FAF8F5] active:scale-95 transition-all flex items-center justify-center gap-2"
                        >
                            <Icon name="home" size={20} /> 返回首頁 (完成)
                        </button>
                    </div>
                </div>
            </div>
        </div>
    );
};

// ===== 測試用 App =====
const App = () => {
    const [showSuccess, setShowSuccess] = useState(true);

    if (!showSuccess) {
        return (
            <div className="min-h-screen flex items-center justify-center bg-[#FAF8F5]">
                <div className="text-center">
                    <h1 className="text-2xl font-bold text-[#203B2A]">測試模式</h1>
                    <p className="text-[#4A6B55] mt-2">點擊下方按鈕重新顯示 Success 頁面</p>
                    <button 
                        onClick={() => setShowSuccess(true)}
                        className="mt-4 px-6 py-3 bg-[#203B2A] text-white rounded-xl font-bold"
                    >
                        顯示成功頁面
                    </button>
                </div>
            </div>
        );
    }

    return (
        <SuccessView 
            data={MOCK_DATA} 
            onReset={() => setShowSuccess(false)}
        />
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
