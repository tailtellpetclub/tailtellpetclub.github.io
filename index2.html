<body>

    <!-- 背景裝飾 -->
    <div class="bg-orb w-96 h-96 top-[-10%] left-[-10%] animate-float" style="background:#E8D9CC;"></div>

    <script>
        Babel.registerPreset("react-classic", {

    <script type="text/babel" data-presets="react-classic">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // -------- 工具 --------
        const dataURLtoBlob = (dataurl) => {
            if (!dataurl) return null;
            try {
                const arr = dataurl.split(',');
                const mime = arr[0].match(/:(.*?);/)[1];
                const bstr = atob(arr[1]);
                let n = bstr.length;
                const u8arr = new Uint8Array(n);
                while (n--) { u8arr[n] = bstr.charCodeAt(n); }
                return new Blob([u8arr], { type: mime });
            } catch (_) { return null; }
        };

        // -------- Icon 組件 --------
        const Icon = ({ name, size = 20, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    ref.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    i.style.width = '100%';
                    i.style.height = '100%';
                    ref.current.appendChild(i);
                    window.lucide.createIcons({ root: ref.current });
                }
            }, [name]);
            return <span ref={ref} style={{ width: size, height: size, display: 'inline-flex' }} className={className} />;
        };

        // -------- Toast 系統 --------
        const ToastContainer = () => {
            const [toasts, setToasts] = useState([]);
            const addToast = (message, type = 'info', duration = 4500) => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type, duration }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), duration);
            };
            useEffect(() => {
                window.showToast = addToast;
                return () => { window.showToast = () => {}; };
            }, []);
            return (
                <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[200] flex flex-col gap-3 w-full max-w-md px-4 pointer-events-none">
                    {toasts.map(t => <ToastItem key={t.id} {...t} onClose={() => setToasts(prev => prev.filter(x => x.id !== t.id))} />)}
                </div>
            );
        };

        const ToastItem = ({ id, message, type = 'info', duration = 4500, onClose }) => {
            const [progress, setProgress] = useState(100);
            const [visible, setVisible] = useState(false);
            useEffect(() => {
                setVisible(true);
                const interval = setInterval(() => {
                    setProgress(prev => Math.max(0, prev - (100 / (duration / 100))));
                }, 100);
                return () => clearInterval(interval);
            }, [duration]);
            const handleClose = () => { setVisible(false);
                setTimeout(onClose, 300); };
            const styleMap = { success: 'bg-[#8F9B8B]', error: 'bg-[#DBA58B]', warning: 'bg-[#D4A574]', info: 'bg-[#B58B6E]' };
            const iconMap = { success: 'check-circle', error: 'alert-circle', warning: 'alert-triangle', info: 'info' };
            return (
                <div className={`pointer-events-auto transform transition-all duration-300 ${visible ? 'translate-y-0 opacity-100' : 'translate-y-[-20px] opacity-0'}`}>
                    <div className={`${styleMap[type] || 'bg-[#B58B6E]'} text-white px-6 py-4 rounded-2xl shadow-2xl flex items-start gap-3 relative overflow-hidden`}>
                        <Icon name={iconMap[type] || 'info'} size={20} className="mt-0.5 shrink-0" />
                        <div className="flex-1 text-sm font-bold whitespace-pre-wrap text-left leading-relaxed">{message}</div>
                        <button onClick={handleClose} className="ml-2 p-1 hover:bg-white/20 rounded-full transition-colors"><Icon name="x" size={16} /></button>
                        <div className="absolute bottom-0 left-0 h-1 bg-white/30 transition-all duration-100" style={{ width: `${progress}%` }} />
                    </div>
                </div>
            );
        };

        // -------- 輸入框含錯誤 --------
        const InputWithError = ({ label, name, type = 'text', value, onChange, placeholder, error, className = '', ...props }) => (
            <div className="space-y-2 w-full relative z-10">
                {label && <label className="text-xs font-bold text-[#6B5344] ml-1 tracking-wider">{label}</label>}
                <input
                    name={name}
                    type={type}
                    value={value || ''}
                    onChange={onChange}
                    className={`w-full cute-input ${error ? 'border-red-300 bg-red-50/40' : ''} ${className}`}
                    placeholder={placeholder}
                    {...props}
                />
                {error && <div className="text-xs text-[#DBA58B] font-bold mt-1 ml-1">{error}</div>}
            </div>
        );

        // -------- Modal 條款 --------
        const TermsModal = ({ isOpen, onClose, title, children, onAgree }) => {
            const contentRef = useRef(null);
            const [canAgree, setCanAgree] = useState(false);
            useEffect(() => {
                if (isOpen) {
                    setCanAgree(false);
                    document.body.style.overflow = 'hidden';
                    setTimeout(() => {
                        if (contentRef.current && contentRef.current.scrollHeight <= contentRef.current.clientHeight + 10) {
                            setCanAgree(true);
                        }
                    }, 350);
                } else {
                    document.body.style.overflow = '';
                }
            }, [isOpen]);
            const handleScroll = (e) => {
                const { scrollTop, scrollHeight, clientHeight } = e.target;
                if (scrollHeight - scrollTop - clientHeight < 40) setCanAgree(true);
            };
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[150] bg-[#4A3528]/40 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in">
                    <div className="bg-white w-full max-w-lg rounded-3xl shadow-2xl flex flex-col max-h-[85vh] animate-slide-up">
                        <div className="px-6 py-5 border-b border-[#E6DDD4] flex justify-between items-center shrink-0">
                            <h3 className="text-lg font-serif font-bold text-[#4A3528]">{title}</h3>
                            <button onClick={onClose} className="p-2 bg-[#F7F3EE] rounded-full hover:bg-[#E8D9CC] transition-colors">
                                <Icon name="x" size={20} className="text-[#6B5344]" />
                            </button>
                        </div>
                        <div ref={contentRef} onScroll={handleScroll} className="flex-1 overflow-y-auto p-6 text-sm text-[#4A3528] leading-relaxed space-y-4">
                            {children}
                            <div className="h-8"></div>
                        </div>
                        <div className="p-6 border-t border-[#E6DDD4] bg-white rounded-b-3xl shrink-0 safe-area-bottom">
                            {!canAgree && <div className="text-center text-xs font-bold text-[#D4A574] mb-3 animate-pulse">👇 請滑動至最底部以同意條款</div>}
                            <button onClick={() => { if (canAgree) { onAgree && onAgree();
                                    onClose(); } }} disabled={!canAgree}
                                className={`w-full py-4 rounded-xl font-bold text-base flex items-center justify-center gap-2 transition-all ${canAgree ? 'bg-[#B58B6E] text-white shadow-lg shadow-[#B58B6E]/20 active:scale-95 hover:bg-[#A0775A]' : 'bg-[#E6DDD4] text-[#B5A598] cursor-not-allowed'}`}>
                                <Icon name={canAgree ? "check-circle" : "lock"} size={20} />
                                {canAgree ? "我已詳閱並同意" : "請閱讀完畢"}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // -------- 舊客歷史 Modal --------
        const HistoryModal = ({ records, onClose, onSelect }) => {
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-[#4A3528]/40 backdrop-blur-sm animate-fade-in">
                    <div className="w-full max-w-md bg-white rounded-3xl overflow-hidden shadow-2xl relative max-h-[80vh] flex flex-col">
                        <div className="bg-[#B58B6E] p-6 text-white text-center">
                            <h3 className="text-xl font-bold">🐾 歡迎回來！</h3>
                            <p className="text-sm opacity-80 mt-1">我們找到了以下寶貝的紀錄，請選擇要帶入的資料：</p>
                        </div>
                        <div className="p-6 space-y-3 overflow-y-auto bg-[#F7F3EE] min-h-[200px]">
                            {records.map((record, idx) => {
                                const petName = record.pet_name || '未命名寶貝';
                                const serviceType = record.service_type === 'boarding' ? '住宿' : '美容';
                                let dateStr = '無日期紀錄';
                                if (record.created_at) {
                                    try {
                                        const d = new Date(record.created_at);
                                        if (!isNaN(d.getTime())) dateStr = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
                                    } catch (_) {}
                                }
                                return (
                                    <button key={record.id || idx} onClick={() => onSelect(record)}
                                        className="w-full bg-white p-4 rounded-2xl border border-[#E6DDD4] shadow-sm hover:border-[#D4A574] hover:shadow-md transition-all text-left flex items-center gap-4 group">
                                        <div className="w-12 h-12 rounded-full bg-[#E8D9CC]/40 flex items-center justify-center text-[#B58B6E] font-bold text-lg group-hover:bg-[#E8D9CC] transition-colors">
                                            {petName.charAt(0)}
                                        </div>
                                        <div>
                                            <div className="font-bold text-[#4A3528] text-lg">{petName}</div>
                                            <div className="text-xs text-[#B5A598]">上次服務：{dateStr} ({serviceType})</div>
                                        </div>
                                        <div className="ml-auto text-[#B58B6E] opacity-0 group-hover:opacity-100 transition-opacity">
                                            <Icon name="arrow-right" size={20} />
                                        </div>
                                    </button>
                                );
                            })}
                        </div>
                        <div className="p-4 bg-white border-t border-[#E6DDD4]">
                            <button onClick={onClose} className="w-full py-3 rounded-xl text-[#B5A598] font-bold text-sm hover:bg-[#F7F3EE] transition-colors">
                                不使用舊資料，填寫新表單
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // -------- 產生合約 HTML --------
        const generateContractHtml = (data, signatureUrl) => {
            const isBoarding = data.service_type === 'boarding' || data.service_type === 'daycare';
            const isDaycare = data.service_type === 'daycare';
            const show = (val) => val || '<span style="color:#C5B5A8;">未填寫</span>';
            const arr = (val) => {
                if (!val) return '無';
                if (Array.isArray(val)) return val.length > 0 ? val.join('、') : '無';
                if (typeof val === 'string' && val.trim().startsWith('[')) {
                    try { const p = JSON.parse(val); return Array.isArray(p) && p.length > 0 ? p.join('、') : '無'; } catch (_) {}
                }
                return val || '無';
            };
            const labelStyle =
                "font-size: 11px; color: #8A7A6E; font-weight: bold; display: block; margin-bottom: 3px; letter-spacing: 0.5px;";
            const valueStyle = `font-size: 14px; color: #4A3528; font-weight: 300;`;

            const groomingTerms = `

            const [showHistoryModal, setShowHistoryModal] = useState(false);
            const [historyRecords, setHistoryRecords] = useState([]);

            // 簽名
            const [showFullSig, setShowFullSig] = useState(false);
            const [realtimeSig, setRealtimeSig] = useState(null);
            const fullSigCanvasRef = useRef(null);
            const padInstance = useRef(null);

            // 條款
            const [activeModal, setActiveModal] = useState(null);
            const [termsRead, setTermsRead] = useState({ beauty: false, boarding: false, highRiskBeauty: false,
                highRiskBoarding: false });

            const roomRates = {
                cat: [
                    { name: '標準房', price: 600, desc: '舒適獨立空間' },
                    { name: '豪華房', price: 800, desc: '跳台玩具豐富' },
                    { name: '家庭房', price: 1200, desc: '多貓共享大空間' }
                ],
                dog: [
                    { name: '小型犬標準房', price: 500, desc: '溫馨小空間' },
                    { name: '標準房', price: 600, desc: '一般小型犬' },
                    { name: '豪華房', price: 800, desc: '寬敞不擁擠' },
                    { name: 'VIP房', price: 1300, desc: '特大獨立空間' }
                ]
            };

            const personalityOptions = ['分離焦慮', '緊張', '膽小', '護食', '+ 其他'];

            // 高風險判斷
            const checkHighRisk = useCallback((data) => {
                if (data.medical_history === '有') return true;
                const num = parseFloat(data.age_value);
                if (isNaN(num)) return false;
                if (data.age_type === 'month' && num <= 3) return true;
                if (data.age_type === 'year' && num >= 8) return true;
                return false;
            }, []);

            const isHighRisk = useMemo(() => checkHighRisk(formData), [formData, checkHighRisk]);

            const allTermsCompleted = useMemo(() => {
                if (!termsRead.beauty) return false;
                if (serviceType !== 'grooming' && !termsRead.boarding) return false;
                if (isHighRisk) {
                    if (!termsRead.highRiskBeauty) return false;
                    if (serviceType !== 'grooming' && !termsRead.highRiskBoarding) return false;
                }
                return true;
            }, [termsRead, serviceType, isHighRisk]);

            // 驗證規則
            const validationRules = {
                owner_name: { required: true, message: '請輸入主人姓名' },
                phone: { required: true, pattern: /^09\d{8}$/, message: '請輸入正確的手機號碼格式 (09xxxxxxxx)' },
                owner_id: { required: true, pattern: /^[A-Z][12]\d{8}$/, message: '請輸入正確的身分證字號格式' },
                address: { required: true, message: '請輸入聯絡地址' },
                emergency_name: { required: true, message: '請輸入緊急聯絡人姓名' },
                emergency_phone: { required: true, message: '請輸入緊急聯絡人電話' },
                pet_name: { required: true, message: '請輸入寵物名字' },
                pet_type: { required: true, message: '請選擇寵物種類' },
                breed: { required: true, message: '請輸入品種' },
                weight: { required: true, message: '請輸入體重' },
                age_value: { required: true, message: '請輸入年齡' },
                age_type: { required: true, message: '請選擇年齡單位' },
                sex: { required: true, message: '請選擇性別' },
                fix: { required: true, message: '請選擇是否結紮' },
                chip_status: { required: true, message: '請選擇晶片狀態' },
                medical_history: { required: true, message: '請選擇過往病史' },
                deworming_monthly: { required: true, message: '請選擇是否每月定期驅蟲' },
                physical_check: { required: true, message: '請選擇外觀檢查項目' },
                social_traits: { required: true, message: '請選擇寵物個性' },
            };

            const validateField = (name, value) => {
                const rule = validationRules[name];
                if (!rule) return null;
                if (rule.required && !value) return rule.message || '此欄位為必填';
                if (rule.pattern && !rule.pattern.test(value)) return rule.message || '格式不正確';
                return null;
            };

            const clearError = (name) => {
                setErrors(prev => { const n = { ...prev };
                    delete n[name]; return n; });
            };

            const handleChange = (field, value) => {
                setFormData(prev => ({ ...prev, [field]: value }));
                clearError(field);
            };

            const toggleArray = (field, value) => {
                setFormData(prev => {
                    const arr = prev[field] || [];
                    return { ...prev, [field]: arr.includes(value) ? arr.filter(i => i !== value) : [...arr, value] };
                });
            };

            const handleTermAgree = (type) => {

            // 驗證
            const validate = () => {
                const newErrors = {};
                let hasError = false;
                Object.keys(validationRules).forEach(key => {
                    const err = validateField(key, formData[key]);
                    if (err) { newErrors[key] = err;
                        hasError = true; }
                });

                if (serviceType === 'boarding') {
                    if (!formData.checkInDate) { newErrors.checkInDate = '請選擇入住日期';
                        hasError = true; }
                    if (!formData.checkOutDate) { newErrors.checkOutDate = '請選擇退房日期';
                        hasError = true; } else if (formData.checkInDate && new Date(formData.checkOutDate) < new Date(formData
                            .checkInDate)) {
                        newErrors.checkOutDate = '退房日期不可早於入住日期';
                        hasError = true;
                    }
                    if (!formData.room_type) { newErrors.room_type = '請選擇房型';
                        hasError = true; }
                    if (!formData.temperament) { newErrors.temperament = '請選擇放風模式';
                        hasError = true; }
                }

                if (serviceType === 'daycare') {
                    if (!formData.daycare_date) { newErrors.daycare_date = '請選擇安親日期';
                        hasError = true; }
                    if (!formData.pickup_time) { newErrors.pickup_time = '請選擇預計接回時間';
                        hasError = true; }
                    if (!formData.room_type) { newErrors.room_type = '請選擇休息區';
                        hasError = true; }
                }

                if (serviceType === 'grooming' && (!formData.service_tags || formData.service_tags.length === 0)) {
                    newErrors.service_tags = '請至少選擇一項美容服務';
                    hasError = true;
                }

                if (!formData.signature) { newErrors.signature = '請完成數位簽名';
                    hasError = true; }

                setErrors(newErrors);
                if (hasError) {
                    const keys = Object.keys(newErrors);
                    const top = keys.slice(0, 3).map(k => newErrors[k]);
                    const msg = '請修正以下錯誤：\n' + top.join('\n') + (keys.length > 3 ? `\n\n還有 ${keys.length-3} 個欄位需要修正` :
                    '');
                    window.showToast(msg, 'error');
                    const first = document.querySelector(`[name="${keys[0]}"]`);
                    if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                return !hasError;
            };

            // 舊客查詢
            const handleSearchHistory = async () => {
                const phone = formData.phone;
                if (!phone || phone.length < 9) { window.showToast('⚠️ 請先輸入完整的連絡電話', 'error'); return; }
                setIsSearching(true);
                try {
                    const { data, error } = await window.supabaseClient.from('bookings').select('*').eq('phone', phone)
                        .order('created_at', { ascending: false });
                    if (error) throw error;
                    if (!data || data.length === 0) { window.showToast('🔍 查無此電話的過往紀錄', 'error'); } else {
                        const unique = new Map();
                        data.forEach(rec => {
                            if (!rec.pet_name) return;
                            const name = rec.pet_name;
                            if (!unique.has(name)) { unique.set(name, rec); } else {
                                const existing = unique.get(name);
                                const existingBoarding = existing.service_type === 'boarding';
                                const isBoarding = rec.service_type === 'boarding';
                                if (serviceType !== 'grooming' && !existingBoarding && isBoarding) {
                                    unique.set(name, rec);
                                }
                            }
                        });
                        setHistoryRecords(Array.from(unique.values()));
                        setShowHistoryModal(true);
                    }
                } catch (err) { console.error(err);
                    window.showToast('❌ 查詢失敗，請檢查網路', 'error'); } finally { setIsSearching(false); }
            };

            const safeParse = (val) => {
                if (!val) return [];
                if (Array.isArray(val)) return val;
                if (typeof val === 'string') {
                    try { return JSON.parse(val); } catch (_) { return [val]; }
                }
                return [];
            };

            const handleApplyHistory = (record) => {
                const { check_in_date, check_out_date, room_type, room_price, service_tags, is_owner, physical_check,

                    ...rest,
                    phone: formData.phone,
                    physical_check: safeParse(physical_check),
                    social_traits: safeParse(social_traits),
                    medical_tags: safeParse(medical_tags),
                    checkInDate: '',
                    checkOutDate: '',
                    room_type: '',
                    room_price: '',
                    daycare_date: '',
                    pickup_time: '',
                    is_owner: (is_owner === '是' || is_owner === true) ? '是' : '否',
                    service_tags: [],
                }));
                setRealtimeSig(null);
                setShowHistoryModal(false);
                window.showToast(`✅ 已載入 ${record.pet_name} 的歷史資料`, 'success');
            };

            // 簽名
            useEffect(() => {
                let timer;
                const prevent = (e) => { if (showFullSig) e.preventDefault(); };
                const initCanvas = () => {
                    const canvas = fullSigCanvasRef.current;
                    if (!canvas) return;
                    const container = canvas.parentElement;
                    const rect = container.getBoundingClientRect();
                    const ratio = Math.max(window.devicePixelRatio || 1, 1);
                    canvas.width = rect.width * ratio;
                    canvas.height = rect.height * ratio;
                    canvas.style.width = rect.width + 'px';
                    canvas.style.height = rect.height + 'px';
                    const ctx = canvas.getContext('2d');
                    ctx.scale(ratio, ratio);
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(0, 0, rect.width, rect.height);
                    if (padInstance.current) padInstance.current.off();
                    padInstance.current = new SignaturePad(canvas, {
                        penColor: '#4A3528',
                        backgroundColor: '#ffffff',
                        minWidth: 1.2,
                        maxWidth: 3.5,
                    });
                };
                if (showFullSig) {
                    document.body.style.overflow = 'hidden';
                    document.addEventListener('touchmove', prevent, { passive: false });
                    timer = setTimeout(initCanvas, 150);
                }
                return () => {
                    if (timer) clearTimeout(timer);
                    if (padInstance.current) padInstance.current.off();
                    document.body.style.overflow = '';
                    document.removeEventListener('touchmove', prevent);
                };
            }, [showFullSig]);

            const saveSignature = () => {
                if (padInstance.current && !padInstance.current.isEmpty()) {
                    const compressed = padInstance.current.toDataURL('image/jpeg', 0.5);
                    setRealtimeSig(compressed);
                    const now = new Date();
                    const ts =
                        `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
                    handleChange('signature', compressed);
                    handleChange('signature_time', ts);
                    setShowFullSig(false);
                } else {
                    window.showToast('請先簽名', 'error');
                }
            };

            // 提交
            const handleSubmit = async () => {

                try {
                    let signatureUrl = null;
                    if (formData.signature) {
                        const blob = dataURLtoBlob(formData.signature);
                        const fileName = `sig_${Date.now()}.jpg`;
                        const { error: uploadErr } = await window.supabaseClient.storage.from('signatures').upload(fileName,
                            blob, { contentType: 'image/jpeg' });
                        if (uploadErr) throw new Error('簽名檔上傳失敗: ' + uploadErr.message);
                        const { data: pubData } = window.supabaseClient.storage.from('signatures').getPublicUrl(fileName);
                        signatureUrl = pubData.publicUrl;
                    }

                    const payload = {
                        service_type: serviceType,
                        owner_name: formData.owner_name,
                        phone: formData.phone,
                        email: formData.email,
                        owner_id: formData.owner_id,
                        address: formData.address,
                        emergency_name: formData.emergency_name,
                        emergency_phone: formData.emergency_phone,
                        pet_name: formData.pet_name,
                        pet_type: formData.pet_type,
                        breed: formData.breed,
                        weight: parseFloat(formData.weight) || 0,
                        age_type: formData.age_type,
                        age_value: formData.age_value,
                        sex: formData.sex,
                        fix: formData.fix,
                        chip_status: formData.chip_status,
                        chip_id: formData.chip_id,
                        health_date: formData.health_date || null,
                        deworming_monthly: formData.deworming_monthly,
                        physical_check: formData.physical_check,
                        physical_other: formData.physical_other,
                        social_traits: formData.social_traits,
                        personality_other: formData.personality_other,
                        medical_history: formData.medical_history,
                        medical_tags: formData.medical_tags,
                        medical_other: formData.medical_other,
                        preferred_clinic_name: formData.preferred_clinic_name,
                        preferred_clinic_phone: formData.preferred_clinic_phone,
                        check_in_date: serviceType === 'boarding' ? formData.checkInDate : (serviceType === 'daycare' ?
                            formData.daycare_date : null),
                        check_out_date: serviceType === 'boarding' ? formData.checkOutDate : (serviceType === 'daycare' ?
                            formData.pickup_time : null),
                        room_type: formData.room_type,
                        room_price: parseFloat(formData.room_price) || 0,
                        temperament: formData.temperament,
                        service_tags: JSON.stringify(formData.service_tags),
                        note: formData.note,
                        signature: signatureUrl,
                        signature_time: formData.signature_time,
                        legal_agree: formData.legal_agree,
                        status: 'pending'
                    };

                    const { error: dbErr } = await window.supabaseClient.from('bookings').insert([payload]);
                    if (dbErr) throw dbErr;

                    const customerData = {
                        phone: formData.phone,
                        owner_name: formData.owner_name,
                        owner_id: formData.owner_id,
                        email: formData.email,
                        address: formData.address,
                        emergency_name: formData.emergency_name,
                        emergency_phone: formData.emergency_phone,
                        updated_at: new Date().toISOString()
                    };
                    await window.supabaseClient.from('customers').upsert(customerData, { onConflict: 'phone' });

                    const completeData = { ...payload, service_type: serviceType };
                    const emailBody = generateContractHtml(completeData, signatureUrl);

                    if (formData.email && formData.email.trim() !== '') {
                        try {
                            await window.supabaseClient.functions.invoke('resend-email', {
                                body: { email: formData.email, owner_name: formData.owner_name, pet_name: formData
                                        .pet_name, htmlContent: emailBody }
                            });
                        } catch (mailErr) { console.error('寄信失敗:', mailErr); }
                    }

                    setSubmittedData({ ...completeData, htmlContent: emailBody });
                    window.scrollTo({ top: 0, behavior: 'smooth' });

                } catch (error) {
                    console.error('提交失敗:', error);
                    window.showToast('發生錯誤：' + (error.message || '提交失敗'), 'error');
                    setIsSubmitting(false);
                }
            };

            // 成功畫面
            if (submittedData) {

                                owner_name: '',
                                is_owner: '是',
                                phone: '',
                                owner_id: '',
                                address: '',
                                emergency_name: '',
                                emergency_phone: '',
                                preferred_clinic_name: '',
                                preferred_clinic_phone: '',
                                pet_name: '',
                                breed: '',
                                weight: '',
                                age_type: 'year',
                                age_value: '',
                                pet_type: 'dog',
                                sex: '',
                                fix: '',
                                chip_status: '',
                                chip_id: '',
                                health_date: '',
                                deworming_monthly: '',
                                physical_check: [],
                                physical_other: '',
                                social_traits: [],
                                personality_other: '',
                                medical_history: '無',
                                medical_tags: [],
                                medical_other: '',
                                service_tags: [],
                                room_type: '',
                                room_price: '',
                                checkInDate: '',
                                checkOutDate: '',
                                temperament: '',
                                note: '',
                                signature: null,
                                signature_time: '',
                                legal_agree: false,
                                service_type: 'grooming',
                                lineAdded: false,
                                daycare_date: '',
                                pickup_time: '',
                            });
                            setServiceType('grooming');
                            setRealtimeSig(null);
                            setTermsRead({ beauty: false, boarding: false, highRiskBeauty: false,
                            highRiskBoarding: false });
                            window.scrollTo(0, 0);
                        }}
                    />
                );
            }

            // -------- 主表單頁面 --------
            return (
                <div className="min-h-screen pb-32">
                    <ToastContainer />

                    {showHistoryModal && (
                        <HistoryModal records={historyRecords} onClose={() => setShowHistoryModal(false)} onSelect={
                            handleApplyHistory} />

    <!-- Service Worker 註冊 -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js?v=1').then(reg => {
                    if (reg.waiting) showUpdateUI(reg.waiting);
                    reg.addEventListener('updatefound', () => {
                        const w = reg.installing;
                        w.addEventListener('statechange', () => {
                            if (w.state === 'installed' && navigator.serviceWorker.controller) {
                                showUpdateUI(w);
                            }
                        });
                    });
                });
            });
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) { window.location.reload();
                    refreshing = true; }
            });
        }

        function showUpdateUI(worker) {
            if (document.getElementById('pwa-update-banner')) return;
            const banner = document.createElement('div');
            banner.id = 'pwa-update-banner';
            banner.className = 'fixed bottom-6 right-6 z-[9999] animate-slide-up';
            banner.innerHTML = `
            <div style="background: rgba(181, 139, 110, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(212, 165, 116, 0.4);"
                 class="p-6 rounded-[24px] shadow-2xl flex flex-col gap-4 min-w-[280px]">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-[#D4A574]/20 rounded-full flex items-center justify-center">
                        <i data-lucide="sparkles" style="color: #D4A574; width: 20px; height: 20px;"></i>
                    </div>
                    <div>
                        <h4 class="text-white font-bold text-sm">系統版本更新</h4>
                        <p class="text-gray-300 text-[10px]">發現新功能，建議立即更新</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button id="pwa-ignore" class="flex-1 py-2 rounded-xl text-gray-300 text-xs font-bold hover:bg-white/10 transition-all">稍後</button>
                    <button id="pwa-update" class="flex-[2] py-2 rounded-xl bg-[#D4A574] text-[#4A3528] text-xs font-bold shadow-lg hover:scale-105 active:scale-95 transition-all">立即更新</button>
                </div>
            </div>
          `;
            document.body.appendChild(banner);
            if (window.lucide) window.lucide.createIcons({ root: banner });
            document.getElementById('pwa-update').addEventListener('click', () => { worker.postMessage({ type: 'SKIP_WAITING' });
                banner.remove(); });
            document.getElementById('pwa-ignore').addEventListener('click', () => {
                banner.classList.add('opacity-0', 'translate-y-4');
                setTimeout(() => banner.remove(), 300);
            });
        }

        // 注入店家資訊 (確保所有文字區塊同步)
        document.addEventListener('DOMContentLoaded', () => {
            const info = window.STORE_INFO || {};
            const vet = window.VET_INFO || {};
            const replacements = [
                [/尾尾道來寵物俱樂部/g, info.name || '尾尾道來寵物俱樂部'],
                [/林莉淩/g, info.owner || '林莉淩'],
                [/04-24223481/g, info.phone || '04-24223481'],
                [/臺中市北屯區崇德十路一段88號/g, info.address || '臺中市北屯區崇德十路一段88號'],
                [/特寵業字第[：:]\s*S\d+號/g, info.license || '特寵業字第：S1140049號'],
                [/夏洛克動物醫院/g, vet.name || '夏洛克動物醫院'],
                [/04 2426 1608/g, vet.phone || '04 2426 1608'],
                [/臺中市北屯區后庄里后庄路599號/g, vet.address || '臺中市北屯區后庄里后庄路599號'],
            ];
            const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
            let node;
            while ((node = walker.nextNode())) {
                let text = node.textContent;
                let changed = false;
                replacements.forEach(([pattern, replacement]) => {
                    if (pattern.test(text)) {
                        text = text.replace(pattern, replacement);
                        changed = true;
                    }
                });
                if (changed) node.textContent = text;
            }
        });
    </script>
