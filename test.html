        /* 品牌色 — #203B2A 為主 */
        :root {
            --brand-primary: #203B2A;
            --brand-secondary: #4A6B55;
            --brand-accent: #5A7F68;
            --brand-dark: #162B1F;
            --brand-light: #FAF8F5;

            --shadow-sm: 0 1px 3px rgba(32, 59, 42, 0.06);

            --shadow-lg: 0 8px 32px rgba(32, 59, 42, 0.10);
            --shadow-xl: 0 16px 48px rgba(32, 59, 42, 0.12);
        }
        .bg-brand {
            background-color: var(--brand-primary);
        }
        .bg-brand-light {
            background-color: var(--brand-light);
        }
        .bg-brand-warm {
            background-color: var(--brand-warm);
        }
        .text-brand {

        }
        .text-brand-dark {
            color: var(--brand-dark);
        }
        .border-brand {
            border-color: var(--brand-primary);
        }

        /* 卡片 — 輕透米白，更精緻 */
        .glass-premium {
            background: rgba(255, 252, 248, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 252, 248, 0.6);
            box-shadow: 0 2px 12px rgba(30, 53, 39, 0.04), 0 8px 32px rgba(30, 53, 39, 0.06);
            border-radius: 2rem;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            overflow: hidden;
        }
        /* 不支援 backdrop-filter 的手機 fallback */
        @supports not (backdrop-filter: blur(8px)) {
            .glass-premium {
                background: rgba(255, 252, 248, 0.95);
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
            }
            .service-tab-container {
                background: rgba(255, 252, 248, 0.8);
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
            }
        }
        .glass-premium::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25) 0%, transparent 60%);
            pointer-events: none;
            border-radius: inherit;
        }
        .glass-premium:hover {
            box-shadow: 0 4px 24px rgba(30, 53, 39, 0.08), 0 16px 48px rgba(30, 53, 39, 0.10);
            transform: translateY(-4px) scale(1.002);
            background: rgba(255, 252, 248, 0.92);
            border-color: rgba(196, 176, 154, 0.3);
        }
        .glass-premium:hover .icon-hover {
            transform: scale(1.08) rotate(-2deg);
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .glass-premium:hover .card-shimmer {
            opacity: 1;
            transform: translateX(100%);
        }
        .icon-hover {
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        /* 卡片閃光效果 */
        .card-shimmer {
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: skewX(-25deg);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            border-radius: inherit;
        }

        /* 輸入框 — 更細緻 */
        .cute-input {
            background: rgba(255, 252, 248, 0.5);
            border: 1.5px solid #E8E2DA;
            transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            color: #1E3527;
            font-weight: 200;
            font-size: 0.95rem;
            backdrop-filter: blur(4px);
            border-radius: 1.25rem;
            padding: 0.9rem 1.4rem;
            caret-color: var(--brand-primary);
            box-shadow: inset 0 1px 3px rgba(30, 53, 39, 0.03);
        }
        .cute-input:focus {
            background: #ffffff;
            border-color: var(--brand-primary);
            outline: none;
            box-shadow: 0 0 0 6px rgba(30, 53, 39, 0.06), inset 0 1px 3px rgba(30, 53, 39, 0.03);
            transform: translateY(-2px);
        }
        /* 標籤裝飾 */
        .input-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.06em;
            color: #4A6B55;
        }
        .input-label::before {
            content: '';
            width: 3px;
            height: 14px;
            background: linear-gradient(180deg, var(--brand-primary), var(--brand-gold));
            border-radius: 4px;
            opacity: 0.5;
        }
        .cute-input::placeholder {
            color: #C9C0B6;
            font-weight: 200;
            letter-spacing: 0.02em;
        }
        /* 選項按鈕統一美化 */
        .option-btn {
            transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
            border-radius: 1rem;
            font-weight: 300;
        }
        .option-btn:hover:not(.selected) {
            border-color: #C4B09A;
            background: rgba(255, 252, 248, 0.6);
        }
        .option-btn.selected {
            background: #1E3527;
            color: white;
            border-color: #1E3527;
            box-shadow: 0 4px 16px rgba(30, 53, 39, 0.18);
        }

        /* 選項卡片 — 更精緻 */
        .radio-card {
            transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            border: 1px solid #E0D8D0;
            background: rgba(255, 252, 248, 0.4);
            border-radius: 1.25rem;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            min-height: 56px;
        }
        .radio-card:active {
            transform: scale(0.97);
            transition: transform 0.1s ease;
        }
        .radio-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(32, 59, 42, 0.03), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
            border-radius: inherit;
        }
        .radio-card:hover {
            border-color: var(--brand-gold);
            background: rgba(255, 248, 240, 0.8);
            transform: translateY(-1px);
        }
        .radio-card:hover::before {
            opacity: 1;
        }
        .radio-card.selected {
            background-color: #ffffff;
            border-color: var(--brand-primary);
            border-width: 2px;
            box-shadow: 0 8px 28px -10px rgba(32, 59, 42, 0.20);
            transform: translateY(-2px);
        }
        .radio-card.selected::before {
            opacity: 1;
        }
        .radio-card.danger.selected {
            background-color: #FDF6F3;
            border-color: #DBA58B;
        }

        /* Tab 切換 — 更溫潤 */
        .service-tab {
            padding: 0.7rem 1.8rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            border-bottom: 3px solid transparent;
            opacity: 0.45;
            font-size: 0.95rem;
            font-weight: 200;
            letter-spacing: 0.08em;
            border-radius: 0;
            background: transparent;
            color: #203B2A;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            min-height: 48px;
            user-select: none;
        }
        .service-tab:active {
            transform: scale(0.96);
            transition: transform 0.1s ease;
        }
        .service-tab::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 3px;
            background: var(--brand-primary);
            border-radius: 4px;
            transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .service-tab:hover {
            opacity: 0.8;
        }
        .service-tab:hover::after {
            width: 40%;
        }
        .service-tab.active {
            color: var(--brand-dark);
            opacity: 1;
            font-weight: 300;
            background: transparent;
        }
        .service-tab.active::after {
            width: 60%;
        }
        .service-tab-container {
            display: flex;
            justify-content: center;
            gap: 0.25rem;
            margin: 0 0 1.5rem 0;
            padding: 0.5rem;
            width: 100%;
            max-width: 100%;
            background: rgba(255, 252, 248, 0.4);
            border-radius: 1.5rem;
            border: 1px solid rgba(232, 224, 216, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .service-tab-container::-webkit-scrollbar {
            display: none;
        }
        /* 手機上 tab 按鈕縮小 */
        @media (max-width: 480px) {
            .service-tab {
                padding: 0.5rem 0.8rem;
                font-size: 0.8rem;
                min-height: 44px;
            }
            .service-tab-container {
                gap: 0.15rem;
                padding: 0.3rem;
            }
        }

        /* 純文字 Logo */
        .logo-text {
            font-family: 'Noto Serif TC', serif;
            font-weight: 200;
            letter-spacing: 0.2em;
            color: var(--brand-dark);
            line-height: 1.2;
        }
        .logo-text-sub {
            font-family: 'Noto Serif TC', serif;
            font-weight: 200;
            letter-spacing: 0.3em;
            color: var(--brand-primary);
            font-size: 0.7rem;
        }

        /* 背景裝飾 */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.25;
        }

        /* 全螢幕簽名 */
        .fullscreen-signature {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: white;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            height: -webkit-fill-available;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 動畫 */
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(0, 16px); }
        }
        .animate-float {
            animation: float 12s infinite ease-in-out;
        }
        .animate-float-delayed {
            animation: float 14s infinite ease-in-out reverse;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-16px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-down {
            animation: fadeInDown 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up-delay {
            animation: fadeInUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
            opacity: 0;
        }
        .animate-fade-in-up-delay-2 {
            animation: fadeInUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
            opacity: 0;
        }
        .animate-fade-in-up-delay-3 {
            animation: fadeInUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.45s forwards;
            opacity: 0;
        }
        .animate-fade-in-up-delay-4 {
            animation: fadeInUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
            opacity: 0;
        }
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(100%); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes slideDown {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-down {
            animation: slideDown 0.3s ease-out forwards;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* 安全區域 - 完整支援 */
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom, 1rem);
        }
        .safe-area-top {
            padding-top: env(safe-area-inset-top, 0.5rem);
        }
        /* 底部固定元素安全區域 */
        .fixed-bottom-safe {
            padding-bottom: env(safe-area-inset-bottom, 0.5rem);
        }
        /* 所有底部按鈕確保安全區域 */
        .btn-bottom-safe {
            margin-bottom: env(safe-area-inset-bottom, 0.5rem);
        }
        /* 全螢幕覆蓋層安全區域 */
        .fullscreen-safe {
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }
        /* 針對有瀏海的手機調整 */
        @supports (padding: max(0px)) {
            .safe-area-top {
                padding-top: max(env(safe-area-inset-top, 0.5rem), 0.5rem);
            }
            .safe-area-bottom {
                padding-bottom: max(env(safe-area-inset-bottom, 1rem), 1rem);
            }
            .btn-bottom-safe {
                margin-bottom: max(env(safe-area-inset-bottom, 0.5rem), 0.5rem);
            }
        }
        /* 針對 iphone 14 pro 等動態島 */
        @supports (padding-top: env(safe-area-inset-top, 0px)) {
            .safe-area-top-dynamic {
                padding-top: env(safe-area-inset-top, 0.5rem);
            }
        }

        /* 標題裝飾線 — 更細緻 */
        .section-title {
            position: relative;
            padding-bottom: 0.85rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #E8E0D8;
            letter-spacing: 0.04em;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 3.5rem;
            height: 2.5px;
            background: linear-gradient(90deg, var(--brand-primary), var(--brand-gold));
            border-radius: 4px;
            transition: width 0.4s ease;
        }
        .section-title:hover::after {
            width: 5rem;
        }
                /* Scroll 進度條 */
        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--brand-primary), var(--brand-gold), var(--brand-secondary));
            z-index: 999;
            transition: width 0.1s linear;
            border-radius: 0 4px 4px 0;
            box-shadow: 0 0 12px rgba(30, 53, 39, 0.15);
        }
        /* 背景光暈動畫增強 */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.15;
            animation: orbFloat 20s ease-in-out infinite alternate;
        }
        .bg-orb:nth-child(2) {
            animation-delay: -7s;
            animation-duration: 25s;
        }
        .bg-orb:nth-child(3) {
            animation-delay: -14s;
            animation-duration: 18s;
        }
        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 40px) scale(0.9); }
            100% { transform: translate(30px, -10px) scale(1.05); }
        }
                /* 美化按鈕點擊 */
        .btn-soft {
            transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            overflow: hidden;
        }
        .btn-soft:active {
            transform: scale(0.96);
        }
        /* 按鈕漣漪效果 */
        .btn-soft .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0);
            animation: ripple-anim 0.6s ease-out forwards;
            pointer-events: none;
        }
        @keyframes ripple-anim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
        /* 自定義陰影 */
        .shadow-soft {
            box-shadow: 0 4px 20px rgba(30, 53, 39, 0.06);
        }
        /* 頁面整體淡入 */
        .page-enter {
            animation: pagefadein 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes pagefadein {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        /* 漸進式載入動畫 */
        .stagger-children > * {
            opacity: 0;
            animation: fadeInUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .stagger-children > *:nth-child(1) { animation-delay: 0.05s; }
        .stagger-children > *:nth-child(2) { animation-delay: 0.10s; }
        .stagger-children > *:nth-child(3) { animation-delay: 0.15s; }
        .stagger-children > *:nth-child(4) { animation-delay: 0.20s; }
        .stagger-children > *:nth-child(5) { animation-delay: 0.25s; }
        .stagger-children > *:nth-child(6) { animation-delay: 0.30s; }
        .stagger-children > *:nth-child(7) { animation-delay: 0.35s; }
        .stagger-children > *:nth-child(8) { animation-delay: 0.40s; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Toast 彈性進入動畫 */
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.8) translateY(-20px); }
            50% { opacity: 1; transform: scale(1.05) translateY(0); }
            70% { transform: scale(0.97); }
            100% { transform: scale(1); }
        }
        .animate-bounce-in {
            animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        /* 選項按鈕懸浮效果增強 */
        .option-card {
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .option-card:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 24px rgba(30, 53, 39, 0.08);
        }
        .option-card:active {
            transform: scale(0.97);
        }
        
        /* ===== 手機觸控優化 ===== */
        /* 增大觸控區域，同時保持視覺大小 */
        .touch-target {
            position: relative;
        }
        .touch-target::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: inherit;
        }
        /* 手機點擊反饋 - 輕微震動效果 */
        @media (hover: none) and (pointer: coarse) {
            .tap-highlight {
                -webkit-tap-highlight-color: rgba(30, 53, 39, 0.08);
            }
            .tap-highlight:active {
                transform: scale(0.97);
                transition: transform 0.1s ease;
            }
            /* 按鈕觸控反饋 */
            button, 
            .clickable,
            [role="button"],
            .cursor-pointer {
                -webkit-tap-highlight-color: rgba(30, 53, 39, 0.06);
                touch-action: manipulation;
            }
            /* 卡片觸控反饋 */
            .glass-premium:active {
                transform: scale(0.99);
                transition: transform 0.1s ease;
            }
            /* 輸入框在手機上字體不小於 16px 防止縮放 */
            input, select, textarea {
                font-size: 16px !important;
            }
            /* 增加滾動流暢度 */
            * {
                -webkit-overflow-scrolling: touch;
            }
        }
        /* 手機上按鈕最小高度 */
        @media (max-width: 640px) {
            .min-tap-height {
                min-height: 48px;
            }
        }
        
        /* ===== 手機觸控優化增強 ===== */
        /* 觸控震動反饋 - 輕微 */
        .haptic-feedback {
            -webkit-tap-highlight-color: rgba(30, 53, 39, 0.08);
        }

const { useState, useEffect, useRef, useMemo, useCallback } = React;

const dataURLtoBlob = (dataurl) => {
    if (!dataurl) return null;
    try {
        const arr = dataurl.split(',');
        const mime = arr[0].match(/:(.*?);/)[1];
        const bstr = atob(arr[1]);
        let n = bstr.length;
        const u8arr = new Uint8Array(n);
        while (n--) { u8arr[n] = bstr.charCodeAt(n); }
        return new Blob([u8arr], { type: mime });
    } catch (_) { return null; }
};

const Icon = ({ name, size = 20, className = "" }) => {
    const ref = useRef(null);
    useEffect(() => {
        if (ref.current && window.lucide) {
            ref.current.innerHTML = '';
            const i = document.createElement('i');
            i.setAttribute('data-lucide', name);
            i.style.width = '100%';
            i.style.height = '100%';
            ref.current.appendChild(i);
            window.lucide.createIcons({ root: ref.current });
        }
    }, [name]);
    return <span ref={ref} style={{ width: size, height: size, display: 'inline-flex' }} className={className} />;
};

const ToastContainer = () => {
    const [toasts, setToasts] = useState([]);
    const addToast = (message, type = 'info', duration = 4500) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type, duration }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), duration);
    };
    useEffect(() => {
        window.showToast = addToast;
        return () => { window.showToast = () => {}; };
    }, []);
    return (
        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[200] flex flex-col gap-3 w-full max-w-md px-4 pointer-events-none">
            {toasts.map(t => <ToastItem key={t.id} {...t} onClose={() => setToasts(prev => prev.filter(x => x.id !== t.id))} />)}
        </div>
    );
};

const ToastItem = ({ id, message, type = 'info', duration = 4500, onClose }) => {
    const [progress, setProgress] = useState(100);
    const [visible, setVisible] = useState(false);
    useEffect(() => {
        setVisible(true);
        const interval = setInterval(() => {
            setProgress(prev => Math.max(0, prev - (100 / (duration / 100))));
        }, 100);
        return () => clearInterval(interval);
    }, [duration]);
    const handleClose = () => { setVisible(false);
        setTimeout(onClose, 300); };
    const styleMap = { success: 'bg-[#4A6B55]', error: 'bg-[#DBA58B]', warning: 'bg-[#B8A088]', info: 'bg-[#203B2A]' };
    const iconMap = { success: 'check-circle', error: 'alert-circle', warning: 'alert-triangle', info: 'info' };
    return (
        <div className={`pointer-events-auto transform transition-all duration-500 ${visible ? 'translate-y-0 opacity-100 scale-100' : 'translate-y-[-40px] opacity-0 scale-95'}`}>
            <div className={`${styleMap[type] || 'bg-[#203B2A]'} text-white px-6 py-4 rounded-2xl shadow-2xl flex items-start gap-3 relative overflow-hidden backdrop-blur-sm border border-white/10`}>
                <div className={`shrink-0 transition-all duration-500 delay-100 ${visible ? 'scale-100 rotate-0' : 'scale-50 rotate-45'}`}>
                    <Icon name={iconMap[type] || 'info'} size={20} className="mt-0.5" />
                </div>
                <div className="flex-1 text-sm font-bold whitespace-pre-wrap text-left leading-relaxed">{message}</div>
                <button onClick={handleClose} className="ml-2 p-1 hover:bg-white/20 rounded-full transition-all hover:scale-110 active:scale-90"><Icon name="x" size={16} /></button>
                <div className="absolute bottom-0 left-0 h-1 bg-white/30 transition-all duration-100 rounded-full" style={{ width: `${progress}%` }} />
                <div className="absolute inset-0 pointer-events-none bg-gradient-to-r from-white/5 via-transparent to-transparent"></div>
                {/* 彈出動畫指示線 */}
                <div className={`absolute top-0 left-0 w-full h-0.5 bg-gradient-to-r from-white/40 to-transparent transition-all duration-700 ${visible ? 'opacity-100' : 'opacity-0'}`}></div>
            </div>
        </div>
    );
};

    // 當點擊毛孩時，過濾出該毛孩的所有紀錄，並按服務類型分組去重
    const handlePetSelect = (petName) => {
        const filtered = records.filter(r => r.pet_name === petName);
        // 按服務類型去重，保留最新的紀錄
        const groupedByService = {};
        filtered.forEach(rec => {
            // 確保 service_type 有效，如果無效則預設為 'grooming'
            const key = rec.service_type || 'grooming';
            // 如果該服務類型尚未存在，或當前記錄比已存在的記錄更新，則替換
            if (!groupedByService[key]) {
                groupedByService[key] = rec;
            } else {
                const existingDate = new Date(groupedByService[key].created_at);
                const currentDate = new Date(rec.created_at);
                if (currentDate > existingDate) {
                    groupedByService[key] = rec;
                }
            }
        });
        // 將分組後的記錄轉為陣列，並按服務類型排序（確保顯示順序一致）
        const result = Object.values(groupedByService);
        // 按服務類型排序：美容 -> 住宿 -> 安親
        const sortOrder = { grooming: 0, boarding: 1, daycare: 2 };
        result.sort((a, b) => {
            const orderA = sortOrder[a.service_type || 'grooming'] ?? 3;
            const orderB = sortOrder[b.service_type || 'grooming'] ?? 3;
            return orderA - orderB;
        });
        setPetRecords(result);
        setSelectedPet(petName);
    };

    // 回到毛孩列表

        setSelectedPet(null);
        setPetRecords([]);

                setTimeout(initCanvas, 100);

            }
            const ratio = Math.max(window.devicePixelRatio || 1, 1);

            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            const ctx = canvas.getContext('2d');
            ctx.scale(ratio, ratio);
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, rect.width, rect.height);

    <script>
if ('serviceWorker' in navigator) {
    let updatePromptShown = false;
    let updatePromptTimeout = null;

    const showUpdateUIWithDebounce = (worker) => {
        // 如果已經顯示過更新提示，不再重複顯示
        if (updatePromptShown) return;
        // 如果已經有提示正在顯示，先清除
        if (updatePromptTimeout) {
            clearTimeout(updatePromptTimeout);
            updatePromptTimeout = null;
        }
        // 延遲 3 秒後顯示，避免頁面載入時立即彈出
        updatePromptTimeout = setTimeout(() => {
            // 再次檢查是否已經顯示
            if (updatePromptShown) return;
            // 檢查是否已經存在更新橫幅
            if (document.getElementById('pwa-update-banner')) return;
            showUpdateUI(worker);
            updatePromptShown = true;
            // 5 分鐘後重置狀態，允許再次提示
            setTimeout(() => {
                updatePromptShown = false;
            }, 300000);
        }, 3000);
    };

    window.addEventListener('load', () => {
        // 檢查是否已有註冊的 Service Worker
        navigator.serviceWorker.getRegistration().then(reg => {
            if (reg) {
                // 檢查是否有 waiting 狀態的 worker
                if (reg.waiting) {
                    showUpdateUIWithDebounce(reg.waiting);
                }
                // 監聽更新事件
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    if (newWorker) {
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                showUpdateUIWithDebounce(newWorker);
                            }
                        });
                    }
                });
            } else {
                // 沒有註冊，執行註冊
                navigator.serviceWorker.register(`/sw.js?v=${ADMIN_SW_VERSION}`).then(newReg => {
                    if (newReg.waiting) {
                        showUpdateUIWithDebounce(newReg.waiting);
                    }
                    newReg.addEventListener('updatefound', () => {
                        const w = newReg.installing;
                        w.addEventListener('statechange', () => {
                            if (w.state === 'installed' && navigator.serviceWorker.controller) {
                                showUpdateUIWithDebounce(w);
                            }
                        });
                    });
                });
            }
        }).catch(() => {
            // 如果 getRegistration 失敗，直接註冊
            navigator.serviceWorker.register('/sw.js?v=29').then(reg => {
                if (reg.waiting) {
                    showUpdateUIWithDebounce(reg.waiting);
                }
                reg.addEventListener('updatefound', () => {
                    const w = reg.installing;
                    w.addEventListener('statechange', () => {
                        if (w.state === 'installed' && navigator.serviceWorker.controller) {
                            showUpdateUIWithDebounce(w);
                        }
                    });
                });
            });
        });
    });

    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
            window.location.reload();
            refreshing = true;
        }
    });
}

        function showUpdateUI(worker) {
            if (document.getElementById('pwa-update-banner')) return;
            const banner = document.createElement('div');
            banner.id = 'pwa-update-banner';
            banner.className = 'fixed bottom-6 right-6 z-[9999] animate-slide-up';
            banner.innerHTML = `
            <div style="background: rgba(32, 59, 42, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(184, 160, 136, 0.4);"
                 class="p-6 rounded-[24px] shadow-2xl flex flex-col gap-4 min-w-[280px]">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-[#B8A088]/20 rounded-full flex items-center justify-center">
                        <i data-lucide="sparkles" style="color: #B8A088; width: 20px; height: 20px;"></i>
                    </div>
                    <div>
                        <h4 class="text-white font-bold text-sm">系統版本更新</h4>
                        <p class="text-gray-300 text-[10px]">發現新功能，建議立即更新</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button id="pwa-ignore" class="flex-1 py-2 rounded-xl text-gray-300 text-xs font-bold hover:bg-white/10 transition-all">稍後</button>
                    <button id="pwa-update" class="flex-[2] py-2 rounded-xl bg-[#B8A088] text-[#203B2A] text-xs font-bold shadow-lg hover:scale-105 active:scale-95 transition-all">立即更新</button>
                </div>
            </div>
          `;
            document.body.appendChild(banner);
            if (window.lucide) window.lucide.createIcons({ root: banner });
            document.getElementById('pwa-update').addEventListener('click', () => { worker.postMessage({ type: 'SKIP_WAITING' });
                banner.remove(); });
            document.getElementById('pwa-ignore').addEventListener('click', () => {
                banner.classList.add('opacity-0', 'translate-y-4');
                setTimeout(() => banner.remove(), 300);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const info = window.STORE_INFO || {};
            const vet = window.VET_INFO || {};
            const replacements = [
                [/尾尾道來寵物俱樂部/g, info.name || '尾尾道來寵物俱樂部'],
                [/林莉淩/g, info.owner || '林莉淩'],
                [/04-24223481/g, info.phone || '04-24223481'],
                [/臺中市北屯區崇德十路一段88號/g, info.address || '臺中市北屯區崇德十路一段88號'],
                [/特寵業字第[：:]\s*S\d+號/g, info.license || '特寵業字第：S1140049號'],
                [/夏洛克動物醫院/g, vet.name || '夏洛克動物醫院'],
                [/04 2426 1608/g, vet.phone || '04 2426 1608'],
                [/臺中市北屯區后庄里后庄路599號/g, vet.address || '臺中市北屯區后庄里后庄路599號'],
            ];
            const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
            let node;
            while ((node = walker.nextNode())) {
                let text = node.textContent;
                let changed = false;
                replacements.forEach(([pattern, replacement]) => {
                    if (pattern.test(text)) {
                        text = text.replace(pattern, replacement);
                        changed = true;
                    }
                });
                if (changed) node.textContent = text;
            }
        });
                // Scroll 進度條
        window.addEventListener('scroll', () => {
            const winScroll = document.documentElement.scrollTop || document.body.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = height > 0 ? (winScroll / height) * 100 : 0;
            const progress = document.getElementById('scrollProgress');
            if (progress) progress.style.width = scrolled + '%';
        });
    </script>
