        breed: data.breed,
        weight: data.weight || 0,
        age_type: data.age_type,
        age_value: data.age_value || 0,
        sex: data.sex,
        fix: data.fix,
        chip_status: data.chip_status,
        chip_id: data.chip_id,
        health_date: data.health_date || null,
        deworming_monthly: data.deworming_monthly,
        physical_check: data.physical_check,
        physical_other: data.physical_other,

        medical_history: data.medical_history,
        medical_tags: data.medical_tags,
        medical_other: data.medical_other,
        preferred_clinic_name: data.preferred_clinic_name,
        preferred_clinic_phone: data.preferred_clinic_phone,
        check_in_date: data.checkInDate || null,
        check_out_date: data.checkOutDate || null,
        room_type: data.room_type,
        room_price: data.room_price || 0,
        temperament: data.temperament,
        service_tags: data.service_tags,
        note: data.note,
        total_amount: data.total_amount || 0,
        payment_method: data.payment_method,
        deposit: data.deposit || 0,
        balance: data.balance || 0,
        signature: data.signature,
        signature_time: new Date().toISOString(),
        legal_agree: data.legal_agree
    };

    // 2. 寫入 bookings
    const { error: bookingError } = await supabaseClient.from('bookings').insert([bookingData]);
    if (bookingError) {
        console.error('Booking Error:', bookingError);
        throw new Error('預約單送出失敗');

    };

    if (customerError) console.error('Customer Update Error:', customerError);

    return { status: 'success' };

// --- 新的 Toast 系統 ---
const ToastContainer = () => {
    const [toasts, setToasts] = useState([]);

    const addToast = (message, type = 'info', duration = 5000) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type, duration }]);
        
        // 自動移除
        setTimeout(() => {
            removeToast(id);
        }, duration);
    };

    const removeToast = (id) => {
        setToasts(prev => prev.filter(toast => toast.id !== id));
    };

    // 暴露方法到全局
    useEffect(() => {
        window.showToast = addToast;
        window.removeToast = removeToast;
    }, []);

    return (
        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[200] flex flex-col gap-3 w-full max-w-md px-4 pointer-events-none">
            {toasts.map(toast => (
                <ToastItem 
                    key={toast.id} 
                    {...toast} 
                    onClose={() => removeToast(toast.id)} 
                />
            ))}
        </div>
    );
};

const ToastItem = ({ id, message, type = 'info', duration = 5000, onClose }) => {
    const [progress, setProgress] = useState(100);
    const [isVisible, setIsVisible] = useState(false);

    // 進度條動畫
    useEffect(() => {
        setIsVisible(true);
        const interval = setInterval(() => {
            setProgress(prev => {
                if (prev <= 0) {
                    clearInterval(interval);
                    return 0;
                }
                return prev - (100 / (duration / 100));
            });
        }, 100);

        return () => clearInterval(interval);
    }, [duration]);

    // 退出動畫
    const handleClose = () => {
        setIsVisible(false);
        setTimeout(onClose, 300);
    };

    const typeStyles = {
        success: 'bg-green-500',
        error: 'bg-red-500',
        warning: 'bg-orange-500',
        info: 'bg-blue-500'
    };

    const icons = {
        success: 'check-circle',
        error: 'alert-circle',
        warning: 'alert-triangle',
        info: 'info'
    };

    return (
        <div 
            className={`pointer-events-auto transform transition-all duration-300 ${
                isVisible ? 'translate-y-0 opacity-100' : 'translate-y-[-20px] opacity-0'
            }`}
        >
            <div className={`${typeStyles[type]} text-white px-6 py-4 rounded-2xl shadow-2xl flex items-start gap-3 relative overflow-hidden`}>
                <Icon name={icons[type]} size={20} className="mt-0.5 shrink-0" />
                <div className="flex-1 text-sm font-bold whitespace-pre-wrap text-left">
                    {message}
                </div>
                <button 
                    onClick={handleClose}
                    className="ml-2 p-1 hover:bg-white/20 rounded-full transition-colors"
                >
                    <Icon name="x" size={16} />
                </button>
                <div 
                    className="absolute bottom-0 left-0 h-1 bg-white/30 transition-all duration-100"
                    style={{ width: `${progress}%` }}
                />
            </div>
        </div>
    );
};

        const dataURLtoBlob = (dataurl) => {
            if(!dataurl) return null;
            const arr = dataurl.split(',');
            const mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]);
            let n = bstr.length;
            const u8arr = new Uint8Array(n);
            while (n--) { u8arr[n] = bstr.charCodeAt(n); }
            return new Blob([u8arr], { type: mime });
        };

// 輔助顯示 (修正：自動處理 JSON 字串)
            const show = (val) => val || '<span style="color:#ccc;">未填寫</span>';
            const arr = (val) => {
                let target = val;
                // 如果是字串格式，嘗試解析回陣列
                if (typeof target === 'string' && target.trim().startsWith('[')) {
                    try { target = JSON.parse(target); } catch (e) { }
                }
                // 如果是陣列，進行合併；若仍是字串則直接顯示
                if (Array.isArray(target)) return target.length > 0 ? target.join('、') : '無';
                return (target && target !== '[]') ? target : '無';

const safeParse = (value) => {
  // 1. 如果是空值，回傳空陣列
  if (!value) return [];
  
  // 2. 如果已經是陣列，直接回傳
  if (Array.isArray(value)) return value;
  
  // 3. 如果是字串，嘗試解析
  if (typeof value === 'string') {
    try {
      // 嘗試解析 JSON (例如 "[\"正常\"]")
      return JSON.parse(value);
    } catch (e) {
      // 4. 如果解析失敗（例如是單純字串 "正常"），將其包裝成陣列
      return [value];
    }
  }
  
  // 5. 其他情況回傳空陣列
  return [];
};

                                <li>若隱瞞攻擊行為導致傷亡或財損，<span className="text-red-500 font-bold">本館有權向飼主全額求償</span>。</li>
                                <li>若寵物持續吠叫影響營運或安寧，本館將聯繫飼主或緊急聯絡人<span className="text-red-500 font-bold underline">先行帶回</span>。</li>
                                <li>突發疾病須送醫時，相關<span className="text-red-500 font-bold underline">醫療及交通費用由飼主全額負擔</span>。</li>
                                <li>隱瞞病況或本身具有高風險疾病（心臟病、癲癇等），若發生意外或死亡，經判定本館無疏失，<span className="text-red-500 font-bold">本館不負責賠償責任</span>。</li>
                                <li>若因人為疏失導致走失、傷亡，本館依法賠償，<span className="text-red-500 font-bold underline">賠償上限為新台幣 30,000 元整</span>（玩耍小傷痕除外）。</li>
                                <li>若店內物品（攝影機、房間隔間等）遭到破壞，<span className="text-red-500 font-bold underline">本館有權向飼主全額求償</span>。</li>
                                <li>寵物若因年老或舊疾死亡，請於 24 小時內領回。若需鑑定死因請於 24 小時內會同辦理，<span className="font-bold underline">逾期不得異議</span>。</li>
                                <li>散步時若因寵物掙脫牽繩導致逃跑或傷亡，<span className="text-red-500 font-bold">本館不負責相關賠償事宜</span>。</li>
                                <li>其餘細節將依照行政院農委會定型化契約範本辦理。</li>
                                <li>本同意書一式兩份，由飼主與本館各執乙份。因本契約所產生之訴訟，雙方合意將以桃園地方法院為第一審管轄法院。</li>
                            </ol>
                            <div className="mt-6 p-4 bg-slate-50 rounded-xl border border-slate-200 text-xs text-slate-500 space-y-1">
                                <p>■ 經甲乙雙方合意約定，由甲方即時閱讀理解本契約內容並簽署。</p>
                                <p>■ 經甲方本人已確認預計接回時間與服務金額無誤，並同意上述條款。</p>
                            </div>
                        </div>
                    </TermsModal>

                    {showFullSig && (
                        <div className="fullscreen-signature animate-fade-in"><div className="p-4 bg-ttpc-orange text-white flex justify-between items-center shrink-0 shadow-md safe-area-top"><span className="font-bold text-lg flex items-center gap-3"><Icon name="pen-tool" size={24}/> 請在此簽名</span><button onClick={()=>setShowFullSig(false)} className="p-2 hover:bg-white/10 rounded-full transition-colors"><Icon name="x" size={28}/></button></div><div className="flex-1 bg-slate-100 relative p-4">
                                <div className="absolute inset-4 bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                                    <canvas ref={fullSigCanvasRef} className="w-full h-full block cursor-crosshair"></canvas>
                                </div>
                                <div className="absolute bottom-6 right-6 text-slate-300 text-xs font-bold pointer-events-none">TTPC SIGNATURE</div>
                            </div><div className="p-6 bg-white border-t flex gap-4 shrink-0 safe-area-bottom"><button onClick={()=>{padInstance.current.clear()}} className="flex-1 py-4 bg-slate-100 font-bold text-slate-500 rounded-xl hover:bg-slate-200 transition-colors text-lg">清除重寫</button><button onClick={saveSignature} className="flex-[2] py-4 bg-ttpc-orange font-bold text-white rounded-xl shadow-lg hover:bg-[#B8511F] transition-colors text-lg">確認簽名</button></div></div>
                    )}

                    {showSuccess && (
                        <div className="fixed inset-0 z-[200] bg-ttpc-orange/40 backdrop-blur-md flex items-center justify-center p-4"><div className="bg-white rounded-[2.5rem] p-10 max-w-sm w-full text-center space-y-8 animate-slide-down shadow-2xl relative overflow-hidden"><div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-ttpc-yellow to-[#B8511F]"></div><div className="w-28 h-28 bg-green-50 rounded-full flex items-center justify-center mx-auto text-green-500 mb-4 shadow-inner"><Icon name="check" size={56} strokeWidth={3} /></div><div><h3 className="text-3xl font-black text-[#3D2B1F] mb-3">🎉 送出成功！</h3><p className="text-slate-500 text-base leading-relaxed">您的資料已成功送出。<br/>我們會盡快透過電話或 LINE 與您確認。</p></div><button onClick={() => window.location.reload()} className="w-full py-5 bg-ttpc-orange text-white rounded-2xl font-bold shadow-xl hover:bg-[#B8511F] transition-colors text-lg">返回首頁</button></div></div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
             </script>
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js?v=1').then(reg => {
                if (reg.waiting) {
                    showUpdateUI(reg.waiting);
                }
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            showUpdateUI(newWorker);
                        }
                    });
                });
            });
        });

        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!refreshing) {
                window.location.reload();
                refreshing = true;
            }
        });
    }

    function showUpdateUI(worker) {
        if (document.getElementById('pwa-update-banner')) return;

        const banner = document.createElement('div');
        banner.id = 'pwa-update-banner';
        banner.className = 'fixed bottom-6 right-6 z-[9999] animate-slide-up';
        banner.innerHTML = `
            <div style="background: rgba(212, 98, 42, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(197, 160, 101, 0.5);" 
                 class="p-6 rounded-[24px] shadow-2xl flex flex-col gap-4 min-w-[280px]">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-[#E8B84B]/20 rounded-full flex items-center justify-center">
                        <i data-lucide="sparkles" style="color: #E8B84B; width: 20px; height: 20px;"></i>
                    </div>
                    <div>
                        <h4 class="text-white font-bold text-sm">系統版本更新</h4>
                        <p class="text-gray-300 text-[10px]">發現新功能，建議立即更新</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button id="pwa-ignore" class="flex-1 py-2 rounded-xl text-gray-400 text-xs font-bold hover:bg-white/10 transition-all">
                        稍後
                    </button>
                    <button id="pwa-update" class="flex-[2] py-2 rounded-xl bg-[#E8B84B] text-[#D4622A] text-xs font-bold shadow-lg hover:scale-105 active:scale-95 transition-all">
                        立即更新
                    </button>
                </div>
            </div>
        `;
        document.body.appendChild(banner);

        if (window.lucide) window.lucide.createIcons({ root: banner });

        document.getElementById('pwa-update').addEventListener('click', () => {
            worker.postMessage({ type: 'SKIP_WAITING' });
            banner.remove();
        });

        document.getElementById('pwa-ignore').addEventListener('click', () => {
            banner.classList.add('opacity-0', 'translate-y-4');
            setTimeout(() => banner.remove(), 300);
        });
    }
</script>
</body>                                               <Icon name="chevron-right" className="text-gray-300"/>
</html>
