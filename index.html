const { useState, useEffect, useRef, useMemo, useCallback } = React;

const dataURLtoBlob = (dataurl) => {
    if (!dataurl) return null;
    try {
        const arr = dataurl.split(',');
        const mime = arr[0].match(/:(.*?);/)[1];
        const bstr = atob(arr[1]);
        let n = bstr.length;
        const u8arr = new Uint8Array(n);
        while (n--) { u8arr[n] = bstr.charCodeAt(n); }
        return new Blob([u8arr], { type: mime });
    } catch (_) { return null; }
};

const Icon = ({ name, size = 20, className = "" }) => {
    const ref = useRef(null);
    useEffect(() => {
        if (ref.current && window.lucide) {
            ref.current.innerHTML = '';
            const i = document.createElement('i');
            i.setAttribute('data-lucide', name);
            i.style.width = '100%';
            i.style.height = '100%';
            ref.current.appendChild(i);
            window.lucide.createIcons({ root: ref.current });
        }
    }, [name]);
    return <span ref={ref} style={{ width: size, height: size, display: 'inline-flex' }} className={className} />;
};

const ToastContainer = () => {
    const [toasts, setToasts] = useState([]);
    const addToast = (message, type = 'info', duration = 4500) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type, duration }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), duration);
    };
    useEffect(() => {
        window.showToast = addToast;
        return () => { window.showToast = () => {}; };
    }, []);
    return (
        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[200] flex flex-col gap-3 w-full max-w-md px-4 pointer-events-none">
            {toasts.map(t => <ToastItem key={t.id} {...t} onClose={() => setToasts(prev => prev.filter(x => x.id !== t.id))} />)}
        </div>
    );
};

const ToastItem = ({ id, message, type = 'info', duration = 4500, onClose }) => {
    const [progress, setProgress] = useState(100);
    const [visible, setVisible] = useState(false);
    useEffect(() => {
        setVisible(true);
        const interval = setInterval(() => {
            setProgress(prev => Math.max(0, prev - (100 / (duration / 100))));
        }, 100);
        return () => clearInterval(interval);
    }, [duration]);
    const handleClose = () => { setVisible(false);
        setTimeout(onClose, 300); };
    const styleMap = { success: 'bg-[#4A6B55]', error: 'bg-[#DBA58B]', warning: 'bg-[#B8A088]', info: 'bg-[#203B2A]' };
    const iconMap = { success: 'check-circle', error: 'alert-circle', warning: 'alert-triangle', info: 'info' };
    return (
        <div className={`pointer-events-auto transform transition-all duration-300 ${visible ? 'translate-y-0 opacity-100' : 'translate-y-[-20px] opacity-0'}`}>
            <div className={`${styleMap[type] || 'bg-[#203B2A]'} text-white px-6 py-4 rounded-2xl shadow-2xl flex items-start gap-3 relative overflow-hidden`}>
                <Icon name={iconMap[type] || 'info'} size={20} className="mt-0.5 shrink-0" />
                <div className="flex-1 text-sm font-bold whitespace-pre-wrap text-left leading-relaxed">{message}</div>
                <button onClick={handleClose} className="ml-2 p-1 hover:bg-white/20 rounded-full transition-colors"><Icon name="x" size={16} /></button>
                <div className="absolute bottom-0 left-0 h-1 bg-white/30 transition-all duration-100" style={{ width: `${progress}%` }} />
            </div>
        </div>
    );
};

const TermsModal = ({ isOpen, onClose, title, children, onAgree }) => {
    const contentRef = useRef(null);
    const [canAgree, setCanAgree] = useState(false);
    useEffect(() => {
        if (isOpen) {
            setCanAgree(false);
            document.body.style.overflow = 'hidden';
            setTimeout(() => {
                if (contentRef.current && contentRef.current.scrollHeight <= contentRef.current.clientHeight + 10) {
                    setCanAgree(true);
                }
            }, 350);
        } else {
            document.body.style.overflow = '';
        }
    }, [isOpen]);
    const handleScroll = (e) => {
        const { scrollTop, scrollHeight, clientHeight } = e.target;
        if (scrollHeight - scrollTop - clientHeight < 40) setCanAgree(true);
    };
    if (!isOpen) return null;
    return (
        <div className="fixed inset-0 z-[150] bg-[#203B2A]/40 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in">
            <div className="bg-white w-full max-w-lg rounded-3xl shadow-2xl flex flex-col max-h-[85vh] animate-slide-up">

                        <Icon name="x" size={20} className="text-[#4A6B55]" />
                    </button>
                </div>
                <div ref={contentRef} onScroll={handleScroll} className="flex-1 overflow-y-auto p-6 text-sm text-[#203B2A] leading-relaxed space-y-4">

                    {!canAgree && <div className="text-center text-xs font-bold text-[#B8A088] mb-3 animate-pulse">👇 請滑動至最底部以同意條款</div>}
                    <button onClick={() => { if (canAgree) { onAgree && onAgree();

    );
};

const HistoryModal = ({ records, onClose, onSelect }) => {
    const [selectedPet, setSelectedPet] = useState(null);
    const [petRecords, setPetRecords] = useState([]);

    // 當點擊毛孩時，過濾出該毛孩的所有紀錄，並按服務類型分組去重
    const handlePetSelect = (petName) => {
        const filtered = records.filter(r => r.pet_name === petName);
        // 按服務類型去重，保留最新的紀錄
        const groupedByService = {};
        filtered.forEach(rec => {
            // 確保 service_type 有效，如果無效則預設為 'grooming'
            const key = rec.service_type || 'grooming';
            // 如果該服務類型尚未存在，或當前記錄比已存在的記錄更新，則替換
            if (!groupedByService[key]) {
                groupedByService[key] = rec;
            } else {
                const existingDate = new Date(groupedByService[key].created_at);
                const currentDate = new Date(rec.created_at);
                if (currentDate > existingDate) {
                    groupedByService[key] = rec;
                }
            }
        });
        // 將分組後的記錄轉為陣列，並按服務類型排序（確保顯示順序一致）
        const result = Object.values(groupedByService);
        // 按服務類型排序：美容 -> 住宿 -> 安親
        const sortOrder = { grooming: 0, boarding: 1, daycare: 2 };
        result.sort((a, b) => {
            const orderA = sortOrder[a.service_type || 'grooming'] ?? 3;
            const orderB = sortOrder[b.service_type || 'grooming'] ?? 3;
            return orderA - orderB;
        });
        setPetRecords(result);
        setSelectedPet(petName);
    };

    // 回到毛孩列表
    const handleBack = () => {
        setSelectedPet(null);
        setPetRecords([]);

    };

    const uniquePets = useMemo(() => {
        const seen = new Set();
        return records.filter(r => {
            const name = r.pet_name || '未命名寶貝';
            if (seen.has(name)) return false;
            seen.add(name);
            return true;
        });

                                            phone: firstRecord.phone,

                                const icon = getServiceIcon(serviceType);

                                if (record.created_at) {
                                    try {
                                        const d = new Date(record.created_at);

                                    // 房型可能是陣列或字串，統一處理
                                    let roomDisplay = record.room_type;
                                    try {
                                        if (typeof roomDisplay === 'string' && roomDisplay.startsWith('[')) {
                                            const parsed = JSON.parse(roomDisplay);
                                            if (Array.isArray(parsed)) {
                                                roomDisplay = parsed.join('、');
                                            }
                                        } else if (Array.isArray(roomDisplay)) {
                                            roomDisplay = roomDisplay.join('、');
                                        }
                                    } catch (_) {}
                                    extraInfo = `房型: ${roomDisplay}`;
                                } else if (serviceType === 'grooming' && record.service_tags) {
                                    try {
                                        const tags = typeof record.service_tags === 'string' ? JSON.parse(record.service_tags) : record.service_tags;
                                        if (Array.isArray(tags) && tags.length > 0) {
                                            // 過濾掉分類標題
                                            const filteredTags = tags.filter(t => !['基礎服務', '加購與升級', '其他項目'].includes(t));

                                                extraInfo = `服務: ${filteredTags.slice(0, 3).join('、')}${filteredTags.length > 3 ? '...' : ''}`;
                                            }
                                        }
                                    } catch (_) {}
                                } else if (serviceType === 'daycare' && record.room_type) {
                                    // 安親的 room_type 可能是陣列，解析後顯示
                                    let roomDisplay = record.room_type;
                                    try {
                                        if (typeof roomDisplay === 'string' && roomDisplay.startsWith('[')) {
                                            const parsed = JSON.parse(roomDisplay);
                                            if (Array.isArray(parsed)) {
                                                roomDisplay = parsed.join('、');
                                            }
                                        } else if (Array.isArray(roomDisplay)) {
                                            roomDisplay = roomDisplay.join('、');
                                        }
                                    } catch (_) {}
                                    extraInfo = `服務: ${roomDisplay}`;
                                }
                                return (
                                    <button
                                        key={record.id || idx}
                                        onClick={() => {
                                            onSelect(record);

                                    >
                                        <div className="w-10 h-10 rounded-full bg-[#203B2A]/10 flex items-center justify-center text-lg">
                                            {icon}
                                        </div>
                                        <div className="flex-1">
                                            <div className="font-bold text-[#203B2A] text-base">{label}</div>
                                            <div className="text-xs text-[#B5A89C]">
                                                {dateStr}
                                                {extraInfo && <span className="ml-2 text-[#4A6B55]">· {extraInfo}</span>}
                                            </div>
                                        </div>
                                        <div className="text-[#203B2A] opacity-0 group-hover:opacity-100 transition-opacity">
                                            <Icon name="arrow-right" size={20} />
                                        </div>
                                    </button>
                                );
                            })}
                            <button
                                onClick={handleBack}
                                className="w-full py-3 rounded-xl text-[#B5A89C] font-bold text-sm hover:bg-[#FAF8F5] transition-colors"
                            >
                                ← 返回選擇毛孩
                            </button>
                        </>
                    )}
                </div>

                {/* 底部按鈕 */}
                <div className="p-4 bg-white border-t border-[#DDD6CE]">
                    <button onClick={onClose} className="w-full py-3 rounded-xl text-[#B5A89C] font-bold text-sm hover:bg-[#FAF8F5] transition-colors">
                        取消搜尋
                    </button>
                </div>
            </div>
        </div>
    );
};

    // 修正點 1：真正的風險判斷邏輯 (包含生日模式)
    const isHighRisk = useMemo(() => {
        // 有病史
        if (formData.medical_history === '有') return true;
        
        // 如果使用生日模式，計算年齡
        if (formData.use_birthday !== false && formData.pet_birthday) {
            const birthDate = new Date(formData.pet_birthday);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            // 高齡 (8歲以上) 或 幼齡 (3個月以下)
            if (age >= 8) return true;
            if (age < 1) {
                const monthAge = (today - birthDate) / (1000 * 60 * 60 * 24 * 30.44);
                if (monthAge <= 3) return true;
            }
            return false;
        }
        
        // 使用年齡模式
        if (formData.age_type === 'year' && parseFloat(formData.age_value) >= 8) return true;
        if (formData.age_type === 'month' && parseFloat(formData.age_value) <= 3) return true;
        return false;
    }, [formData.medical_history, formData.age_type, formData.age_value, formData.use_birthday, formData.pet_birthday]);

    // 修正點 2：正確判斷 image_consent (允許 false 為有效)
    const allTermsCompleted = useMemo(() => {
        // 美容條款必須閱讀
        if (!termsRead.beauty) return false;
        // 住宿或安親模式必須閱讀住宿條款
        if (serviceType !== 'grooming' && !termsRead.boarding) return false;
        // 高風險條款：只有在 isHighRisk 為 true 時才需要閱讀
        if (isHighRisk) {
            if (!termsRead.highRiskBeauty) return false;
            if (serviceType !== 'grooming' && !termsRead.highRiskBoarding) return false;
        }
        // 必須選擇「同意」或「不同意」，不能是 null 或 undefined
        if (formData.image_consent === null || formData.image_consent === undefined) return false;
        // 簽名檢查移到 validate() 中處理，這裡不檢查簽名
        return true;
    }, [termsRead, serviceType, isHighRisk, formData.image_consent]);

    const validationRules = {
        owner_name: { required: true, message: '請輸入飼主姓名' },
        phone: { required: true, pattern: /^09\d{8}$/, message: '請輸入正確的手機號碼格式 (09xxxxxxxx)' },
        owner_id: { required: true, pattern: /^[A-Z][12]\d{8}$/, message: '請輸入正確的身分證字號格式' },
        address: { required: true, message: '請輸入聯絡地址' },
        emergency_name: { required: true, message: '請輸入緊急聯絡人姓名' },
        emergency_phone: { required: true, message: '請輸入緊急聯絡人電話' },
        pet_name: { required: true, message: '請輸入寵物名字' },
        pet_type: { required: true, message: '請選擇寵物種類' },
        breed: { required: true, message: '請輸入品種' },
        weight: { required: true, message: '請輸入體重' },
        age_value: { required: true, message: '請輸入年齡' },
        age_type: { required: true, message: '請選擇年齡單位' },
        sex: { required: true, message: '請選擇性別' },
        fix: { required: true, message: '請選擇是否結紮' },
        chip_status: { required: true, message: '請選擇晶片狀態' },
        medical_history: { required: true, message: '請選擇過往病史' },
        deworming_monthly: { required: true, message: '請選擇是否每月定期驅蟲' },
        physical_check: { required: true, message: '請選擇外觀檢查項目' },
        social_traits: { required: true, message: '請選擇寵物個性' },
        has_experience: { required: true, message: '請選擇有無美容/安親/住宿經驗' },
        is_heat: { required: true, message: '請選擇是否正在發情期或生理期' },
        has_surgery: { required: true, message: '請選擇是否有做過結紮以外的手術' },
    };

    const validateField = (name, value) => {
        const rule = validationRules[name];
        if (!rule) return null;
        if (rule.required && !value) return rule.message || '此欄位為必填';
        if (rule.pattern && !rule.pattern.test(value)) return rule.message || '格式不正確';
        return null;
    };

    const clearError = (name) => {
        setErrors(prev => { const n = { ...prev };
            delete n[name]; return n; });
    };

    const handleChange = (field, value) => {
        setFormData(prev => ({ ...prev, [field]: value }));
        clearError(field);
    };

    const toggleArray = (field, value) => {
        setFormData(prev => {
            const arr = prev[field] || [];
            return { ...prev, [field]: arr.includes(value) ? arr.filter(i => i !== value) : [...arr, value] };
        });
    };

    const handleTermAgree = (type) => {
        setTermsRead(prev => ({ ...prev, [type]: true }));
        setFormData(prev => ({ ...prev, legal_agree: true }));
    };

    const validate = () => {
        const newErrors = {};
        let hasError = false;
        Object.keys(validationRules).forEach(key => {
            const err = validateField(key, formData[key]);
            if (err) { newErrors[key] = err;
                hasError = true; }
        });

        if (serviceType === 'boarding') {
            if (!formData.checkInDate) { newErrors.checkInDate = '請選擇入住日期';
                hasError = true; }
            if (!formData.checkOutDate) { newErrors.checkOutDate = '請選擇退房日期';
                hasError = true; } else if (formData.checkInDate && new Date(formData.checkOutDate) < new Date(formData
                    .checkInDate)) {
                newErrors.checkOutDate = '退房日期不可早於入住日期';
                hasError = true;
            }
            if (!formData.room_type || formData.room_type.length === 0) { newErrors.room_type = '請至少選擇一項房型';
                hasError = true; }
        }

        if (serviceType === 'daycare') {
            if (!formData.daycare_date) { newErrors.daycare_date = '請選擇安親日期';
                hasError = true; }
            if (!formData.pickup_time) { newErrors.pickup_time = '請選擇預計接回時間';
                hasError = true; }
            if ((!formData.room_type || formData.room_type.length === 0) && !formData.isFamilyRoom) { 
                newErrors.room_type = '請至少選擇一項服務內容';
                hasError = true; 
            }
        }

        if (serviceType === 'grooming' && (!formData.service_tags || formData.service_tags.length === 0)) {
            newErrors.service_tags = '請至少選擇一項美容服務';
            hasError = true;
        }

        // 簽名驗證：必須有簽名資料
        if (!formData.signature) { 
            newErrors.signature = '請完成數位簽名';
            hasError = true; 
        }

        // 額外驗證：確保簽名不是空字串或只有空白
        if (formData.signature && formData.signature.trim() === '') {
            newErrors.signature = '請完成數位簽名';
            hasError = true;
        }

        setErrors(newErrors);
        if (hasError) {
            const keys = Object.keys(newErrors);
            // 如果簽名有錯誤，優先滾動到簽名區塊
            let targetKey = keys[0];
            if (keys.includes('signature')) {
                targetKey = 'signature';
            }
            const top = keys.slice(0, 3).map(k => newErrors[k]);
            const msg = '請修正以下錯誤：\n' + top.join('\n') + (keys.length > 3 ? `\n\n還有 ${keys.length-3} 個欄位需要修正` :
            '');
            window.showToast(msg, 'error');
            // 滾動到簽名區塊或第一個錯誤欄位
            if (targetKey === 'signature') {
                const sigEl = document.getElementById('signature');
                if (sigEl) sigEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                const first = document.querySelector(`[name="${targetKey}"]`);
                if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
        return !hasError;
    };

    const handleSearchHistory = async () => {
        const phone = formData.phone;
        if (!phone || phone.length < 9) { window.showToast('⚠️ 請先輸入完整的連絡電話', 'error'); return; }
        setIsSearching(true);
        try {
            const { data, error } = await window.supabaseClient.from('bookings').select('*').eq('phone', phone)
                .order('created_at', { ascending: false });
            if (error) throw error;
            if (!data || data.length === 0) { window.showToast('🔍 查無此電話的過往紀錄', 'error'); } else {
                // 保留所有紀錄，不要只保留一筆
                // 但為了顯示毛孩列表，我們先按毛孩名稱分組，保留每個毛孩的最近一筆紀錄用於列表顯示
                // 實際的紀錄會在 HistoryModal 中按服務類型分組
                const unique = new Map();
                data.forEach(rec => {
                    if (!rec.pet_name) return;
                    const name = rec.pet_name;
                    // 只保留每個毛孩的最新一筆紀錄用於列表顯示（但不丟棄其他紀錄）
                    if (!unique.has(name)) {

            if (!canvas) return;
            const container = canvas.parentElement;
            const rect = container.getBoundingClientRect();
            if (rect.width === 0 || rect.height === 0) {
                // 如果尺寸為 0，稍後再試
                setTimeout(initCanvas, 100);
                return;
            }
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = rect.width * ratio;
            canvas.height = rect.height * ratio;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            const ctx = canvas.getContext('2d');
            ctx.scale(ratio, ratio);
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, rect.width, rect.height);
            if (padInstance.current) padInstance.current.off();
            padInstance.current = new SignaturePad(canvas, {
                penColor: '#203B2A',
                backgroundColor: '#ffffff',
                minWidth: 1.2,
                maxWidth: 3.5,
            });
        };
        if (showFullSig) {
            document.body.style.overflow = 'hidden';

            timer = setTimeout(initCanvas, 150);
            // 監聽容器尺寸變化

            if (container) {
                resizeObserver = new ResizeObserver(() => {
                    if (showFullSig) initCanvas();
                });
                resizeObserver.observe(container);
            }
        }

            if (timer) clearTimeout(timer);
            if (resizeObserver) resizeObserver.disconnect();

                    </ol>

                    <div className="mt-6 p-4 bg-[#FAF8F5] rounded-xl border border-[#DDD6CE] text-xs text-[#B5A89C] space-y-1">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js?v=15').then(reg => {
                    if (reg.waiting) showUpdateUI(reg.waiting);
                    reg.addEventListener('updatefound', () => {
                        const w = reg.installing;
                        w.addEventListener('statechange', () => {
                            if (w.state === 'installed' && navigator.serviceWorker.controller) {
                                showUpdateUI(w);
                            }
                        });
                    });
                });
            });
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) { window.location.reload();
                    refreshing = true; }
            });
        }

        function showUpdateUI(worker) {
            if (document.getElementById('pwa-update-banner')) return;
            const banner = document.createElement('div');
            banner.id = 'pwa-update-banner';
            banner.className = 'fixed bottom-6 right-6 z-[9999] animate-slide-up';
            banner.innerHTML = `
            <div style="background: rgba(32, 59, 42, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(184, 160, 136, 0.4);"
                 class="p-6 rounded-[24px] shadow-2xl flex flex-col gap-4 min-w-[280px]">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-[#B8A088]/20 rounded-full flex items-center justify-center">
                        <i data-lucide="sparkles" style="color: #B8A088; width: 20px; height: 20px;"></i>
                    </div>
                    <div>
                        <h4 class="text-white font-bold text-sm">系統版本更新</h4>
                        <p class="text-gray-300 text-[10px]">發現新功能，建議立即更新</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button id="pwa-ignore" class="flex-1 py-2 rounded-xl text-gray-300 text-xs font-bold hover:bg-white/10 transition-all">稍後</button>
                    <button id="pwa-update" class="flex-[2] py-2 rounded-xl bg-[#B8A088] text-[#203B2A] text-xs font-bold shadow-lg hover:scale-105 active:scale-95 transition-all">立即更新</button>
                </div>
            </div>
          `;
            document.body.appendChild(banner);
            if (window.lucide) window.lucide.createIcons({ root: banner });
            document.getElementById('pwa-update').addEventListener('click', () => { worker.postMessage({ type: 'SKIP_WAITING' });
                banner.remove(); });
            document.getElementById('pwa-ignore').addEventListener('click', () => {
                banner.classList.add('opacity-0', 'translate-y-4');
                setTimeout(() => banner.remove(), 300);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const info = window.STORE_INFO || {};
            const vet = window.VET_INFO || {};
            const replacements = [
                [/尾尾道來寵物俱樂部/g, info.name || '尾尾道來寵物俱樂部'],
                [/林莉淩/g, info.owner || '林莉淩'],
                [/04-24223481/g, info.phone || '04-24223481'],
                [/臺中市北屯區崇德十路一段88號/g, info.address || '臺中市北屯區崇德十路一段88號'],
                [/特寵業字第[：:]\s*S\d+號/g, info.license || '特寵業字第：S1140049號'],
                [/夏洛克動物醫院/g, vet.name || '夏洛克動物醫院'],
                [/04 2426 1608/g, vet.phone || '04 2426 1608'],
                [/臺中市北屯區后庄里后庄路599號/g, vet.address || '臺中市北屯區后庄里后庄路599號'],
            ];
            const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
            let node;
            while ((node = walker.nextNode())) {
                let text = node.textContent;
                let changed = false;
                replacements.forEach(([pattern, replacement]) => {
                    if (pattern.test(text)) {
                        text = text.replace(pattern, replacement);
                        changed = true;
                    }
                });
                if (changed) node.textContent = text;
            }
        });
                // Scroll 進度條
        window.addEventListener('scroll', () => {
            const winScroll = document.documentElement.scrollTop || document.body.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = height > 0 ? (winScroll / height) * 100 : 0;
            const progress = document.getElementById('scrollProgress');
            if (progress) progress.style.width = scrolled + '%';
        });
    </script>
