                if (isOpen && config) {
                    setLocalConfig(JSON.parse(JSON.stringify(config)));
                }

                const newItem = { name: newItemName.trim(), price: newItemPrice.trim() || '0' };

                        newConfig.grooming.basic = [...newConfig.grooming.basic, newItemName.trim()];

                        newConfig.boarding.rooms = [...newConfig.boarding.rooms, { name: newItemName.trim(), price: parseInt(newItemPrice) || 0, desc: '' }];

                        newConfig.daycare.services = [...newConfig.daycare.services, { name: newItemName.trim(), price: newItemPrice.trim() || '0' }];
                    }
                    return newConfig;
                });
                setNewItemName('');
                setNewItemPrice('');
                setEditingIndex(null);

                        newConfig.grooming.upgrade = newConfig.grooming.upgrade.filter((_, i) => i !== index);

                        newConfig.grooming.other = newConfig.grooming.other.filter((_, i) => i !== index);
                    } else if (category === 'rooms') {
                        newConfig.boarding.rooms = newConfig.boarding.rooms.filter((_, i) => i !== index);
                    } else if (category === 'daycare') {
                        newConfig.daycare.services = newConfig.daycare.services.filter((_, i) => i !== index);
                    }
                    return newConfig;
                });
            };

            const handleUpdateItem = (category, index, field, value) => {
                setLocalConfig(prev => {
                    const newConfig = { ...prev };
                    if (category === 'upgrade' && newConfig.grooming.upgrade[index]) {
                        newConfig.grooming.upgrade[index][field] = value;
                    } else if (category === 'rooms' && newConfig.boarding.rooms[index]) {
                        newConfig.boarding.rooms[index][field] = value;
                    } else if (category === 'daycare' && newConfig.daycare.services[index]) {
                        newConfig.daycare.services[index][field] = value;
                    } else if (category === 'basic' && newConfig.grooming.basic[index] !== undefined) {
                        newConfig.grooming.basic[index] = value;
                    } else if (category === 'other' && newConfig.grooming.other[index] !== undefined) {
                        newConfig.grooming.other[index] = value;
                    }
                    return newConfig;
                });
            };

const handleSave = () => {

};

                        <div className="px-6 pt-4 border-b border-[#DDD6CE] shrink-0">
                            <div className="tab-container overflow-x-auto no-scrollbar px-1 sm:px-2">                                <button className={`tab-btn ${activeTab === 'grooming' ? 'active' : ''}`} onClick={()=>setActiveTab('grooming')}>✧ 美容</button>
                                <button className={`tab-btn ${activeTab === 'boarding' ? 'active' : ''}`} onClick={()=>setActiveTab('boarding')}>✧ 住宿</button>
                                <button className={`tab-btn ${activeTab === 'daycare' ? 'active' : ''}`} onClick={()=>setActiveTab('daycare')}>✧ 安親</button>
                            </div>
                        </div>

                        {/* Content */}
                        <div className="flex-1 overflow-y-auto p-6 space-y-6">
                            {activeTab === 'grooming' && (
                                <>
                                    {/* 基礎服務 */}
                                    <div>
                                        <div className="flex justify-between items-center mb-3">
                                            <h4 className="font-bold text-[#203B2A] text-base">基礎服務</h4>
                                            <div className="flex gap-2">
                                                <input type="text" placeholder="項目名稱" className="admin-input w-40 text-sm" value={newItemName} onChange={e=>setNewItemName(e.target.value)} />
                                                <button onClick={()=>handleAddItem('basic')} className="px-3 py-2 bg-[#203B2A] text-white rounded-xl text-xs font-bold hover:bg-[#162B1F] transition-all">新增</button>
                                            </div>
                                        </div>
                                        <div className="flex flex-wrap gap-2">
                                            {localConfig.grooming.basic.map((item, i) => (
                                                <div key={i} className="bg-white border-2 border-[#EDE8E0] rounded-xl px-4 py-2 flex items-center gap-2">
                                                    <input type="text" value={item} onChange={e=>handleUpdateItem('basic', i, null, e.target.value)} className="bg-transparent border-none outline-none text-sm font-bold w-24" />
                                                    <button onClick={()=>handleRemoveItem('basic', i)} className="text-[#DBA58B] hover:text-[#C48A6B]"><Icon name="x" size={14}/></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 加購與升級 */}
                                    <div>
                                        <div className="flex justify-between items-center mb-3">
                                            <h4 className="font-bold text-[#203B2A] text-base">加購與升級</h4>
                                            <div className="flex gap-2">
                                                <input type="text" placeholder="項目名稱" className="admin-input w-32 text-sm" value={newItemName} onChange={e=>setNewItemName(e.target.value)} />
                                                <input type="text" placeholder="價格" className="admin-input w-24 text-sm" value={newItemPrice} onChange={e=>setNewItemPrice(e.target.value)} />
                                                <button onClick={()=>handleAddItem('upgrade')} className="px-3 py-2 bg-[#203B2A] text-white rounded-xl text-xs font-bold hover:bg-[#162B1F] transition-all">新增</button>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                            {localConfig.grooming.upgrade.map((item, i) => (
                                                <div key={i} className="bg-white border-2 border-[#EDE8E0] rounded-xl p-3 flex flex-col gap-2">
                                                    <div className="flex items-center gap-2">
                                                        <input type="text" value={item.name} onChange={e=>handleUpdateItem('upgrade', i, 'name', e.target.value)} className="bg-transparent border-none outline-none text-sm font-bold flex-1" />
                                                        <button onClick={()=>handleRemoveItem('upgrade', i)} className="text-[#DBA58B] hover:text-[#C48A6B]"><Icon name="x" size={14}/></button>
                                                    </div>
                                                    <input type="text" value={item.price} onChange={e=>handleUpdateItem('upgrade', i, 'price', e.target.value)} className="bg-transparent border-none outline-none text-xs text-[#B8A088] w-full" />
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 其他 */}
                                    <div>
                                        <div className="flex justify-between items-center mb-3">
                                            <h4 className="font-bold text-[#203B2A] text-base">其他項目</h4>
                                            <div className="flex gap-2">
                                                <input type="text" placeholder="項目名稱" className="admin-input w-40 text-sm" value={newItemName} onChange={e=>setNewItemName(e.target.value)} />
                                                <button onClick={()=>handleAddItem('other')} className="px-3 py-2 bg-[#203B2A] text-white rounded-xl text-xs font-bold hover:bg-[#162B1F] transition-all">新增</button>
                                            </div>
                                        </div>
                                        <div className="flex flex-wrap gap-2">
                                            {localConfig.grooming.other.map((item, i) => (
                                                <div key={i} className="bg-white border-2 border-[#EDE8E0] rounded-xl px-4 py-2 flex items-center gap-2">
                                                    <input type="text" value={item} onChange={e=>handleUpdateItem('other', i, null, e.target.value)} className="bg-transparent border-none outline-none text-sm font-bold w-24" />
                                                    <button onClick={()=>handleRemoveItem('other', i)} className="text-[#DBA58B] hover:text-[#C48A6B]"><Icon name="x" size={14}/></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </>
                            )}

                            {activeTab === 'boarding' && (
                                <div>
                                    <div className="flex justify-between items-center mb-3">
                                        <h4 className="font-bold text-[#203B2A] text-base">房型管理</h4>
                                        <div className="flex gap-2">
                                            <input type="text" placeholder="房型名稱" className="admin-input w-32 text-sm" value={newItemName} onChange={e=>setNewItemName(e.target.value)} />
                                            <input type="number" placeholder="價格" className="admin-input w-24 text-sm" value={newItemPrice} onChange={e=>setNewItemPrice(e.target.value)} />
                                            <button onClick={()=>handleAddItem('rooms')} className="px-3 py-2 bg-[#203B2A] text-white rounded-xl text-xs font-bold hover:bg-[#162B1F] transition-all">新增</button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                        {localConfig.boarding.rooms.map((room, i) => (
                                            <div key={i} className="bg-white border-2 border-[#EDE8E0] rounded-xl p-4 flex flex-col gap-2">
                                                <div className="flex items-center gap-2">
                                                    <input type="text" value={room.name} onChange={e=>handleUpdateItem('rooms', i, 'name', e.target.value)} className="bg-transparent border-none outline-none text-sm font-bold flex-1" />
                                                    <button onClick={()=>handleRemoveItem('rooms', i)} className="text-[#DBA58B] hover:text-[#C48A6B]"><Icon name="x" size={14}/></button>
                                                </div>
                                                <input type="number" value={room.price} onChange={e=>handleUpdateItem('rooms', i, 'price', parseInt(e.target.value)||0)} className="bg-transparent border-none outline-none text-lg font-bold text-[#B8A088] w-full" />
                                                <textarea value={room.desc || ''} onChange={e=>handleUpdateItem('rooms', i, 'desc', e.target.value)} className="bg-transparent border-none outline-none text-xs text-[#B5A89C] w-full resize-none h-12" placeholder="房型描述..." />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'daycare' && (
                                <div>
                                    <div className="flex justify-between items-center mb-3">
                                        <h4 className="font-bold text-[#203B2A] text-base">安親服務內容</h4>
                                        <div className="flex gap-2">
                                            <input type="text" placeholder="服務名稱" className="admin-input w-32 text-sm" value={newItemName} onChange={e=>setNewItemName(e.target.value)} />
                                            <input type="text" placeholder="價格" className="admin-input w-24 text-sm" value={newItemPrice} onChange={e=>setNewItemPrice(e.target.value)} />
                                            <button onClick={()=>handleAddItem('daycare')} className="px-3 py-2 bg-[#203B2A] text-white rounded-xl text-xs font-bold hover:bg-[#162B1F] transition-all">新增</button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                        {localConfig.daycare.services.map((svc, i) => (
                                            <div key={i} className="bg-white border-2 border-[#EDE8E0] rounded-xl p-4 flex flex-col gap-2">
                                                <div className="flex items-center gap-2">
                                                    <input type="text" value={svc.name} onChange={e=>handleUpdateItem('daycare', i, 'name', e.target.value)} className="bg-transparent border-none outline-none text-sm font-bold flex-1" />
                                                    <button onClick={()=>handleRemoveItem('daycare', i)} className="text-[#DBA58B] hover:text-[#C48A6B]"><Icon name="x" size={14}/></button>
                                                </div>
                                                <input type="text" value={svc.price} onChange={e=>handleUpdateItem('daycare', i, 'price', e.target.value)} className="bg-transparent border-none outline-none text-lg font-bold text-[#B8A088] w-full" />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Footer */}
                        <div className="p-4 bg-white border-t border-[#DDD6CE] flex justify-end gap-3 shrink-0">
                            <button onClick={onClose} className="px-6 py-2 bg-[#EDE8E0] rounded-xl text-xs font-bold text-[#8A7A6E] hover:bg-[#DDD6CE] transition-all">取消</button>
                            <button onClick={handleSave} className="px-6 py-2 bg-[#203B2A] text-white rounded-xl text-xs font-bold shadow-lg hover:bg-[#162B1F] transition-all">儲存設定</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 有質感的密碼驗證彈窗 ---
        const PasswordConfirmModal = ({ isOpen, onClose, onConfirm, title = "驗證管理員身份", description = "請輸入管理員密碼以繼續此操作" }) => {
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            useEffect(() => {
                if (!isOpen) {
                    setPassword('');
                    setError('');
                    setLoading(false);
                }
            }, [isOpen]);

            if (!isOpen) return null;

            const handleConfirm = async () => {
                if (!password || password.trim() === '') {
                    setError('請輸入密碼');
                    return;
                }
                setLoading(true);
                setError('');
                try {
                    const { data: { user: currentUser }, error: userError } = await supabase.auth.getUser();
                    if (userError || !currentUser) {
                        throw new Error('請先登入');
                    }
                    const { error: verifyError } = await supabase.auth.signInWithPassword({
                        email: currentUser.email,
                        password: password,
                    });
                    if (verifyError) {
                        setError('密碼錯誤，請重新輸入');
                        window.showToast('❌ 密碼錯誤', 'error');
                        setLoading(false);
                        return;
                    }
                    onConfirm();
                    onClose();
                } catch (err) {
                    setError(err.message || '驗證失敗');
                    window.showToast('❌ ' + (err.message || '驗證失敗'), 'error');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="fixed inset-0 z-[300] bg-[#203B2A]/60 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in">
                    <div className="bg-white rounded-[2rem] w-full max-w-sm shadow-2xl overflow-hidden animate-slide-up">
                        {/* Header */}
                        <div className="bg-[#203B2A] px-6 py-5 text-white">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                                    <Icon name="shield-check" size={20} className="text-white" />
                                </div>
                                <div>
                                    <h3 className="font-bold text-lg">{title}</h3>
                                    <p className="text-xs opacity-80 font-light">{description}</p>
                                </div>
                            </div>
                        </div>

                        {/* Body */}
                        <div className="p-6 space-y-4">
                            <div className="relative">
                                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-[#B5A89C]">
                                    <Icon name="key" size={18} />
                                </div>
                                <input
                                    type="password"
                                    autoFocus
                                    placeholder="請輸入管理員密碼"
                                    value={password}
                                    onChange={(e) => {
                                        setPassword(e.target.value);
                                        setError('');
                                    }}
                                    onKeyDown={(e) => e.key === 'Enter' && handleConfirm()}
                                    className={`w-full pl-12 pr-4 py-3.5 rounded-xl border-2 outline-none transition-all text-center tracking-widest text-lg font-bold ${
                                        error ? 'border-[#DBA58B] bg-[#FDF6F3]' : 'border-[#DDD6CE] focus:border-[#203B2A] focus:shadow-[0_0_0_4px_rgba(32,59,42,0.06)]'
                                    }`}
                                />
                                {error && (
                                    <div className="flex items-center gap-1.5 mt-2 text-[#DBA58B] text-xs font-bold animate-fade-in">
                                        <Icon name="alert-circle" size={14} />
                                        {error}
                                    </div>
                                )}
                            </div>

                            <div className="flex gap-3 pt-2">
                                <button
                                    onClick={onClose}
                                    className="flex-1 py-3 rounded-xl bg-[#FAF8F5] text-[#B5A89C] font-bold text-sm hover:bg-[#EDE8E0] transition-colors"
                                >
                                    取消
                                </button>
                                <button
                                    onClick={handleConfirm}
                                    disabled={loading}
                                    className="flex-[1.5] py-3 rounded-xl bg-[#203B2A] text-white font-bold text-sm shadow-lg shadow-[#203B2A]/20 hover:bg-[#162B1F] transition-all active:scale-95 flex items-center justify-center gap-2"
                                >
                                    {loading ? (
                                        <>
                                            <div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                                            驗證中...
                                        </>
                                    ) : (
                                        <>
                                            <Icon name="check" size={16} />
                                            確認
                                        </>
                                    )}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- ChangePasswordModal (有質感彈窗版本) ---
        const ChangePasswordModal = ({ isOpen, onClose }) => {
            const [targetEmail, setTargetEmail] = useState(ADMIN_EMAIL);
            const [oldPwd, setOldPwd] = useState("");
            const [newPwd, setNewPwd] = useState("");
            const [confirmPwd, setConfirmPwd] = useState("");
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");
            const [success, setSuccess] = useState(false);

            useEffect(() => {
                if (!isOpen) {
                    setOldPwd("");
                    setNewPwd("");
                    setConfirmPwd("");
                    setError("");
                    setSuccess(false);
                    setLoading(false);
                }
            }, [isOpen]);

            if (!isOpen) return null;

            const handleUpdate = async () => {
                // 清除舊錯誤
                setError("");
                
                // 驗證
                if (!oldPwd || oldPwd.trim() === '') {
                    setError('請輸入舊密碼');
                    return;
                }
                if (!newPwd || newPwd.length < 6) {
                    setError('新密碼長度需至少 6 碼');
                    return;
                }
                if (newPwd !== confirmPwd) {
                    setError('新密碼與確認密碼不符');
                    return;
                }
                
                setLoading(true);
                try {
                    // 驗證舊密碼
                    const { error: verifyError } = await supabase.auth.signInWithPassword({
                        email: targetEmail,
                        password: oldPwd
                    });
                    if (verifyError) {
                        setError('舊密碼輸入錯誤，請重新輸入');
                        setLoading(false);
                        return;
                    }

                    // 更新密碼
                    const { error: updateError } = await supabase.auth.updateUser({ password: newPwd });
                    if (updateError) throw updateError;

                    // 成功！
                    setSuccess(true);
                    window.showToast(`✅ [${targetEmail === ADMIN_EMAIL ? '管理員' : '員工'}] 密碼修改成功！`, 'success');
                    
                    // 延遲後關閉並重新整理
                    setTimeout(() => {
                        onClose();
                        setOldPwd("");
                        setNewPwd("");
                        setConfirmPwd("");
                        setSuccess(false);
                        // 如果修改的是管理員自己的密碼，提示重新登入
                        if (targetEmail === ADMIN_EMAIL) {
                            window.showToast('🔐 請使用新密碼重新登入', 'warning');
                            setTimeout(() => {
                                supabase.auth.signOut().then(() => {
                                    window.location.reload();
                                });
                            }, 1500);
                        } else {
                            // 員工密碼修改完成，重新整理
                            window.showToast('🔄 系統將自動重新整理', 'info');
                            setTimeout(() => {
                                window.location.reload();
                            }, 1200);
                        }
                    }, 800);

                } catch (err) {
                    setError(err.message || '修改失敗，請稍後再試');
                    window.showToast('❌ ' + (err.message || '修改失敗'), 'error');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="fixed inset-0 z-[100] bg-[#203B2A]/50 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in">
                    <div className="bg-white rounded-[2rem] w-full max-w-sm shadow-2xl overflow-hidden animate-slide-up">
                        {/* Header */}
                        <div className="bg-gradient-to-r from-[#203B2A] to-[#4A6B55] px-6 py-5 text-white">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                                    <Icon name="shield-check" size={20} className="text-white" />
                                </div>
                                <div>
                                    <h3 className="font-bold text-lg">密碼修改</h3>
                                    <p className="text-xs opacity-80 font-light">更新系統登入認證</p>
                                </div>
                            </div>
                        </div>

                        {/* Body */}
                        <div className="p-6 space-y-4">
                            {/* 切換身份 */}
                            <div className="flex bg-[#EDE8E0] p-1 rounded-xl">
                                <button 
                                    onClick={() => { setTargetEmail(ADMIN_EMAIL); setError(''); }}
                                    className={`flex-1 py-2 rounded-lg text-xs font-bold transition-all ${
                                        targetEmail === ADMIN_EMAIL 
                                            ? 'bg-white text-[#203B2A] shadow-sm' 
                                            : 'text-[#B5A89C] hover:text-[#203B2A]'
                                    }`}
                                >
                                    👤 管理員
                                </button>
                                <button 
                                    onClick={() => { setTargetEmail(STAFF_EMAIL); setError(''); }}
                                    className={`flex-1 py-2 rounded-lg text-xs font-bold transition-all ${
                                        targetEmail === STAFF_EMAIL 
                                            ? 'bg-white text-[#B8A088] shadow-sm' 
                                            : 'text-[#B5A89C] hover:text-[#203B2A]'
                                    }`}
                                >
                                    👤 一般員工
                                </button>
                            </div>

                            {/* 成功狀態 */}
                            {success && (
                                <div className="bg-[#4A6B55]/10 border border-[#4A6B55]/30 rounded-xl p-4 text-center animate-fade-in">
                                    <div className="w-12 h-12 bg-[#4A6B55] rounded-full flex items-center justify-center mx-auto mb-2">
                                        <Icon name="check" size={24} className="text-white" />
                                    </div>
                                    <p className="font-bold text-[#4A6B55] text-sm">
                                        ✅ [{targetEmail === ADMIN_EMAIL ? '管理員' : '員工'}] 密碼修改成功！
                                    </p>
                                    <p className="text-xs text-[#B5A89C] mt-1">
                                        {targetEmail === ADMIN_EMAIL ? '🔐 請使用新密碼重新登入' : '🔄 系統將自動重新整理'}
                                    </p>
                                </div>
                            )}

                            {/* 輸入欄位 */}
                            {!success && (
                                <div className="space-y-3">
                                    <div>
                                        <label className="text-[10px] font-bold text-[#B5A89C] ml-1 block mb-1">
                                            🔑 請輸入該帳號目前的【舊密碼】
                                        </label>
                                        <div className="relative">
                                            <div className="absolute left-3 top-1/2 -translate-y-1/2 text-[#B5A89C]">
                                                <Icon name="lock" size={16} />
                                            </div>
                                            <input 
                                                type="password" 
                                                placeholder="輸入舊密碼" 
                                                value={oldPwd} 
                                                onChange={e => { setOldPwd(e.target.value); setError(''); }}
                                                className={`w-full pl-10 pr-4 py-3 rounded-xl border-2 outline-none transition-all text-center tracking-widest text-base font-bold ${
                                                    error ? 'border-[#DBA58B] bg-[#FDF6F3]' : 'border-[#DDD6CE] focus:border-[#203B2A] focus:shadow-[0_0_0_4px_rgba(32,59,42,0.06)]'
                                                }`}
                                            />
                                        </div>
                                    </div>

                                    <div className="border-t border-dashed border-[#DDD6CE] pt-3">
                                        <label className="text-[10px] font-bold text-[#B5A89C] ml-1 block mb-1">
                                            🆕 設定【新密碼】<span className="text-[#DBA58B]">（至少6碼）</span>
                                        </label>
                                        <div className="space-y-2">
                                            <div className="relative">
                                                <div className="absolute left-3 top-1/2 -translate-y-1/2 text-[#B5A89C]">
                                                    <Icon name="key" size={16} />
                                                </div>
                                                <input 
                                                    type="password" 
                                                    placeholder="輸入新密碼" 
                                                    value={newPwd} 
                                                    onChange={e => { setNewPwd(e.target.value); setError(''); }}
                                                    className={`w-full pl-10 pr-4 py-3 rounded-xl border-2 outline-none transition-all text-center tracking-widest text-base font-bold ${
                                                        error ? 'border-[#DBA58B] bg-[#FDF6F3]' : 'border-[#DDD6CE] focus:border-[#203B2A] focus:shadow-[0_0_0_4px_rgba(32,59,42,0.06)]'
                                                    }`}
                                                />
                                            </div>
                                            <div className="relative">
                                                <div className="absolute left-3 top-1/2 -translate-y-1/2 text-[#B5A89C]">
                                                    <Icon name="check-circle" size={16} />
                                                </div>
                                                <input 
                                                    type="password" 
                                                    placeholder="再次輸入新密碼" 
                                                    value={confirmPwd} 
                                                    onChange={e => { setConfirmPwd(e.target.value); setError(''); }}
                                                    className={`w-full pl-10 pr-4 py-3 rounded-xl border-2 outline-none transition-all text-center tracking-widest text-base font-bold ${
                                                        error ? 'border-[#DBA58B] bg-[#FDF6F3]' : 'border-[#DDD6CE] focus:border-[#203B2A] focus:shadow-[0_0_0_4px_rgba(32,59,42,0.06)]'
                                                    }`}
                                                />
                                            </div>
                                        </div>
                                    </div>

                                    {/* 錯誤訊息 */}
                                    {error && (
                                        <div className="flex items-center gap-1.5 text-[#DBA58B] text-xs font-bold animate-fade-in bg-[#FDF6F3] p-2 rounded-lg border border-[#DBA58B]/30">
                                            <Icon name="alert-circle" size={14} />
                                            {error}
                                        </div>
                                    )}

                                    {/* 員工提示 */}
                                    {targetEmail === STAFF_EMAIL && (

                    </div>

        };

        // --- CalendarView (日曆檢視) ---
        const CalendarView = ({ orders, onSelectOrder }) => {
            const today = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Taipei' });
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(today);

            const daysInMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0).getDate();
            const firstDayOfMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1).getDay();
            
            const dailyDogs = useMemo(() => {
                return orders.filter(o => {
                    if (o.status === 'cancelled') return false;
                    const date = selectedDate;
                    if (o.service_type === 'grooming') {
                        const orderDate = o.booking_date || o.check_in_date || o.created_at?.slice(0, 10) || '';
                        return orderDate === date;
                    } else {
                        if (!o.check_in_date || !o.check_out_date) return false;
                        return date >= o.check_in_date && date <= o.check_out_date;
                    }
                });
            }, [orders, selectedDate]);

            const getPetsForDate = (dateStr) => {
                return orders.filter(o => {
                    if (o.status === 'cancelled') return false;
                    if (o.service_type === 'grooming') {
                        const date = o.booking_date || o.check_in_date || o.created_at?.slice(0, 10) || '';
                        return date === dateStr;
                    } else {
                        if (!o.check_in_date || !o.check_out_date) return false;
                        return dateStr >= o.check_in_date && dateStr <= o.check_out_date;
                    }
                });
            };

            return (
                <div className="space-y-4 animate-fade-in">
                    <div className="flex justify-between items-center bg-white p-4 rounded-3xl shadow-sm border border-[#DDD6CE]">
                        <div className="flex items-center gap-2">
                            <button onClick={() => setCurrentMonth(new Date(currentMonth.setMonth(currentMonth.getMonth() - 1)))} className="p-2 hover:bg-[#FAF8F5] rounded-full transition-colors"><Icon name="chevron-left"/></button>
                            <h3 className="font-bold text-lg text-[#203B2A]">{currentMonth.getFullYear()}年 {currentMonth.getMonth() + 1}月</h3>
                            <button onClick={() => setCurrentMonth(new Date(currentMonth.setMonth(currentMonth.getMonth() + 1)))} className="p-2 hover:bg-[#FAF8F5] rounded-full transition-colors"><Icon name="chevron-right"/></button>
                        </div>
                        <button onClick={() => { setCurrentMonth(new Date()); setSelectedDate(today); }} className="px-4 py-1.5 bg-[#203B2A] text-white rounded-full text-xs font-bold shadow-sm active:scale-95 transition-all">今天</button>
                    </div>

                    <div className="bg-white rounded-[2rem] border border-[#DDD6CE] shadow-sm overflow-hidden">
                        <div className="grid grid-cols-7 bg-[#FAF8F5] border-b border-[#DDD6CE]">
                            {['日','一','二','三','四','五','六'].map(d => <div key={d} className="text-center text-[10px] font-bold text-[#B5A89C] py-3">{d}</div>)}
                        </div>
                        <div className="grid grid-cols-7">
                            {[...Array(firstDayOfMonth)].map((_, i) => <div key={`empty-${i}`} className="border-b border-r border-[#EDE8E0] min-h-[100px]" />)}
                            {[...Array(daysInMonth)].map((_, i) => {
                                const d = i + 1;
                                const dateStr = `${currentMonth.getFullYear()}-${String(currentMonth.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                                const isSelected = dateStr === selectedDate;
                                const isToday = dateStr === today;
                                const petsInDay = getPetsForDate(dateStr);

                                return (
                                    <div key={d} onClick={() => setSelectedDate(dateStr)} 
                                        className={`min-h-[100px] border-b border-r border-[#EDE8E0] p-1 cursor-pointer transition-all hover:bg-[#4A6B55]/5 ${isSelected ? 'bg-[#4A6B55]/10 ring-2 ring-inset ring-[#4A6B55] z-10' : ''}`}>
                                        <div className="flex justify-between items-start mb-1">
                                            <span className={`text-[11px] font-bold w-6 h-6 flex items-center justify-center rounded-full ${isToday ? 'bg-[#DBA58B] text-white' : isSelected ? 'text-[#4A6B55]' : 'text-[#B5A89C]'}`}>{d}</span>
                                        </div>
                                        <div className="space-y-0.5 overflow-hidden">
                                            {petsInDay.slice(0, 3).map(o => (
                                                <div key={o.id} className={`text-[9px] font-bold px-1.5 py-0.5 rounded-sm truncate text-white shadow-sm ${o.service_type === 'grooming' ? 'bg-[#4A6B55]' : 'bg-[#B8A088]'}`}>
                                                    {o.service_type === 'grooming' && (o.booking_time || o.check_out_date) && <span className="opacity-80">[{o.booking_time || o.check_out_date}] </span>}
                                                    {o.booking_pets?.map(p => p.pet_name).join(',')}
                                                </div>
                                            ))}
                                            {petsInDay.length > 3 && (
                                                <div className="text-[8px] text-[#B5A89C] font-bold text-center mt-0.5">+{petsInDay.length - 3} 更多</div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div className="bg-[#FAF8F5] rounded-[2rem] p-6 border-2 border-dashed border-[#B8A088]/20">
                        <div className="flex justify-between items-center mb-4">
                            <h4 className="font-bold text-[#203B2A] flex items-center gap-2">
                                <Icon name="calendar-check" className="text-[#B8A088]"/> {selectedDate} 詳情名單
                            </h4>
                            <span className="bg-white border border-[#DDD6CE] px-3 py-1 rounded-full text-[10px] font-bold text-[#B8A088]">{dailyDogs.length} 隻毛孩</span>
                        </div>
                        
                        <div className="space-y-3">
                            {dailyDogs.length > 0 ? dailyDogs.map(o => (
                                <div key={o.id} onClick={() => onSelectOrder(o)} className="bg-white p-4 rounded-2xl border border-[#DDD6CE] hover:border-[#4A6B55] cursor-pointer transition-all flex justify-between items-center group shadow-sm">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-1.5 h-10 rounded-full ${o.service_type === 'grooming' ? 'bg-[#4A6B55]' : 'bg-[#B8A088]'}`}></div>
                                        <div>
                                            <div className="font-bold text-[#203B2A] text-base">{o.booking_pets?.map(p => p.pet_name).join(', ')}</div>
                                            <div className="text-[10px] text-[#B5A89C] font-bold">{o.owner_name} · {o.service_type === 'grooming' ? `✂️ 美容${o.booking_time || o.check_out_date ? ` (${o.booking_time || o.check_out_date})` : ''}` : '🏠 住宿/安親'}</div>
                                        </div>
                                    </div>
                                    <Icon name="chevron-right" size={16} className="text-[#DDD6CE] group-hover:text-[#4A6B55] transition-transform group-hover:translate-x-1" />
                                </div>
                            )) : (
                                <div className="py-12 text-center">
                                    <div className="w-16 h-16 bg-[#EDE8E0] rounded-full flex items-center justify-center mx-auto mb-3 text-[#DDD6CE]"><Icon name="calendar-off" size={32}/></div>
                                    <p className="text-[#B5A89C] font-bold text-sm">此日期暫無任何預約紀錄 🍃</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- CustomerDetailModal (顧客詳情) ---
        const CustomerDetailModal = ({ customer, onClose, onSelectOrder }) => {
            if (!customer) return null;
            return (
                <div className="fixed inset-0 z-[150] bg-[#203B2A]/60 backdrop-blur-sm flex items-center justify-center p-4">
                    <div className="bg-[#FAF8F5] rounded-[2.5rem] w-full max-w-2xl shadow-2xl flex flex-col max-h-[85vh] overflow-hidden animate-slide-up">
                        <div className="bg-white p-6 flex justify-between items-center border-b border-[#DDD6CE]">
                            <div className="flex items-center gap-4">
                                <div className="w-14 h-14 bg-[#203B2A] rounded-2xl flex items-center justify-center text-white text-xl font-bold">{customer.name[0]}</div>
                                <div>
                                    <h3 className="text-xl font-bold text-[#203B2A]">{customer.name}</h3>
                                    <p className="text-sm font-bold text-[#B5A89C]">{customer.phone}</p>
                                </div>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-[#FAF8F5] rounded-full"><Icon name="x" size={24}/></button>
                        </div>
                        <div className="p-6 overflow-y-auto space-y-6">
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-white p-4 rounded-2xl text-center border border-[#DDD6CE]">
                                    <div className="text-[10px] font-bold text-[#B5A89C]">來訪次數</div>
                                    <div className="text-lg font-bold text-[#4A6B55]">{customer.visitCount}次</div>
                                </div>
                                <div className="bg-white p-4 rounded-2xl text-center border border-[#DDD6CE]">
                                    <div className="text-[10px] font-bold text-[#B5A89C]">毛孩數</div>
                                    <div className="text-lg font-bold text-[#B8A088]">{customer.pets.size}隻</div>
                                </div>
                            </div>
                            <div className="space-y-3">
                                <h4 className="font-bold text-[#203B2A] flex items-center gap-2"><Icon name="history" size={18}/> 歷史服務紀錄</h4>
                                {customer.history.map(order => (
                                    <div key={order.id} onClick={() => { onSelectOrder(order); onClose(); }} className="bg-white p-4 rounded-2xl hover:border-[#203B2A] border-2 border-transparent cursor-pointer transition-all flex justify-between items-center group">
                                        <div className="flex items-center gap-3">
                                            <div className={`p-2 rounded-lg ${order.service_type === 'grooming' ? 'bg-[#4A6B55]/10 text-[#4A6B55]' : 'bg-[#B8A088]/10 text-[#B8A088]'}`}>
                                                <Icon name={order.service_type === 'grooming' ? 'scissors' : 'home'} size={16}/>
                                            </div>
                                            <div>
                                                <div className="text-sm font-bold">{order.booking_date || order.check_in_date || order.created_at?.slice(0, 10) || '無日期'}</div>
                                                <div className="text-[10px] text-[#B5A89C] font-bold">{order.booking_pets?.map(p=>p.pet_name).join(', ')}</div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main Dashboard ---
        const Dashboard = ({ user }) => {
const [showPwdModal, setShowPwdModal] = useState(false);
const [activeTab, setActiveTab] = useState('grooming');
const [orders, setOrders] = useState([]);
const [loading, setLoading] = useState(true);
const [selectedOrder, setSelectedOrder] = useState(null);
const [searchTerm, setSearchTerm] = useState('');
const [showIncompleteOnly, setShowIncompleteOnly] = useState(true);
const [showConfigModal, setShowConfigModal] = useState(false);
const [serviceConfig, setServiceConfig] = useState(null);
const [selectedCustomer, setSelectedCustomer] = useState(null);
const [showPasswordModal, setShowPasswordModal] = useState(false);
const [pendingAction, setPendingAction] = useState(null);
const [pendingConfig, setPendingConfig] = useState(null);
const [pendingOrderId, setPendingOrderId] = useState(null);

            // 載入服務設定
            useEffect(() => {
                const loadConfig = async () => {
                    try {
                        const { data, error } = await supabase
                            .from('service_config')
                            .select('*')
                            .order('updated_at', { ascending: false })
                            .limit(1);
                        if (error) throw error;
                        if (data && data.length > 0) {
                            setServiceConfig(data[0].config);
                        } else {
                            setServiceConfig(DEFAULT_SERVICE_CONFIG);
                        }
                    } catch (e) {
                        console.warn('載入服務設定失敗，使用預設值:', e);
                        setServiceConfig(DEFAULT_SERVICE_CONFIG);
                    }
                };
                loadConfig();
            }, []);

            // 載入訂單
            const fetchOrders = async () => {
                setLoading(true);
                try {
                    let filterTypes = [];
                    if (activeTab === 'grooming') {
                        filterTypes = ['grooming'];
                    } else if (activeTab === 'boarding') {
                        filterTypes = ['boarding'];
                    } else if (activeTab === 'daycare') {
                        filterTypes = ['daycare'];
                    }
                    let query = supabase
                        .from('bookings')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    if (filterTypes.length > 0) {
                        query = query.in('service_type', filterTypes);
                    }
                    
                    const { data, error } = await query;
                    if (error) throw error;
                    
                    const processedData = data?.map(booking => {
                        // 組裝寵物資料
                        const pet = {
                            pet_name: booking.pet_name || '未命名',
                            pet_type: booking.pet_type || 'dog',
                            breed: booking.breed || '',
                            fur_color: booking.fur_color || '',
                            weight: booking.weight || 0,
                            age: booking.age_value || 0,
                            is_under_one: booking.age_type === 'month',
                            sex: booking.sex || '',
                            fix: booking.fix || '',
                            chip_status: booking.chip_status || '',
                            chip_id: booking.chip_id || '',
                            personality: booking.personality_other || '',
                            specialNotes: booking.medical_other || '',
                            grooming_temperament: booking.temperament || '',
                            medical_status: booking.medical_history === '有' ? '有' : '無',
                            medical_history: safeParse(booking.medical_tags),
                            medical_history_other: booking.medical_other || '',
                            vaccine: safeParse(booking.vaccines).join('、'),
                            deworm: booking.deworming_monthly || '',
                            service_items: safeParse(booking.service_tags),
                            service_items_other: booking.note || '',
                            social_aggression: booking.social_aggression || '',
                            social_play: booking.social_play || '',
                            // 新增額外欄位讓 OrderDetailModal 可以顯示
                            health_date: booking.health_date,
                            physical_check: safeParse(booking.physical_check),
                            physical_other: booking.physical_other,
                            personality_other: booking.personality_other,
                            has_experience: booking.has_experience,
                            is_heat: booking.is_heat,
                            has_surgery: booking.has_surgery,
                            surgery_detail: booking.surgery_detail,
                            temperament: booking.temperament,
                            legal_agree: booking.legal_agree,
                            room_price: booking.room_price
                        };
                        
                        return {
                            ...booking,
                            booking_pets: [pet],
                            service_tags: safeParse(booking.service_tags),
                            medical_tags: safeParse(booking.medical_tags),
                            physical_check: safeParse(booking.physical_check),
                            social_traits: safeParse(booking.social_traits),
                            vaccines: safeParse(booking.vaccines)
                        };
                    });
                    setOrders(processedData || []);
                } catch (e) {
                    console.error('載入訂單失敗:', e);
                    window.showToast('載入訂單失敗', 'error');
                }
                setLoading(false);
            };

            useEffect(() => {
                fetchOrders();
            }, [activeTab]);

            // 更新訂單狀態
            const updateStatus = async (id, newStatus) => {
                try {
                    const { error } = await supabase.from('bookings').update({ status: newStatus }).eq('id', id);
                    if (error) throw error;
                    setOrders(prev => prev.map(o => o.id === id ? { ...o, status: newStatus } : o));
                    if (selectedOrder?.id === id) {
                        setSelectedOrder(prev => ({ ...prev, status: newStatus }));
                    }
                    const statusMap = { pending: '待確認', confirmed: '已確認', completed: '已完成', cancelled: '已取消' };
                    window.showToast(`訂單狀態已更新為「${statusMap[newStatus] || newStatus}」`, 'success');
                } catch (e) {
                    console.error('更新狀態失敗:', e);
                    window.showToast('更新狀態失敗', 'error');
                }
            };

            // 更新備註
            const updateNote = async (id, note) => {
                try {
                    const { error } = await supabase.from('bookings').update({ admin_note: note }).eq('id', id);
                    if (error) throw error;
                    setOrders(prev => prev.map(o => o.id === id ? { ...o, admin_note: note } : o));
                    if (selectedOrder && selectedOrder.id === id) {
                        setSelectedOrder(prev => ({ ...prev, admin_note: note }));
                    }
                    window.showToast('備註已儲存', 'success');
                } catch (e) {
                    console.error('更新備註失敗:', e);
                    window.showToast('❌ 備註儲存失敗', 'error');
                }
            };

            // 刪除訂單
const deleteOrder = (id) => {
    setPendingOrderId(id);
    setPendingAction('deleteOrder');
    setShowPasswordModal(true);
};

const executeDeleteOrder = async (id) => {
    try {
        const { error } = await supabase.from('bookings').delete().eq('id', id);
        if (error) throw error;
        setOrders(prev => prev.filter(o => o.id !== id));
        setSelectedOrder(null);
        window.showToast('✅ 訂單已刪除', 'success');
    } catch (e) {
        console.error('刪除失敗:', e);
        window.showToast('❌ 刪除失敗: ' + e.message, 'error');
    }
};

            // 保存服務設定
const saveServiceConfig = async (config) => {
    setPendingConfig(config);
    setPendingAction('saveConfig');
    setShowPasswordModal(true);
};

const executeSaveConfig = async (config) => {
    try {
        // 先刪除所有舊的設定記錄
        const { data: allData, error: fetchError } = await supabase
            .from('service_config')
            .select('id');
        if (!fetchError && allData && allData.length > 0) {
            const ids = allData.map(item => item.id);
            for (const id of ids) {
                await supabase.from('service_config').delete().eq('id', id);
            }
        }
        // 插入新的設定
        const { error: insertError } = await supabase
            .from('service_config')
            .insert({ config, updated_at: new Date().toISOString() });
        if (insertError) throw insertError;
        setServiceConfig(config);
        window.showToast('✅ 服務設定已儲存！請重新整理前台頁面查看變更。', 'success');
    } catch (e) {
        console.error('儲存設定失敗:', e);
        window.showToast('❌ 儲存設定失敗: ' + e.message, 'error');
    }
};

            // 過濾訂單
            const filteredOrders = useMemo(() => {
                return orders.filter(o => {
                    const pets = Array.isArray(o.booking_pets) ? o.booking_pets : [];
                    const matchSearch = !searchTerm ||
                        o.owner_name?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        o.phone?.includes(searchTerm) ||
                        pets.some(p => p.pet_name?.toLowerCase().includes(searchTerm.toLowerCase()));
                    const matchStatus = showIncompleteOnly ? !['completed', 'cancelled'].includes(o.status) : true;
                    return matchSearch && matchStatus;
                });
            }, [orders, searchTerm, showIncompleteOnly]);

            // 排序訂單
            const sortedOrders = useMemo(() => {
                const getPriority = (status) => {
                    if (status === 'pending') return 0;
                    if (status === 'confirmed') return 1;
                    if (status === 'completed') return 2;
                    if (status === 'cancelled') return 3;
                    return 99;
                };
                return [...filteredOrders].sort((a, b) => {
                    const pa = getPriority(a.status);
                    const pb = getPriority(b.status);
                    if (pa !== pb) return pa - pb;
                    return new Date(b.created_at) - new Date(a.created_at);
                });
            }, [filteredOrders]);

const getStatusText = (status) => {
    const map = { pending: '待確認', confirmed: '已確認', completed: '已完成', cancelled: '已取消' };
    return map[status] || status;
};

const customers = useMemo(() => {
    const groups = {};
    orders.forEach(order => {
        const phone = order?.phone;
        if (!phone) return;
        if (!groups[phone]) {
            groups[phone] = { name: order.owner_name, phone, totalSpent: 0, visitCount: 0, pets: new Set(), history: [] };
        }
        groups[phone].totalSpent += (order.total_price || 0);
        groups[phone].visitCount += 1;
        const pets = Array.isArray(order.booking_pets) ? order.booking_pets : [];
        pets.forEach(p => {
            const cleanName = p.pet_name?.trim();
            if (cleanName) groups[phone].pets.add(cleanName);
        });
        groups[phone].history.push(order);
    });
    return Object.values(groups).sort((a, b) => b.visitCount - a.visitCount);
}, [orders]);

            const getPetName = (order) => {
                const pets = Array.isArray(order.booking_pets) ? order.booking_pets : [];
                return pets.map(p => p.pet_name || '未命名').join('、') || order.pet_name || '無毛孩資料';
            };

            const formatDisplayDate = (order) => {
                if (order.service_type === 'daycare') {
                    return `${formatDate(order.check_in_date)} ${order.check_out_date || ''}`;
                }
                if (order.service_type === 'boarding') {
                    return `${formatDate(order.check_in_date)} ~ ${formatDate(order.check_out_date)}`;
                }
                // 美容
                const date = order.booking_date || order.check_in_date || order.created_at?.slice(0,10);
                return date ? formatDate(date) : '無日期';
            };

            return (
                <div className="min-h-screen pb-20">
                    <ToastContainer />
                    
                    {/* Nav */}
                    <nav className="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-[#203B2A]/10 px-3 sm:px-6 py-3 sm:py-4 flex justify-between items-center shadow-sm safe-area-top">                        <div className="flex items-center gap-3">
                            <img src="https://fcsmbnhnknwzdffcogwm.supabase.co/storage/v1/object/public/logo/logo2.png" className="w-9 h-9 sm:w-12 sm:h-12 object-contain rounded-xl shadow-sm" />
                            <div>
<div className="logo-text text-base sm:text-xl tracking-[0.25em]">尾尾道來</div>
<div className="logo-text-sub text-[7px] sm:text-[9px] tracking-[0.4em]">TAIL TELL PET CLUB</div>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
{user?.email === ADMIN_EMAIL && (
    <button onClick={() => setShowConfigModal(true)} className="w-10 h-10 bg-white border-2 border-[#DDD6CE] rounded-full flex items-center justify-center text-[#B8A088] hover:border-[#B8A088] hover:bg-[#B8A088] hover:text-white transition-all shadow-sm" title="服務項目設定">
        <Icon name="settings" size={16}/>
    </button>
)}
                            {user?.email === ADMIN_EMAIL && (
                                <button onClick={() => setShowPwdModal(true)} className="w-10 h-10 bg-white border-2 border-[#DDD6CE] rounded-full flex items-center justify-center text-[#B8A088] hover:border-[#B8A088] hover:bg-[#B8A088] hover:text-white transition-all shadow-sm" title="管理員權限：修改密碼">
                                    <Icon name="key" size={16}/>
                                </button>
                            )}
                            <button onClick={() => supabase.auth.signOut()} className="w-10 h-10 bg-[#EDE8E0] rounded-full flex items-center justify-center text-[#B5A89C] hover:bg-[#DBA58B] hover:text-white transition-all" title="登出">
                                <Icon name="log-out" size={18}/>
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto p-3 sm:p-6 space-y-4 sm:space-y-6">
                        {/* 搜尋 */}
                        <div className="relative group">
                            <Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-[#DDD6CE] group-focus-within:text-[#203B2A] transition-colors" />
<input 
    type="text" 
    placeholder="搜尋主人、電話、毛孩..." 
    value={searchTerm}
    onChange={e => setSearchTerm(e.target.value)}
    className="w-full pl-10 sm:pl-12 pr-3 sm:pr-4 py-3 sm:py-4 rounded-2xl bg-white shadow-sm border-2 border-transparent focus:border-[#203B2A] outline-none font-bold text-xs sm:text-sm transition-all"
/>
                        </div>

                        {/* Tabs */}
<div className="tab-container">
    <button className={`tab-btn ${activeTab === 'grooming' ? 'active' : ''}`} onClick={() => { setActiveTab('grooming'); setSearchTerm(''); }}>
        ✧ 美容
    </button>
    <button className={`tab-btn ${activeTab === 'boarding' ? 'active' : ''}`} onClick={() => { setActiveTab('boarding'); setSearchTerm(''); }}>
        ✧ 住宿
    </button>
    <button className={`tab-btn ${activeTab === 'daycare' ? 'active' : ''}`} onClick={() => { setActiveTab('daycare'); setSearchTerm(''); }}>
        ✧ 安親
    </button>
    <button className={`tab-btn ${activeTab === 'crm' ? 'active' : ''}`} onClick={() => { setActiveTab('crm'); setSearchTerm(''); }}>
        ✧ 顧客
    </button>
    <button className={`tab-btn ${activeTab === 'calendar' ? 'active' : ''}`} onClick={() => { setActiveTab('calendar'); setSearchTerm(''); }}>
        ✧ 日曆
    </button>
</div>

{(activeTab === 'grooming' || activeTab === 'boarding' || activeTab === 'daycare') && (
    <div className="flex items-center justify-between px-1">
<div className="text-[9px] sm:text-[11px] font-bold text-[#B5A89C] flex items-center gap-1 sm:gap-1.5">
    <Icon name="filter" size={10} className="sm:w-3.5 sm:h-3.5"/>
    顯示：<span className={showIncompleteOnly ? 'text-[#203B2A]' : 'text-[#B8A088]'}>
        {showIncompleteOnly ? '未完成' : '全部'}
    </span>
</div>
<button onClick={() => setShowIncompleteOnly(prev => !prev)} className={`px-2 sm:px-3 py-1 sm:py-1.5 rounded-full text-[9px] sm:text-[11px] font-bold border transition-all flex items-center gap-0.5 sm:gap-1 active:scale-95 ${showIncompleteOnly ? 'bg-[#203B2A] text-white border-[#203B2A] shadow-sm' : 'bg-white text-[#B5A89C] border-[#DDD6CE] hover:bg-[#FAF8F5]'}`}>
    <Icon name="sliders-horizontal" size={10} className="sm:w-3.5 sm:h-3.5"/>
    <span className="hidden xs:inline">{showIncompleteOnly ? '切換顯示全部' : '只看未完成'}</span>
    <span className="xs:hidden">{showIncompleteOnly ? '全部' : '未完成'}</span>
</button>
    </div>
)}

{/* 主內容區域 */}
{loading ? (
    <div className="py-20 text-center text-[#B5A89C] font-bold">載入資料中...</div>
) : activeTab === 'crm' ? (
    <div className="space-y-3">
        {customers.map(c => (
            <div key={c.phone} onClick={() => setSelectedCustomer(c)} className="cute-card p-5 bg-white flex justify-between items-center cursor-pointer hover:border-[#203B2A] transition-all">
                <div className="flex items-center gap-4">
                    <div className="w-12 h-12 bg-[#203B2A]/10 text-[#203B2A] rounded-xl flex items-center justify-center font-bold text-lg">{c.name[0]}</div>
                    <div>
                        <div className="font-bold text-[#203B2A]">{c.name}</div>
                        <div className="text-[10px] text-[#B5A89C] font-bold">
                            {c.phone} · {c.visitCount}次來訪 · <span className="text-[#4A6B55]">{c.pets.size} 隻毛孩</span>
                        </div>
                        <div className="text-[9px] text-[#DDD6CE] font-bold mt-0.5">
                            {[...c.pets].join(', ')}
                        </div>
                    </div>
                </div>
                <div className="text-right">
                    <div className="text-[9px] text-[#DDD6CE] font-bold">查看紀錄 →</div>
                </div>
            </div>
        ))}
        {customers.length === 0 && (
            <div className="py-20 text-center text-[#DDD6CE] font-bold">尚無顧客資料 🍃</div>
        )}
    </div>
) : activeTab === 'calendar' ? (
    <CalendarView orders={orders} onSelectOrder={setSelectedOrder} />
) : sortedOrders.length === 0 ? (
    <div className="py-20 text-center">
        <div className="w-16 h-16 bg-[#EDE8E0] rounded-full flex items-center justify-center mx-auto mb-3 text-[#DDD6CE]"><Icon name="inbox" size={32}/></div>
        <p className="text-[#B5A89C] font-bold">暫無訂單 🍃</p>
    </div>
) : (
    <div className="space-y-4">
        {sortedOrders.map(order => (
            <div key={order.id} onClick={() => setSelectedOrder(order)} className="cute-card p-4 sm:p-6 bg-white cursor-pointer relative overflow-hidden active:scale-[0.98] transition-all">
                <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${order.status === 'confirmed' ? 'bg-[#4A6B55]' : order.status === 'pending' ? 'bg-[#B8A088]' : order.status === 'cancelled' ? 'bg-[#DBA58B]' : 'bg-[#DDD6CE]'}`}></div>
                
                <div className="flex justify-between items-start">
                    <div>
<div className="text-[9px] sm:text-[10px] font-bold text-[#B5A89C] uppercase tracking-widest mb-0.5 sm:mb-1 flex items-center gap-1.5 sm:gap-2 flex-wrap">
    <span className="flex items-center gap-1">
        <Icon name="calendar" size={10} className="sm:w-3 sm:h-3"/>
        {formatDisplayDate(order)}
    </span>
    {order.service_type === 'daycare' && (
        <span className="text-[8px] sm:text-[10px] font-bold px-1.5 sm:px-2 py-0.5 rounded-full bg-[#B8A088]/20 text-[#B8A088]">安親</span>
    )}
</div>
                        <div className="font-bold text-lg sm:text-2xl text-[#203B2A] flex items-center gap-1.5 sm:gap-2 flex-wrap">
    {getPetName(order)}
    {(() => {
        // 檢查是否為美容訂單且包含「剪毛(含洗澡)」
        if (order.service_type === 'grooming') {
            const tags = safeParse(order.service_tags);
            if (tags.includes('剪毛(含洗澡)')) {
                return (
                    <span className="inline-block text-[9px] sm:text-xs font-bold bg-[#B8A088] text-white px-2 sm:px-2.5 py-0.5 rounded-full shadow-sm">
                        ✨大美容
                    </span>
                );
            }
        }
        return null;
    })()}
</div>
                        <div className="flex flex-wrap items-center gap-2 mt-1">
                            {order.image_consent === false && (
                                <span className="inline-flex items-center gap-1 text-[10px] font-bold bg-[#DBA58B] text-white px-2 py-0.5 rounded-md shadow-sm">
                                    <Icon name="camera-off" size={10}/> 拒絕拍攝
                                </span>
                            )}
                            {(() => {
                                const pets = Array.isArray(order.booking_pets) ? order.booking_pets : [];
                                const hasAggression = pets.some(p => p.social_aggression === '有攻擊性') || order.social_aggression === '有攻擊性';
                                const isSensitive = pets.some(p => p.grooming_temperament === '敏感寶寶') || order.grooming_temperament === '敏感寶寶';
                                const hasMedical = order.medical_history === '有' || pets.some(p => p.medical_status === '有');
                                return (
                                    <>
                                        {hasAggression && (
<span className="inline-flex items-center gap-0.5 sm:gap-1 text-[8px] sm:text-[10px] font-bold bg-[#DBA58B] text-white px-1.5 sm:px-2 py-0.5 rounded-md shadow-sm">
    <Icon name="alert-octagon" size={8} className="sm:w-2.5 sm:h-2.5"/> 有攻擊性
</span>
                                        )}
                                        {isSensitive && (
                                            <span className="inline-flex items-center gap-1 text-[10px] font-bold bg-[#B8A088] text-white px-2 py-0.5 rounded-md shadow-sm">
                                                <Icon name="zap" size={10}/> 敏感寶寶
                                            </span>
                                        )}
                                        {hasMedical && (
                                            <span className="inline-flex items-center gap-1 text-[10px] font-bold bg-[#4A6B55] text-white px-2 py-0.5 rounded-md shadow-sm">
                                                <Icon name="activity" size={10}/> 有病史
                                            </span>
                                        )}
                                    </>
                                );
                            })()}
                            {(order.admin_note && order.admin_note.trim() !== '') && (
                                <span className="inline-flex items-center gap-1 text-[10px] font-bold bg-[#203B2A] text-white px-2 py-0.5 rounded-md shadow-sm">
                                    <Icon name="sticky-note" size={10}/> 內部備註
                                </span>
                            )}
                        </div>
<div className="flex items-center gap-2 sm:gap-4 text-[10px] sm:text-xs font-bold text-[#B5A89C] mt-1.5 sm:mt-2 flex-wrap">
    <span className="flex items-center gap-0.5 sm:gap-1 text-[#4A6B55]"><Icon name="user" size={12} className="sm:w-3.5 sm:h-3.5"/>{order.owner_name || '-'}</span>
    <span className="flex items-center gap-0.5 sm:gap-1"><Icon name="phone" size={12} className="sm:w-3.5 sm:h-3.5"/>{order.phone || '-'}</span>
</div>
                    </div>
<div className="text-right">
    <span className={`status-badge block text-[9px] sm:text-[11px] px-2 sm:px-3.5 py-0.5 sm:py-1 ${order.status === 'pending' ? 'status-pending' : order.status === 'confirmed' ? 'status-confirmed' : order.status === 'cancelled' ? 'status-cancelled' : 'status-completed'}`}>
        {getStatusText(order.status)}
    </span>
</div>
                </div>

            {(order.admin_note && order.admin_note.trim() !== '') && (
<div className="mt-2 sm:mt-3 pt-2 sm:pt-3 border-t border-dashed border-[#DDD6CE] text-[10px] sm:text-xs text-[#B8A088]/80 truncate">
    <span className="font-bold">📝 備註：</span>{order.admin_note}
</div>
            )}
            </div>
        ))}
    </div>
)}
                    </main>

                    {/* Modals */}
<OrderDetailModal 
    order={selectedOrder}
    onClose={() => setSelectedOrder(null)}
    onUpdateStatus={updateStatus}
    onUpdateNote={updateNote}
    onDeleteOrder={deleteOrder}
    user={user}
/>

<ServiceConfigModal
    isOpen={showConfigModal}
    onClose={() => setShowConfigModal(false)}
    config={serviceConfig}
    onSave={saveServiceConfig}
/>

<ChangePasswordModal 
    isOpen={showPwdModal} 
    onClose={() => setShowPwdModal(false)} 
/>

<CustomerDetailModal 
    customer={selectedCustomer} 
    onClose={() => setSelectedCustomer(null)} 
    onSelectOrder={setSelectedOrder} 
/>

<PasswordConfirmModal
    isOpen={showPasswordModal}
    onClose={() => {
        setShowPasswordModal(false);
        setPendingAction(null);
        setPendingConfig(null);
        setPendingOrderId(null);
    }}
    onConfirm={() => {
        if (pendingAction === 'saveConfig' && pendingConfig) {
            executeSaveConfig(pendingConfig);
        } else if (pendingAction === 'deleteOrder' && pendingOrderId) {
            executeDeleteOrder(pendingOrderId);
        }
        setShowPasswordModal(false);
        setPendingAction(null);
        setPendingConfig(null);
        setPendingOrderId(null);
    }}
    title={pendingAction === 'saveConfig' ? '儲存服務設定' : '刪除訂單'}
    description={pendingAction === 'saveConfig' ? '請輸入管理員密碼以儲存服務設定變更' : '請輸入管理員密碼以確認刪除此訂單'}
/>
                </div>
            );
        };

        // --- App ---
        const App = () => {
            const [session, setSession] = useState(null);

            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => setSession(session));
                supabase.auth.onAuthStateChange((_event, session) => setSession(session));
            }, []);

            return session ? <Dashboard user={session.user} /> : <LoginView onLogin={() => {}} />;
        };

        // --- Admin Service Worker 註冊 ---
        const ADMIN_SW_VERSION = '20260717';
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        // 檢查是否已有 admin-sw.js 的註冊
        navigator.serviceWorker.getRegistration(`/admin-sw.js?v=${ADMIN_SW_VERSION}`).then(reg => {
            if (reg) {
                console.log('[Admin] Service Worker 已註冊');
                // 檢查是否有 waiting 的 worker
                if (reg.waiting) {
                    console.log('[Admin] 發現 waiting worker，顯示更新提示');
                    // 觸發更新提示（如果有的話）
                }
                return reg;
            }
            // 沒有註冊，進行註冊
            return navigator.serviceWorker.register(`/admin-sw.js?v=${ADMIN_SW_VERSION}`, { scope: '/' })
                .then(registration => {
                    console.log('[Admin] Service Worker 註冊成功:', registration);
                    // 監聽更新
                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        console.log('[Admin] 發現新 Service Worker');
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('[Admin] 新 Service Worker 已安裝，準備更新');
                                // 顯示更新提示
                                if (window.showToast) {
                                    window.showToast('🔄 發現新版本，請重新整理頁面', 'warning');
                                }
                            }
                        });
                    });
                })
                .catch(err => {
                    console.warn('[Admin] Service Worker 註冊失敗:', err);
                });
        }).catch(() => {
            // 如果 getRegistration 失敗，直接註冊
            navigator.serviceWorker.register(`/admin-sw.js?v=${ADMIN_SW_VERSION}`, { scope: '/' })
                .then(reg => console.log('[Admin] Service Worker 註冊成功:', reg))
                .catch(err => console.warn('[Admin] Service Worker 註冊失敗:', err));
        });
    });
    
    // 監聽 controller 變更，自動重新整理
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
            console.log('[Admin] Service Worker controller 變更，重新整理');
            window.location.reload();
            refreshing = true;
        }
    });
}

        const rootElement = document.getElementById('root');
        if (rootElement) {
            ReactDOM.render(<App />, rootElement);
        } else {
            console.error('Root element not found');
        }
    </script>
</body>
</html>
