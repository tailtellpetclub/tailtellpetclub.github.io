<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <!-- 只在 HTTPS 或 localhost 環境載入 manifest -->
<script>
    if (window.location.protocol === 'https:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        document.write('<link rel="manifest" href="manifest-admin.json">');
    }
</script>
    <meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="尾尾道來 Admin">
    <link rel="apple-touch-icon" href="https://fcsmbnhnknwzdffcogwm.supabase.co/storage/v1/object/public/logo/logo.jpg">
    <link rel="icon" type="image/png" href="https://fcsmbnhnknwzdffcogwm.supabase.co/storage/v1/object/public/logo/logo.jpg">
    <meta name="theme-color" content="#203B2A">
    <title>尾尾道來寵物俱樂部 · 後台管理</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * {
            font-family: 'Noto Serif TC', serif !important;
        }
        body {
            font-weight: 200 !important;
            background-color: #FAF8F5;
            color: #203B2A;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
        }
        h1, h2, h3, h4, h5, h6, .font-bold, .font-semibold, .font-black {
            font-weight: 300 !important;
            letter-spacing: 0.05em;
        }
        
        :root {
            --brand-primary: #203B2A;
            --brand-secondary: #4A6B55;
            --brand-accent: #5A7F68;
            --brand-dark: #162B1F;
            --brand-light: #FAF8F5;
            --brand-gold: #B8A088;
            --brand-warm: #EDE8E0;
            --brand-muted: #8AA69B;
            --brand-red: #DBA58B;
        }
        
        .bg-brand {
            background-color: var(--brand-primary);
        }
        .bg-brand-light {
            background-color: var(--brand-light);
        }
        .bg-brand-warm {
            background-color: var(--brand-warm);
        }
        .text-brand {
            color: var(--brand-primary);
        }
        .text-brand-dark {
            color: var(--brand-dark);
        }
        .border-brand {
            border-color: var(--brand-primary);
        }
        .bg-brand-red {
            background-color: var(--brand-red);
        }
        .text-brand-red {
            color: var(--brand-red);
        }
        .border-brand-red {
            border-color: var(--brand-red);
        }

        .glass-card {
            background: rgba(255, 252, 248, 0.78);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 252, 248, 0.5);
            box-shadow: 0 4px 16px rgba(32, 59, 42, 0.08);
            border-radius: 2rem;
        }

        .cute-card {
            background: #FFFDF9;
            border: 2px solid #EDE8E0;
            border-radius: 1.5rem;
            box-shadow: 0 2px 8px rgba(32, 59, 42, 0.04);
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .cute-card:hover { 
            transform: translateY(-2px); 
            border-color: #B8A088;
            box-shadow: 0 8px 24px rgba(32, 59, 42, 0.08);
        }

        .status-badge { 
            padding: 4px 14px; 
            border-radius: 20px; 
            font-size: 11px; 
            font-weight: 300;
            letter-spacing: 0.04em;
        }
        .status-pending { background: #FDF6F0; color: #B8A088; border: 1px solid #B8A088/30; }
        .status-confirmed { background: #E8F0EC; color: #4A6B55; border: 1px solid #4A6B55/30; }
        .status-completed { background: #EDE8E0; color: #8AA69B; border: 1px solid #EDE8E0; }
        .status-cancelled { background: #FDF6F3; color: #DBA58B; border: 1px solid #DBA58B/30; }
        
        .admin-input {
            width: 100%;
            background: rgba(255, 252, 248, 0.6);
            border: 1px solid #E0D8D0;
            border-radius: 1rem;
            padding: 0.6rem 1rem;
            font-size: 14px;
            color: #203B2A;
            font-weight: 200;
            transition: all 0.3s ease;
        }
        .admin-input:focus { 
            outline: none; 
            border-color: #203B2A;
            box-shadow: 0 0 0 4px rgba(32, 59, 42, 0.06);
            background: #ffffff;
        }
        
        .service-tab {
            padding: 0.6rem 1.5rem;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            border-bottom: 3px solid transparent;
            opacity: 0.5;
            font-size: 0.9rem;
            font-weight: 200;
            letter-spacing: 0.08em;
            background: transparent;
            color: #203B2A;
            position: relative;
        }
        .service-tab::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 3px;
            background: #203B2A;
            border-radius: 4px;
            transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .service-tab:hover { opacity: 0.8; }
        .service-tab:hover::after { width: 40%; }
        .service-tab.active {
            color: #203B2A;
            opacity: 1;
            font-weight: 300;
        }
        .service-tab.active::after { width: 60%; }
        
        .logo-text {
            font-family: 'Noto Serif TC', serif;
            font-weight: 200;
            letter-spacing: 0.2em;
            color: #162B1F;
            line-height: 1.2;
        }
        .logo-text-sub {
            font-family: 'Noto Serif TC', serif;
            font-weight: 200;
            letter-spacing: 0.3em;
            color: #203B2A;
            font-size: 0.6rem;
        }
        
        .fullscreen-signature {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: white;
            display: flex;
            flex-direction: column;
        }
        
        .animate-float {
            animation: float 12s infinite ease-in-out;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(0, 16px); }
        }
        .animate-fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(100%); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom, 1rem);
        }
        .safe-area-top {
            padding-top: env(safe-area-inset-top, 0.5rem);
        }
        
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.2;
        }
        
        .section-title {
            position: relative;
            padding-bottom: 0.85rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #E8E0D8;
            letter-spacing: 0.04em;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 3.5rem;
            height: 2.5px;
            background: linear-gradient(90deg, #203B2A, #B8A088);
            border-radius: 4px;
            transition: width 0.4s ease;
        }
        .section-title:hover::after {
            width: 5rem;
        }
    </style>
</head>
<body>
    <div class="bg-orb w-96 h-96 top-[-10%] left-[-10%] animate-float" style="background:#D4C9BE;"></div>
    <div class="bg-orb w-80 h-80 bottom-[-10%] right-[-10%]" style="background:#C4B8AA;"></div>
    
    <div id="root"></div>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#203B2A',
                            light: '#FAF8F5',
                            dark: '#162B1F',
                            gold: '#B8A088',
                            warm: '#EDE8E0',
                            muted: '#8AA69B',
                            red: '#DBA58B',
                        }
                    },
                    fontFamily: {
                        serif: ['"Noto Serif TC"', 'serif'],
                    }
                }
            }
        }
    </script>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- TTPC Supabase Config ---
        const supabaseUrl = 'https://fcsmbnhnknwzdffcogwm.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjc21ibmhua253emRmZmNvZ3dtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMzgwNTYsImV4cCI6MjA5NzYxNDA1Nn0.0E8x03Im9GWTZjQGzgQF5qhVkTW3sFRZ-Jm_ihUybLM';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // TTPC 帳號
        const ADMIN_EMAIL = "wearegoodbones@gmail.com";
        const STAFF_EMAIL = "wearegoodbones@staff.com";

        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({ root: iconRef.current, attrs: { "stroke-width": 2, class: className } });
                }
            }, [name, className]);
            return <span ref={iconRef} key={name} className="inline-flex items-center justify-center"><i data-lucide={name} style={{ width: size, height: size }}></i></span>;
        };

        // --- 翻譯與格式化工具 ---
        const T = (key) => {
            if (key === true || key === 'true') return '是';
            if (key === false || key === 'false') return '否';
            if (!key) return '-';
            
            const map = {
                'basic': '小美容', 'full': '大美容',
                'dog': '狗狗', 'cat': '貓咪',
                'grooming': '美容', 'boarding': '住宿', 'daycare': '安親',
                'local_style': '局部修飾', 'special_style': '特殊造型', 'scissor_cut': '全身手剪',
                'local_degrease': '局部去油', 'full_degrease': '全身去油',
                'spa_dental': '口腔凝膠', 'spa_oil': '潔膚油', 'spa_ear': '日本採耳',
                'spa_carbon': '碳酸浴', 'spa_bath': '舒敏浴', 'spa_nano': '奈米浴',
                'spa_salt': '海鹽浴', 'spa_mud_exfoliate': '去角質泥', 'spa_bubble': '泡泡浴', 'spa_volcano': '火山泥',
                'spa_ceramide_local': '局部保濕', 'spa_ceramide_full': '全身保濕',
                'other': '其他項目'
            };
            return map[key] || key;
        };

        // --- 權限驗證 Modal ---
        const SecurityModal = ({ isOpen, onClose, onConfirm, title = "敏感操作驗證" }) => {
            const [pwd, setPwd] = useState("");
            const [verifying, setVerifying] = useState(false);

            if (!isOpen) return null;

            const handleVerify = async () => {
                setVerifying(true);
                try {
                    const { data: { user: currentUser }, error: userError } = await supabase.auth.getUser();
                    if (userError || !currentUser) {
                        throw new Error("驗證失敗：登入資訊已過期，請重新整理頁面。");
                    }
                    const { error: loginError } = await supabase.auth.signInWithPassword({
                        email: currentUser.email,
                        password: pwd,
                    });
                    if (loginError) throw new Error("密碼錯誤，驗證失敗");
                    onConfirm();
                    setPwd("");
                    onClose();
                } catch (err) {
                    alert(err.message);
                } finally {
                    setVerifying(false);
                }
            };

            return (
                <div className="fixed inset-0 z-[100] bg-[#203B2A]/50 backdrop-blur-sm flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl p-6 w-full max-w-xs shadow-2xl animate-fade-in">
                        <h3 className="font-bold text-lg text-center mb-1 text-[#203B2A]">{title}</h3>
                        <p className="text-[10px] text-[#B5A89C] text-center mb-4 font-bold">請輸入您的密碼以確認變更</p>
                        <input type="password" autoFocus placeholder="您的帳戶密碼" 
                            className="w-full border-2 border-[#DDD6CE] rounded-xl p-3 text-center mb-4 outline-none focus:border-[#203B2A] focus:shadow-[0_0_0_4px_rgba(32,59,42,0.06)] transition-all"
                            value={pwd} onChange={e=>setPwd(e.target.value)}
                            onKeyDown={(e) => e.key === 'Enter' && handleVerify()}
                        />
                        <div className="flex gap-2">
                            <button onClick={onClose} className="flex-1 py-2 bg-[#EDE8E0] rounded-lg text-xs font-bold text-[#8A7A6E]">取消</button>
                            <button onClick={handleVerify} disabled={verifying} className="flex-1 py-2 bg-[#203B2A] text-white rounded-lg text-xs font-bold">
                                {verifying ? '驗證中...' : '確認'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 登入 View (TTPC 風格) ---
        const LoginView = ({ onLogin }) => {
            const [loginEmail, setLoginEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                const { data, error: authError } = await supabase.auth.signInWithPassword({ email: loginEmail, password });
                if (authError) {
                    setError('帳號或密碼錯誤');
                    setLoading(false);
                } else {
                    onLogin();
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
                    <div className="bg-orb w-96 h-96 top-[-10%] left-[-10%] animate-float" style={{background: '#D4C9BE'}}></div>
                    <div className="bg-orb w-80 h-80 bottom-[-10%] right-[-10%]" style={{background: '#C4B8AA'}}></div>
                    
                    <div className="glass-card w-full max-w-md p-10 text-center relative z-10 animate-fade-in">
                        <img src="https://fcsmbnhnknwzdffcogwm.supabase.co/storage/v1/object/public/logo/logo2.png" className="w-40 mx-auto mb-6 drop-shadow-sm" alt="尾尾道來" />
                        
                        {!loginEmail ? (
                            <div className="space-y-4">
                                <h1 className="text-xl font-bold text-[#203B2A] mb-6 tracking-wider">尾尾道來 · 管理後台</h1>
                                <button onClick={() => setLoginEmail(ADMIN_EMAIL)} className="w-full bg-white border-2 border-[#203B2A]/20 hover:border-[#203B2A] hover:bg-[#203B2A]/5 text-[#203B2A] py-4 rounded-2xl font-bold flex items-center justify-center gap-3 transition-all active:scale-95">
                                    <div className="w-10 h-10 rounded-full bg-[#203B2A] text-white flex items-center justify-center"><Icon name="shield" /></div>
                                    管理員登入
                                </button>
                                <button onClick={() => setLoginEmail(STAFF_EMAIL)} className="w-full bg-white border-2 border-[#B8A088]/20 hover:border-[#B8A088] hover:bg-[#B8A088]/5 text-[#203B2A] py-4 rounded-2xl font-bold flex items-center justify-center gap-3 transition-all active:scale-95">
                                    <div className="w-10 h-10 rounded-full bg-[#B8A088] text-white flex items-center justify-center"><Icon name="user" /></div>
                                    員工登入
                                </button>
                                <a href="./index.html" className="inline-flex items-center gap-2 text-xs font-bold text-[#B8A088] hover:text-[#203B2A] transition-colors">
                                    <Icon name="arrow-left" size={14}/> 返回填寫首頁
                                </a>
                            </div>
                        ) : (
                            <form onSubmit={handleLogin} className="space-y-4 animate-fade-in">
                                <div className="text-center mb-4">
                                    <span className={`px-6 py-2 rounded-full text-sm font-bold text-white shadow-sm ${loginEmail === ADMIN_EMAIL ? 'bg-[#203B2A]' : 'bg-[#B8A088]'}`}>
                                        {loginEmail === ADMIN_EMAIL ? '管理員模式' : '員工模式'}
                                    </span>
                                </div>
                                <input type="password" placeholder="請輸入密碼" value={password} onChange={e=>setPassword(e.target.value)} className="w-full text-center py-4 rounded-2xl border-2 border-[#DDD6CE] focus:border-[#203B2A] outline-none font-bold text-lg tracking-widest transition-all focus:shadow-[0_0_0_4px_rgba(32,59,42,0.06)]" autoFocus />
                                {error && <p className="text-[#DBA58B] text-xs font-bold">{error}</p>}
                                <button disabled={loading} className="w-full bg-[#203B2A] text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:bg-[#162B1F] transition-all flex items-center justify-center gap-2 active:scale-95">
                                    {loading ? <Icon name="loader-2" className="animate-spin" /> : '確認登入'}
                                </button>
                                <button type="button" onClick={() => setLoginEmail('')} className="text-xs font-bold text-[#B5A89C] hover:text-[#203B2A] transition-colors">← 切換身分</button>
                            </form>
                        )}
                    </div>
                </div>
            );
        };

        // --- RenderField 元件 ---
        const RenderField = ({ label, value, editPath, type = 'text', highlight = false, isEditing, onChange }) => {
            if (!editPath) {
                return (
                    <div className="mb-2">
                        <label className="text-[10px] font-bold text-[#B5A89C] block mb-0.5 tracking-wider">{label}</label>
                        <div className="font-bold text-sm break-words text-[#203B2A]">-</div>
                    </div>
                );
            }
            return (
                <div className="mb-2">
                    <label className="text-[10px] font-bold text-[#B5A89C] block mb-0.5 tracking-wider">{label}</label>
                    {isEditing ? (
                        <input 
                            type={type} 
                            value={value || ''} 
                            onChange={(e) => onChange(editPath, e.target.value)} 
                            className="admin-input"
                        />
                    ) : (
                        <div className={`font-bold text-sm break-words ${highlight ? 'text-[#DBA58B]' : 'text-[#203B2A]'}`}>
                            {T(value)}
                        </div>
                    )}
                </div>
            );
        };

        // --- ReportGeneratorModal (TTPC 風格) ---
        const ReportGeneratorModal = ({ isOpen, onClose, order, reportType }) => {
            const [activeTab, setActiveTab] = useState('finish');
            const [reportData, setReportData] = useState({
                feeDetail: '',
                overtime: '',
                general: '精神食慾良好，狀況穩定。', 
                skin: '皮膚檢查無明顯異常。',
                dailyMood: '🟢 開心',
                dailyMoodCustom: '',
                dailyEat: '🟢 完食',
                dailyEatCustom: '',
                dailyToilet: '🟢 正常',
                dailyToiletCustom: '',
                dailyCare: '⚪ 無',
                dailyCareCustom: '',
                dailyNote: ''
            });

            useEffect(() => {
                if (isOpen && order) {
                    const isBoarding = ['boarding', 'daycare'].includes(order.service_type);
                    setActiveTab(reportType === 'boarding' ? 'daily' : 'finish');
                    const today = new Date();
                    const dateStr = `${today.getMonth() + 1}/${today.getDate()}`;
                    setReportData(prev => ({
                        ...prev,
                        feeDetail: `本次消費總計：$${order.total_price}`,
                        dailyNote: '今天在遊戲區玩得很開心喔！',
                        overtime: ''
                    }));
                }
            }, [isOpen, order]);

            if (!isOpen || !order) return null;

            const isBoarding = ['boarding', 'daycare'].includes(order.service_type);

const generateText = () => {
    const pets = Array.isArray(order.booking_pets) ? order.booking_pets : [];
    const petsName = pets.map(p => p.pet_name).join('、') || '未命名毛孩';
                const today = new Date();
                const dateText = `${today.getMonth() + 1}/${today.getDate()}`;

                if (isBoarding && activeTab === 'daily') {
                    const mood = reportData.dailyMood === '⭐ 其他...' ? reportData.dailyMoodCustom : reportData.dailyMood;
                    const eat = reportData.dailyEat === '⭐ 其他...' ? reportData.dailyEatCustom : reportData.dailyEat;
                    const toilet = reportData.dailyToilet === '⭐ 其他...' ? reportData.dailyToiletCustom : reportData.dailyToilet;
                    const careValue = reportData.dailyCare === '⭐ 其他...' 
                        ? (reportData.dailyCareCustom || '') 
                        : `${reportData.dailyCare}${reportData.dailyCareCustom ? ` (${reportData.dailyCareCustom})` : ''}`;
                    const careLine = reportData.dailyCare !== '⚪ 無' 
                        ? `🏥 特殊照顧/投藥紀錄：${careValue}\n` 
                        : '';

                    return `【${dateText} 住宿日記 📝】\n` +
                           `我是 ${petsName} ～這是今天的住宿狀況回報：\n\n` +
                           `✨ 精神狀況：${mood}\n` +
                           `🥣 用餐情形：${eat}\n` +

                                                            <div className="bg-[#FAF8F5] p-2 rounded-lg mt-1.5 text-xs text-[#4A6B55] leading-relaxed break-words border border-[#DDD6CE]">

                                                                <span>⚠️ 異食癖：</span>

                                                        <div className="flex justify-between mb-1">
                                                            <span className="text-[#B5A89C] text-xs">生活習慣</span>
                                                            {pet.pet_type === 'dog' && isBoarding && (
                                                                <span className={`text-[10px] font-bold px-1.5 rounded ${getVal(pet, 'hasTrialStay') ? 'bg-[#4A6B55]/20 text-[#4A6B55]' : 'bg-[#DBA58B]/20 text-[#DBA58B]'}`}>
                                                                    {getVal(pet, 'hasTrialStay') ? '✅ 已試住' : '❌ 未試住'}

                                                            {getVal(pet, 'litter_type') && <div>貓砂: {getVal(pet, 'litter_type')}</div>}
                                                            {getVal(pet, 'isBarking') === '會' && <div>🔊 會吠叫</div>} 
                                                            {getVal(pet, 'isFoodGuarding') === '會' && <div>🥣 會護食</div>}
                                                            {getVal(pet, 'useToiletPad') === '會' && <div>🚽 用尿布墊</div>}
                                                            {getVal(pet, 'isWalking') === '是' && <div>🌳 外出散步</div>}
                                                            {getVal(pet, 'isWalking') === '否' && <div>🚫 不外出散步</div>}
                                                            {getVal(pet, 'hasBoardingExp') === '有' && <div>🏠 有住宿經驗</div>}
                                                            {(getVal(pet, 'crateTraining')||[]).length > 0 && (
                                                                <div className="mt-1 text-[#B8A088] bg-[#B8A088]/5 p-1 rounded">
                                                                    籠內訓練：{(getVal(pet, 'crateTraining')||[]).join('、')}

                                            {isBoarding && (
                                                ((pet.add_grooming === true || pet.add_grooming === 'true' || pet.addGrooming === true || pet.addGrooming === 'true')) ? (

{(() => {
    const items = Array.isArray(pet.service_items) ? pet.service_items : 
                   (typeof pet.service_items === 'string' ? JSON.parse(pet.service_items) : []);
    return items.map((item, i) => (
        <span key={i} className="text-[10px] bg-white text-[#4A6B55] px-2.5 py-1 rounded-full font-bold border border-[#4A6B55]/10 shadow-sm">{T(item)}</span>
    ));
})()}

                                                                    const proofType = getVal(pet, 'proof_type');

                                                                    if (proofUrl) return '已上傳';

                                                                })()}
                                                            </div>

                                                            <div className="mt-2 text-center">
                                                                <a href={getVal(pet, 'proof_url')} target="_blank" className="inline-block px-3 py-1 bg-[#FDF6F3] text-[#DBA58B] rounded-lg text-xs font-bold hover:bg-[#DBA58B] hover:text-white transition-colors">
                                                                    📄 查看洗澡證明

                                    <div className="text-[11px] text-[#203B2A] font-bold mt-2 font-mono">

                    <SecurityModal

                        isOpen={showDeleteAuth} 
                        onClose={()=>setShowDeleteAuth(false)}

                        isOpen={showReport}

        // --- ChangePasswordModal (TTPC 風格) ---
        const ChangePasswordModal = ({ isOpen, onClose }) => {
            const [targetEmail, setTargetEmail] = useState(ADMIN_EMAIL);
            const [oldPwd, setOldPwd] = useState("");
            const [newPwd, setNewPwd] = useState("");
            const [confirmPwd, setConfirmPwd] = useState("");
            const [loading, setLoading] = useState(false);

            if (!isOpen) return null;

            const handleUpdate = async () => {
                if (newPwd !== confirmPwd) return alert("❌ 新密碼與確認密碼不符");
                if (newPwd.length < 6) return alert("❌ 密碼長度需至少 6 碼");
                
                setLoading(true);
                try {
                    const { error: verifyError } = await supabase.auth.signInWithPassword({
                        email: targetEmail,
                        password: oldPwd
                    });
                    if (verifyError) throw new Error(`${targetEmail === ADMIN_EMAIL ? '您的舊密碼' : '員工的舊密碼'}輸入錯誤`);

                    const { error: updateError } = await supabase.auth.updateUser({ password: newPwd });
                    if (updateError) throw updateError;

                    alert(`✅ [${targetEmail === ADMIN_EMAIL ? '管理員' : '員工'}] 密碼修改成功！`);
                    if (targetEmail === STAFF_EMAIL) {
                        alert("正在切換回管理員權限...");
                        window.location.reload(); 
                    }
                    onClose();
                    setOldPwd(""); setNewPwd(""); setConfirmPwd("");
                } catch (err) {
                    alert("修改失敗：" + err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (

// --- UpdatePrompt (TTPC 風格) ---
const UpdatePrompt = ({ show, onUpdate }) => {
    if (!show) return null;
    
    const [isUpdating, setIsUpdating] = useState(false);
    
    const handleUpdate = () => {
        if (isUpdating) return;
        setIsUpdating(true);
        
        // 1. 取得註冊的 Service Worker
        navigator.serviceWorker.getRegistration().then(reg => {
            // 2. 如果有 waiting worker，通知其跳過等待階段
            if (reg && reg.waiting) {
                reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            } else {
                // 3. 若無 waiting，則直接重新整理（確保舊的快取已過期）
                window.location.reload(true);
            }
        });
    };
    
    // 監聽 controllerchange，確保新 Service Worker 接管後自動更新畫面
    useEffect(() => {
        const onControllerChange = () => {
            window.location.reload(true);
        };
        navigator.serviceWorker.addEventListener('controllerchange', onControllerChange);
        return () => navigator.serviceWorker.removeEventListener('controllerchange', onControllerChange);
    }, []);
    
    return (
        <div className="fixed left-6 right-6 z-[400] md:left-1/2 md:-translate-x-1/2 md:w-auto md:min-w-[320px] top-[calc(env(safe-area-inset-top)+1.5rem)]">

                    <div className="w-10 h-10 bg-[#203B2A] text-white rounded-full flex items-center justify-center shrink-0">
                        <Icon name="refresh-cw" size={20} className={isUpdating ? "animate-spin" : ""} />
                    </div>
                    <div>
                        <h4 className="font-bold text-[#203B2A] text-sm">{isUpdating ? '更新中...' : '發現新版本！'}</h4>
                        <p className="text-[10px] text-[#B5A89C] font-bold">{isUpdating ? '請稍候，頁面即將重新整理' : '系統已更新 ✨'}</p>
                    </div>
                </div>
                <button 
                    onClick={handleUpdate}
                    disabled={isUpdating}
                    className={`bg-[#203B2A] text-white text-xs font-bold px-4 py-2.5 rounded-xl shadow-lg shadow-[#203B2A]/20 hover:bg-[#162B1F] active:scale-95 transition-all whitespace-nowrap ${isUpdating ? 'opacity-50 cursor-not-allowed' : ''}`}
                >
                    {isUpdating ? '處理中...' : '立即更新'}
                </button>
            </div>
        </div>
    );
};

        // --- Dashboard (TTPC 風格) ---

const fetchOrders = async () => {

        .from('bookings')
        .select('*')
        .order('created_at', { ascending: false });
    
    if (activeTab !== 'crm' && activeTab !== 'calendar') {
        const filterTypes = activeTab === 'grooming' ? ['grooming'] : ['boarding', 'daycare'];

    const { data, error } = await query;

                pet_name: booking.pet_name || '未命名',

                fur_color: booking.fur_color || '',

                fix: booking.fix || '',

                chip_id: booking.chip_id || '',
                personality: booking.personality_other || '',
                specialNotes: booking.medical_other || '',
                allergies: '',
                grooming_temperament: booking.temperament || '',
                medical_status: booking.medical_history === '有' ? '有' : '無',

                pica: '',

                isBarking: '',
                isFoodGuarding: '',

                isWalking: '',
                hasBoardingExp: booking.has_experience || '',
                crateTraining: [],
                hasTrialStay: '',
                service_items: (() => {

            };
            
            return {

                // 確保這些欄位是陣列

                    await supabase.from('busy_slots').insert({ date, time_slot: slot });
                    setBusySlots(prev => [...prev, slot]);

            const filteredOrders = useMemo(() => {
                return orders.filter(o => {
                    const pets = Array.isArray(o.booking_pets) ? o.booking_pets : [];
                    const matchSearch = !searchTerm ||
                        o.owner_name?.includes(searchTerm) ||
                        o.phone?.includes(searchTerm) ||
                        pets.some(p => p.pet_name?.includes(searchTerm));
                    const matchStatus = showIncompleteOnly ? !['completed', 'cancelled'].includes(o.status) : true;
                    return matchSearch && matchStatus;
                });
            }, [orders, searchTerm, showIncompleteOnly]);

            const sortedFilteredOrders = useMemo(() => {
                const getStatusPriority = (status) => {
                    if (status === 'pending') return 0;
                    if (status === 'confirmed') return 1;
                    if (status === 'completed') return 2;
                    if (status === 'cancelled') return 3;
                    return 99;
                };

                const getRawProps = (order) => {
                    try {
                        const parsed = typeof order.raw_data === 'string' ? JSON.parse(order.raw_data) : order.raw_data;
                        return parsed?.raw_data || parsed || {};
                    } catch (e) { return {}; }
                };

                const normalizeTime = (timeStr) => {
                    if (!timeStr) return '00:00';
                    if (typeof timeStr !== 'string') return '00:00';
                    if (timeStr.includes('T')) {
                        const parts = timeStr.split('T');
                        if (parts[1]) return parts[1].slice(0, 5);
                    }
                    if (timeStr.length >= 5 && timeStr.includes(':')) return timeStr.slice(0, 5);
                    return '00:00';
                };

                const getOrderDateTime = (order) => {
                    if (order.service_type === 'grooming') {
                        const date = order.booking_date || order.check_in_date || order.created_at?.slice(0, 10);
                        const time = normalizeTime(order.booking_time);
                        return new Date(`${date}T${time}`);
                    }
                    if (order.service_type === 'boarding' || order.service_type === 'daycare') {
                        const rawProps = getRawProps(order);
                        const date = order.check_in_date || order.booking_date || order.created_at?.slice(0, 10);
                        const time = order.service_type === 'daycare' ? normalizeTime(rawProps.bookingTime) : '00:00';
                        return new Date(`${date}T${time}`);
                    }
                    return new Date(order.created_at);
                };

                return [...filteredOrders].sort((a, b) => {
                    const statusA = getStatusPriority(a.status);
                    const statusB = getStatusPriority(b.status);
                    if (statusA !== statusB) return statusA - statusB;
                    const dateA = getOrderDateTime(a);
                    const dateB = getOrderDateTime(b);
                    const aIncomplete = ['pending', 'confirmed'].includes(a.status);
                    const bIncomplete = ['pending', 'confirmed'].includes(b.status);
                    if (aIncomplete && bIncomplete) return dateA - dateB;
                    if (!aIncomplete && !bIncomplete) return dateB - dateA;
                    return dateA - dateB;
                });
            }, [filteredOrders]);

            const customers = useMemo(() => {

                    }
                    groups[phone].totalSpent += (order.total_price || 0);
                    groups[phone].visitCount += 1;
                    const pets = Array.isArray(order.booking_pets) ? order.booking_pets : [];
                    pets.forEach(p => {
                        const cleanName = p.pet_name?.trim();
                        if (cleanName) groups[phone].pets.add(cleanName);

                    groups[phone].history.push(order);

                        {loading ? (

                        ) : activeTab === 'crm' ? (

                                            <div className="w-12 h-12 bg-[#203B2A]/10 text-[#203B2A] rounded-xl flex items-center justify-center font-bold text-lg">{c.name[0]}</div>

                                                </div>
                                                <div className="text-[9px] text-[#DDD6CE] font-bold mt-0.5">
                                                    {[...c.pets].join(', ')}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-xs font-bold text-[#B8A088]">總額 ${c.totalSpent}</div>
                                            <div className="text-[9px] text-[#DDD6CE] font-bold">查看紀錄 →</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : activeTab === 'calendar' ? (
                            <CalendarView orders={orders} onSelectOrder={setSelectedOrder} />
                        ) : activeTab === 'slots' ? (
                            <div className="bg-white p-6 rounded-[2rem] shadow-sm space-y-6 animate-fade-in">
                                <div className="flex justify-between items-center border-b border-[#DDD6CE] pb-4">
                                    <h3 className="font-bold text-lg text-[#203B2A]">美容預約時段開關</h3>
                                    <input type="date" className="admin-input w-40" defaultValue={new Date().toLocaleDateString('en-CA')} onChange={e => fetchBusySlots(e.target.value)} id="slot_date_picker" />
                                </div>
                                <div className="grid grid-cols-3 sm:grid-cols-4 gap-2">
                                    {Array.from({length: 17}, (_, i) => {
                                        const h = Math.floor(i/2) + 10;
                                        const m = i % 2 === 0 ? '00' : '30';
                                        const slot = `${h}:${m}`;
                                        const isBusy = busySlots.includes(slot);
                                        return (
                                            <button key={slot} 
                                                onClick={() => toggleSlot(document.getElementById('slot_date_picker').value, slot)}
                                                className={`py-3 rounded-xl text-xs font-bold border transition-all ${isBusy ? 'bg-[#FDF6F3] text-[#DBA58B] border-[#DBA58B]/30' : 'bg-[#FAF8F5] text-[#4A6B55] border-[#4A6B55]/20'}`}>
                                                {slot} {isBusy ? '已額滿' : '可預約'}
                                            </button>
                                        );
                                    })}
                                </div>
                                <p className="text-[10px] text-[#B5A89C] font-bold text-center">※ 點擊按鈕可手動關閉該時段，前台預約頁面將同步隱藏該選項。</p>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {sortedFilteredOrders.map(order => {
                                    let rawProps = {};
                                    try {
                                        const parsed = typeof order.raw_data === 'string' ? JSON.parse(order.raw_data) : order.raw_data;
                                        rawProps = parsed?.raw_data || parsed || {};
                                    } catch (e) {}

                                    const isDaycare = order.service_type === 'daycare';
                                    const daycareTime = `${rawProps.bookingTime || ''}${rawProps.bookingTimeEnd ? ' - ' + rawProps.bookingTimeEnd : ''}`;
const displayDateText = (() => {
    if (isDaycare) {
        return `${order.check_in_date || order.daycare_date || ''} ${daycareTime}`;
    }
    if (order.service_type === 'boarding') {
        return `${order.check_in_date || ''} ~ ${order.check_out_date || ''}`;
    }
    // 美容 - 如果沒有日期，顯示「無日期」或使用 created_at
    const date = order.booking_date || order.check_in_date || order.created_at?.slice(0, 10) || '';
    const time = order.booking_time || '';
    if (!date && !time) return '無日期';
    return `${date} ${time}`.trim();
})();
                                    
const hasFullGrooming = order.service_type === 'grooming' && (
    (Array.isArray(order.booking_pets) && order.booking_pets.some(p => {
        const items = Array.isArray(p.service_items) ? p.service_items : 
                       (typeof p.service_items === 'string' ? JSON.parse(p.service_items) : []);
        return items.includes('full');
    })) ||
    (Array.isArray(rawProps.service_items) && rawProps.service_items.includes('full'))
);

                                    const checkTag = (field, targetValue) => {
                                        if (Array.isArray(order.booking_pets) && order.booking_pets.some(p => p[field] === targetValue)) return true;
                                        if (rawProps[field] === targetValue) return true;
                                        return false;
                                    };

                                    const hasAggression = checkTag('social_aggression', '有攻擊性');
                                    const isSensitive = checkTag('grooming_temperament', '敏感寶寶');
                                    const hasMedical = checkTag('medical_status', '有');
                                    const imageAuthDisagree = rawProps.image_auth === 'disagree';

                                    return (
                                        <div key={order.id} onClick={() => setSelectedOrder(order)} className="cute-card p-6 bg-white cursor-pointer relative overflow-hidden group">
                                            <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${order.status === 'confirmed' ? 'bg-[#4A6B55]' : order.status === 'pending' ? 'bg-[#B8A088]' : order.status === 'cancelled' ? 'bg-[#DBA58B]' : 'bg-[#DDD6CE]'}`}></div>
                                            
                                            <div className="flex justify-between items-start mb-3">
                                                <div>
                                                    <div className="text-[10px] font-bold text-[#B5A89C] uppercase tracking-widest mb-1 flex items-center gap-2">
                                                        <span className="flex items-center gap-1">
                                                            <Icon name="calendar" size={12} className="mb-0.5"/>
                                                            {['boarding', 'daycare'].includes(order.service_type) ? displayDateText : `${order.booking_date || order.check_in_date || order.booking_time?.split('T')[0]} ${order.booking_time || ''}`}
                                                            {isDaycare && (
                                                                <span className="ml-1 text-[10px] font-bold px-2 py-0.5 rounded-full bg-[#B8A088]/20 text-[#B8A088]">
                                                                    安親
                                                                </span>
                                                            )}
                                                            {hasFullGrooming && (
                                                                <span className="ml-1 text-[10px] font-bold px-2 py-0.5 rounded-full bg-[#4A6B55]/20 text-[#4A6B55]">
                                                                    大美容
                                                                </span>
                                                            )}
                                                        </span>
                                                        {(() => {
                                                            const pets = Array.isArray(order.booking_pets) ? order.booking_pets : [];
                                                            return pets.length > 1 && 
                                                                <span className="bg-[#EDE8E0] text-[#B5A89C] px-1.5 py-0.5 rounded-full ml-1">
                                                                    {pets.length}隻
                                                                </span>;
                                                        })()}
                                                    </div>
                                                    
                                                    <div className="font-bold text-2xl text-[#203B2A] flex items-center gap-2">
                                                        {(() => {
                                                            const pets = Array.isArray(order.booking_pets) ? order.booking_pets : [];
                                                            return pets.map(p => p.pet_name || '未命名').join(', ') || '無毛孩資料';
                                                        })()}
                                                    </div>

                                                    {(hasAggression || isSensitive || hasMedical) && (
                                                        <div className="flex flex-wrap gap-1.5 mt-2 animate-fade-in">
                                                            {hasAggression && (
                                                                <span className="inline-flex items-center gap-1 text-[10px] font-bold bg-[#DBA58B] text-white px-2 py-0.5 rounded-md shadow-sm">
                                                                    <Icon name="alert-octagon" size={10} /> 有攻擊性
                                                                </span>
                                                            )}
                                                            {isSensitive && (
                                                                <span className="inline-flex items-center gap-1 text-[10px] font-bold bg-[#B8A088] text-white px-2 py-0.5 rounded-md shadow-sm">
                                                                    <Icon name="zap" size={10} /> 敏感寶寶
                                                                </span>
                                                            )}
                                                            {hasMedical && (
                                                                <span className="inline-flex items-center gap-1 text-[10px] font-bold bg-[#4A6B55] text-white px-2 py-0.5 rounded-md shadow-sm">
                                                                    <Icon name="activity" size={10} /> 有病史
                                                                </span>
                                                            )}
                                                        </div>

                                                </div>

                                                <div className="text-right">

                                                    <span className={`status-badge block mt-1 ${order.status === 'pending' ? 'status-pending' : order.status === 'confirmed' ? 'status-confirmed' : order.status === 'cancelled' ? 'status-cancelled' : 'status-completed'}`}>
                                                        {order.status === 'pending' ? '待確認' : order.status === 'confirmed' ? '已確認' : order.status === 'cancelled' ? '已取消' : '已完成'}

                                            <div className="flex items-center gap-4 text-xs font-bold text-[#B5A89C] mt-3 border-t border-dashed border-[#DDD6CE] pt-3">

        };

        // --- App 主元件 ---
        const App = () => {
            const [session, setSession] = useState(null);
            const [showUpdate, setShowUpdate] = useState(false);
            const [waitingWorker, setWaitingWorker] = useState(null);

useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => setSession(session));
    supabase.auth.onAuthStateChange((_event, session) => setSession(session));
}, []);

// 監聽自定義更新事件
useEffect(() => {
    const handleTriggerUpdate = () => {
        if (window.__waitingWorker) {
            // 監聽 controllerchange
            const onControllerChange = () => {
                window.removeEventListener('controllerchange', onControllerChange);
                window.location.reload();
            };
            window.addEventListener('controllerchange', onControllerChange);
            
            // 發送 SKIP_WAITING
            window.__waitingWorker.postMessage({ type: 'SKIP_WAITING' });
            
            // 3 秒後強制重新整理
            setTimeout(() => {
                window.removeEventListener('controllerchange', onControllerChange);
                window.location.reload();
            }, 3000);
        } else {
            window.location.reload();
        }
    };
    
    window.addEventListener('trigger-update', handleTriggerUpdate);
    return () => {
        window.removeEventListener('trigger-update', handleTriggerUpdate);
    };
}, []);

useEffect(() => {
    // 只在 HTTPS 或 localhost 環境註冊 Service Worker
    if ('serviceWorker' in navigator && (window.location.protocol === 'https:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')) {
        const registerSW = async () => {
            try {
                // 先獲取現有的註冊
                const registrations = await navigator.serviceWorker.getRegistrations();
                
                // 檢查是否已有 admin-sw.js 的註冊
                let existingReg = null;
                for (const registration of registrations) {
                    if (registration.active && registration.active.scriptURL.includes('admin-sw.js')) {
                        existingReg = registration;
                        break;
                    }
                    if (registration.waiting && registration.waiting.scriptURL.includes('admin-sw.js')) {
                        existingReg = registration;
                        break;
                    }
                }

                // 如果已有註冊且沒有 waiting，表示已經是最新版本，直接使用
                if (existingReg) {
                    console.log('[App] 已有 Service Worker 註冊，檢查是否需要更新');
                    // 如果已有 waiting，顯示更新提示
                    if (existingReg.waiting) {
                        setWaitingWorker(existingReg.waiting);
                        setShowUpdate(true);
                    } else {
                        // 檢查是否有新版本（通過 fetch 比對）
                        try {
                            const swResponse = await fetch('./admin-sw.js', { cache: 'no-store' });
                            const swText = await swResponse.text();
                            // 從 SW 內容中提取版本號
                            const versionMatch = swText.match(/CACHE_VERSION\s*=\s*['"]([^'"]+)['"]/);
                            const newVersion = versionMatch ? versionMatch[1] : null;
                            
                            // 從當前 active worker 的 URL 中提取版本（透過 scriptURL）
                            const currentUrl = existingReg.active ? existingReg.active.scriptURL : '';
                            const currentVersionMatch = currentUrl.match(/[?&]v=([^&]+)/);
                            const currentVersion = currentVersionMatch ? currentVersionMatch[1] : null;
                            
                            // 如果版本不同，需要重新註冊
                            if (newVersion && currentVersion && newVersion !== currentVersion) {
                                console.log('[App] 檢測到新版本，重新註冊');
                                await existingReg.unregister();
                                const registration = await navigator.serviceWorker.register('./admin-sw.js', { scope: '/' });
                                if (registration.waiting) {
                                    setWaitingWorker(registration.waiting);
                                    setShowUpdate(true);
                                }
                            } else {
                                console.log('[App] Service Worker 已是最新版本');
                            }
                        } catch (e) {
                            console.warn('[App] 版本檢查失敗:', e);
                        }
                    }
                    return;
                }

                // 沒有現有註冊，建立新的
                const registration = await navigator.serviceWorker.register('./admin-sw.js', { scope: '/' });
                console.log('[App] Service Worker 註冊成功:', registration);
                
                if (registration.waiting) {
                    setWaitingWorker(registration.waiting);
                    setShowUpdate(true);
                }

                // 監聽更新事件
                registration.addEventListener('updatefound', () => {
                    const newWorker = registration.installing;
                    if (newWorker) {
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                setWaitingWorker(newWorker);
                                setShowUpdate(true);
                            }
                            if (newWorker.state === 'activated') {
                                console.log('[App] 新 Service Worker 已啟用');
                                setShowUpdate(false);
                            }
                        });
                    }
                });

                // 監聽來自 Service Worker 的訊息
                const messageHandler = (event) => {
                    if (event.data && event.data.type === 'SW_ACTIVATED') {
                        console.log('[App] 收到 SW 啟用通知');
                        setShowUpdate(false);
                        setWaitingWorker(null);
                    }
                };
                navigator.serviceWorker.addEventListener('message', messageHandler);

                // 清理函數
                return () => {
                    navigator.serviceWorker.removeEventListener('message', messageHandler);
                };

            } catch (error) {
                console.warn('[App] Service Worker 註冊失敗:', error);
            }
        };
        registerSW();
    }
}, []);

return (
    <>
        <UpdatePrompt show={showUpdate} onUpdate={() => {
            // 直接使用 waitingWorker，不觸發自定義事件
            if (waitingWorker) {
                // 監聽 controllerchange 事件
                const onControllerChange = () => {
                    window.removeEventListener('controllerchange', onControllerChange);
                    window.location.reload();
                };
                window.addEventListener('controllerchange', onControllerChange);
                
                // 發送 SKIP_WAITING
                waitingWorker.postMessage({ type: 'SKIP_WAITING' });
                
                // 2 秒後如果沒有 controllerchange，強制重新整理
                setTimeout(() => {
                    window.removeEventListener('controllerchange', onControllerChange);
                    window.location.reload();
                }, 2000);
            } else {
                navigator.serviceWorker.getRegistration().then(reg => {
                    if (reg && reg.waiting) {
                        reg.waiting.postMessage({ type: 'SKIP_WAITING' });
                    } else {
                        window.location.reload();
                    }
                });
            }
        }} />
        {session ? <Dashboard user={session.user} /> : <LoginView onLogin={() => {}} />}
    </>
);
        };

// 使用傳統 ReactDOM.render (相容 file:// 協議)
const rootElement = document.getElementById('root');
if (rootElement) {
    ReactDOM.render(<App />, rootElement);
} else {
    console.error('Root element not found');
}
    </script>
</body>
